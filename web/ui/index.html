        // ✅ LIFEE API (JSON: { messages: [...], options: [...] })
        const LIFEE_API = "/decision";
        const LIFEE_API_TIMEOUT_MS = 60000;
        const LIFEE_STREAM_TIMEOUT_MS = 90000;

        async function fetchLifeeDecision(payload, url = LIFEE_API) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), LIFEE_API_TIMEOUT_MS);
            let res;

            try {
                res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
            } catch (err) {
                if (err?.name === 'AbortError') {
                    throw new Error(`LIFEE API timed out after ${Math.round(LIFEE_API_TIMEOUT_MS / 1000)}s`);
                }
                throw err;
            } finally {
                clearTimeout(timer);
            }

            if (!res.ok) {
                const text = await res.text();
                throw new Error("LIFEE API failed: " + text);
            }

            return res.json();
        }

        const sleep = (ms) => new Promise(r => setTimeout(r, ms));

        async function fetchText(url) {
            const res = await fetch(url, { method: 'GET' });
            if (!res.ok) throw new Error(`fetchText failed: ${res.status}`);
            return res.text();
        }

        async function fetchLifeeDecisionStream(payload, { onMessage, onMessageUpdate, onOptions } = {}) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), LIFEE_STREAM_TIMEOUT_MS);
            let res;

            try {
                res = await fetch(`${LIFEE_API}?stream=1`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
            } catch (err) {
                if (err?.name === 'AbortError') {
                    throw new Error(`LIFEE API stream timed out after ${Math.round(LIFEE_STREAM_TIMEOUT_MS / 1000)}s`);
                }
                throw err;
            }

            if (!res.ok) {
                clearTimeout(timer);
                const text = await res.text();
                throw new Error("LIFEE API stream failed: " + text);
            }

            // 后端返回 JSON（非 SSE）：可能是余额不足或需要验证
            const ct = res.headers.get('content-type') || '';
            if (ct.includes('application/json')) {
                clearTimeout(timer);
                const data = await res.json();
                if (data?.needsVerification) {
                    window.__lifeeNeedsVerification = true;
                }
                if (data?.needsPayment) {
                    window.__lifeeNeedsPayment = true;
                    window.__lifeeBalance = data.balance || 0;
                }
                return;
            }

            if (!res.body) {
                clearTimeout(timer);
                throw new Error("Streaming not supported in this browser.");
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buf = "";
            let done = false;

            const flushEventBlock = async (block) => {
                // Ignore comments
                if (!block || block.startsWith(":")) return;
                const lines = block.split("\n").filter(Boolean);
                let eventName = "message";
                const dataLines = [];
                for (const line of lines) {
                    if (line.startsWith("event:")) eventName = line.slice(6).trim();
                    else if (line.startsWith("data:")) dataLines.push(line.slice(5).trim());
                }
                const dataStr = dataLines.join("\n");
                if (!dataStr) return;

                let data = dataStr;
                try { data = JSON.parse(dataStr); } catch (_) {}

                if (eventName === "session") {
                    if (data?.sessionId) window.__lifeeSessionId = data.sessionId;
                } else if (eventName === "messageStart") {
                    // 新角色开始说话
                    if (data?.personaId) {
                        window.__currentStreamPid = data.personaId;
                        window.__currentStreamText = "";
                        await onMessage?.({ personaId: data.personaId, text: "" });
                    }
                } else if (eventName === "messageChunk") {
                    if (data?.chunk && window.__currentStreamPid) {
                        window.__currentStreamText = (window.__currentStreamText || "") + data.chunk;
                        await onMessageUpdate?.({ personaId: window.__currentStreamPid, text: window.__currentStreamText });
                    }
                } else if (eventName === "messageEnd") {
                    window.__currentStreamPid = null;
                } else if (eventName === "message") {
                    // 兼容旧格式
                    if (data && typeof data === "object") await onMessage?.(data);
                } else if (eventName === "options") {
                    const opts = (data && typeof data === "object") ? data.options : [];
                    onOptions?.(Array.isArray(opts) ? opts : []);
                } else if (eventName === "error") {
                    const errMsg = (data && typeof data === "object") ? (data.error || JSON.stringify(data)) : String(data);
                    throw new Error(errMsg);
                } else if (eventName === "done") {
                    if (typeof data?.balance === 'number') window.__lifeeBalance = data.balance;
                    done = true;
                }
            };

            try {
                while (!done) {
                    const { value, done: streamDone } = await reader.read();
                    if (streamDone) break;
                    buf += decoder.decode(value, { stream: true });
                    let idx;
                    while ((idx = buf.indexOf("\n\n")) !== -1) {
                        const block = buf.slice(0, idx).trimEnd();
                        buf = buf.slice(idx + 2);
                        await flushEventBlock(block);
                    }
                }
            } catch (err) {
                if (err?.name === 'AbortError') {
                    throw new Error(`LIFEE API stream timed out after ${Math.round(LIFEE_STREAM_TIMEOUT_MS / 1000)}s`);
                }
                throw err;
            } finally {
                clearTimeout(timer);
            }
        }

        async function fetchLifeeDecisionProgressive(payload, { onMessage, onOptions } = {}) {
            // 默认：按 persona 逐个请求，先出第一个角色的消息，再出下一个（体感更快）
            const personas = Array.isArray(payload?.personas) ? payload.personas : [];
            if (personas.length <= 1) {
                const data = await fetchLifeeDecision(payload);
                if (Array.isArray(data?.messages)) {
                    for (const m of data.messages) await onMessage?.(m);
                }
                if (Array.isArray(data?.options)) onOptions?.(data.options);
                else onOptions?.([]);
                return;
            }

            const earlier = [];
            let lastOptions = [];
            for (let i = 0; i < personas.length; i++) {
                const p = personas[i];
                const situationWithEarlier = earlier.length
                    ? `${(payload?.situation || "").trim()}\n\nEarlier voices:\n${earlier.map(m => `- ${m.personaId}: ${String(m.text || '').replace(/\n/g, ' ')}`).join('\n')}`
                    : payload?.situation;

                const singlePayload = { ...payload, situation: situationWithEarlier, personas: [p] };
                const data = await fetchLifeeDecision(singlePayload);
                if (Array.isArray(data?.messages)) {
                    for (const m of data.messages) {
                        earlier.push(m);
                        await onMessage?.(m);
                    }
                }
                if (Array.isArray(data?.options)) lastOptions = data.options;
                // 给 React 一次渲染机会，让“先出第一个角色”更明显
                await sleep(0);
            }
            onOptions?.(lastOptions);
        }

        const DecisionLab = () => {
            const [items, setItems] = useState([
                { id: 'growth', label: 'Career Growth', weight: 8.5 },
                { id: 'burnout', label: 'Mental Burnout', weight: -6.2 }
            ]);
            const [newLabel, setNewLabel] = useState('');
            const [newWeight, setNewWeight] = useState(2);

            const total = items.reduce((sum, x) => sum + (Number(x.weight) || 0), 0);
            const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
            const clarity = clamp(Math.round(((total + 20) / 40) * 100), 0, 100);

            const add = () => {
                const label = (newLabel || '').trim();
                if (!label) return;
                const w = clamp(Number(newWeight) || 0, -10, 10);
                setItems(prev => ([...prev, { id: `${Date.now()}`, label, weight: w }]));
                setNewLabel('');
                setNewWeight(2);
            };

            const updateWeight = (id, weight) => {
                setItems(prev => prev.map(x => x.id === id ? ({ ...x, weight }) : x));
            };

            const remove = (id) => setItems(prev => prev.filter(x => x.id !== id));

            return (
                <div className="p-6 md:p-12 max-w-6xl mx-auto animate-in space-y-10 pb-32 text-left">
                    <div className="text-center space-y-3">
                        <h2 className="text-4xl md:text-6xl font-serif italic tracking-tight">Decision Lab</h2>
                        <p className="text-[10px] uppercase font-black tracking-[0.4em] opacity-40">Quantifying the intangible</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="bg-white p-8 md:p-10 rounded-[60px] border border-[#F0EDEA] shadow-sm space-y-8">
                            <div className="flex items-center justify-between">
                                <h3 className="text-[10px] font-black uppercase tracking-widest opacity-30">Pros / Cons Weight Matrix</h3>
                                <div className="text-[10px] font-black uppercase tracking-[0.25em] opacity-40">Total: {total.toFixed(1)}</div>
                            </div>

                            <div className="space-y-4">
                                {items.map(x => {
                                    const isPro = (Number(x.weight) || 0) >= 0;
                                    return (
                                        <div key={x.id} className={`p-5 rounded-[28px] border ${isPro ? 'bg-green-50/40 border-green-100' : 'bg-red-50/40 border-red-100'}`}>
                                            <div className="flex items-center justify-between gap-4">
                                                <div className="min-w-0">
                                                    <div className="font-bold text-sm truncate">{x.label}</div>
                                                    <div className="mt-2 flex items-center gap-3">
                                                        <input
                                                            type="range"
                                                            min={-10}
                                                            max={10}
                                                            step={0.5}
                                                            value={x.weight}
                                                            onChange={(e) => updateWeight(x.id, Number(e.target.value))}
                                                            className="w-full"

                                                        <div className={`shrink-0 text-xs font-black ${isPro ? 'text-green-700' : 'text-red-700'}`}>

                                                <button onClick={() => remove(x.id)} className="w-9 h-9 rounded-full bg-white/80 border border-[#E8E6E0] flex items-center justify-center text-[#5D576B]/60 hover:text-blue-brand hover:border-blue-brand/30 transition-all">
                                                    <Icon name="X" size={16} />
                                                </button>
                                            </div>
                                        </div>

                            <div className="p-6 rounded-[40px] border-2 border-dashed border-[#D1CEC7] bg-[#FDFBF7] space-y-4">
                                <div className="text-[10px] font-black uppercase tracking-[0.3em] opacity-40">Add variable</div>
                                <input
                                    value={newLabel}
                                    onChange={(e) => setNewLabel(e.target.value)}
                                    placeholder="Variable name..."
                                    className="w-full h-12 px-5 bg-white rounded-full border-2 border-transparent focus-blue-brand text-sm"
                                />
                                <div className="flex items-center gap-4">
                                    <input
                                        type="range"
                                        min={-10}
                                        max={10}
                                        step={0.5}
                                        value={newWeight}
                                        onChange={(e) => setNewWeight(Number(e.target.value))}
                                        className="flex-1"
                                    />
                                    <div className="w-16 text-right text-xs font-black opacity-60">{newWeight >= 0 ? '+' : ''}{Number(newWeight).toFixed(1)}</div>
                                </div>
                                <button
                                    onClick={add}
                                    disabled={!newLabel.trim()}
                                    className="w-full py-4 bg-blue-brand text-white rounded-full font-black text-[10px] uppercase tracking-widest shadow-[0_4px_14px_rgba(152,166,212,0.35)] transition-all active:scale-95 disabled:opacity-20"
                                >
                                    Add
                                </button>
                            </div>
                        </div>

                        <div className="bg-white p-8 md:p-10 rounded-[60px] border border-[#F0EDEA] shadow-sm flex flex-col justify-center text-center space-y-8 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8 opacity-5"><Icon name="Layers" size={64} /></div>
                            <div className="w-36 h-36 rounded-full border-8 border-blue-brand/10 border-t-blue-brand flex items-center justify-center mx-auto">
                                <span className="text-4xl font-black text-blue-brand">{clarity}%</span>
                            </div>
                            <div className="space-y-2 max-w-sm mx-auto">
                                <h4 className="font-bold text-sm">Rational Clarity Score</h4>
                                <p className="text-xs opacity-50 italic leading-relaxed">
                                    A quick heuristic from your weights. Use it as a mirror — then ask what your emotions are protecting.
                                </p>
                            </div>

                            <div className="grid grid-cols-2 gap-4 max-w-md mx-auto w-full">
                                <div className="p-5 rounded-[32px] bg-[#FDFBF7] border border-[#E8E6E0] text-left">
                                    <div className="text-[10px] font-black uppercase tracking-[0.3em] opacity-40">Emotional</div>
                                    <div className="mt-3 text-sm italic opacity-70">Name the fear behind the biggest negative weight.</div>
                                </div>
                                <div className="p-5 rounded-[32px] bg-[#FDFBF7] border border-[#E8E6E0] text-left">
                                    <div className="text-[10px] font-black uppercase tracking-[0.3em] opacity-40">Rational</div>
                                    <div className="mt-3 text-sm italic opacity-70">Identify the one variable that changes everything.</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const PersonaBuilder = ({ onSave, onCancel }) => {
            const [step, setStep] = useState(1);
            const [newP, setNewP] = useState({ name: '', role: '', worldview: '', avatar: '👤', voice: '', knowledge: '' });
            const emojis = ['👤', '🎭', '🛡️', '🌱', '🦉', '💎', '🌩️', '🌊', '🔥', '🎀', '🧸', '☁️'];
            return (
                <div className="max-w-2xl mx-auto w-full pt-8 md:pt-12 px-4 font-sans animate-in">
                    <div className="mb-8 flex items-center justify-between">
                        <button onClick={onCancel} className="text-[10px] font-bold uppercase tracking-widest opacity-40 flex items-center gap-2"><Icon name="X" size={14} /> Cancel</button>
                        <div className="flex gap-2">
                            {[1, 2, 3].map(s => <div key={s} className={`w-2.5 h-2.5 rounded-full ${s <= step ? 'bg-blue-brand shadow-[0_0_8px_rgba(152,166,212,0.4)]' : 'bg-slate-200'}`} />)}
                        </div>
                    </div>
                    <div className="bg-white p-6 md:p-12 rounded-[40px] md:rounded-[60px] shadow-sm border border-[#F0EDEA] space-y-8">
                        {step === 1 && (
                            <div className="space-y-6">
                                <h2 className="text-xl md:text-2xl font-serif italic text-center uppercase text-[#1A1A1A]">Step 1: Identity</h2>
                                <input placeholder="Name..." className="w-full p-4 bg-[#FDFBF7] rounded-2xl border border-[#F0EDEA] focus-blue-brand" value={newP.name} onChange={e => setNewP({...newP, name: e.target.value})} />
                                <input placeholder="Role / Identity" className="w-full p-4 bg-[#FDFBF7] rounded-2xl border border-[#F0EDEA] uppercase text-xs focus-blue-brand" value={newP.role} onChange={e => setNewP({...newP, role: e.target.value})} />
                                <div className="flex flex-wrap gap-2 justify-center pt-2">{emojis.map(e => <button key={e} onClick={() => setNewP({...newP, avatar: e})} className={`p-3 rounded-xl transition-all border-2 ${newP.avatar === e ? 'border-blue-brand bg-white' : 'border-transparent bg-slate-50'}`}>{e}</button>)}</div>
                            </div>
                        )}
                        {step === 2 && (
                            <div className="space-y-6">
                                <h2 className="text-xl md:text-2xl font-serif italic text-center uppercase">Step 2: Soul</h2>
                                <textarea placeholder="Worldview Statement..." className="w-full h-32 p-5 bg-[#FDFBF7] rounded-2xl border border-[#F0EDEA] text-sm italic focus-blue-brand" value={newP.worldview} onChange={e => setNewP({...newP, worldview: e.target.value})} />
                                <textarea placeholder="Voice Sample..." className="w-full h-24 p-5 bg-[#FDFBF7] rounded-2xl border border-[#F0EDEA] text-sm focus-blue-brand" value={newP.voice} onChange={e => setNewP({...newP, voice: e.target.value})} />
                            </div>
                        )}
                        <div className="flex gap-3">
                            {step > 1 && <button onClick={() => setStep(step-1)} className="flex-1 py-4 bg-slate-50 text-neutral-400 rounded-full font-bold text-xs uppercase border">Back</button>}
                            <button onClick={() => step < 2 ? setStep(step+1) : onSave(newP)} disabled={step === 1 ? (!newP.name || !newP.role) : !newP.worldview} className="flex-[2] py-4 bg-[#1A1A1A] text-white rounded-full font-bold text-xs uppercase shadow-xl disabled:opacity-20 transition-all">{step < 2 ? 'CONTINUE' : 'ARCHIVE VOICE'}</button>
                        </div>
                    </div>
                </div>
            );
        };

        const DebateArena = ({
            context,
            selectedPersonas,
            setView,
            ensureSession,
            persistMessage,
            buildContextBlock,
            userAvatar,
            user
        }) => {
            const [history, setHistory] = useState([]);
            const [options, setOptions] = useState([]);
            const [isDebating, setIsDebating] = useState(false);
            const [sessionId, setSessionId] = useState("");
            const [inputValue, setInputValue] = useState('');
            const [tarotDecision, setTarotDecision] = useState('');
            const [tarotModalOpen, setTarotModalOpen] = useState(false);
            const [credits, setCredits] = useState(null);
            const [showPaywall, setShowPaywall] = useState(false);
            const [showVerify, setShowVerify] = useState(false);
            const verifyRef = useRef(null);
            const verifyWidgetRef = useRef(null);
            const [redeemCode, setRedeemCode] = useState('');
            const [language, setLanguage] = useState(() => localStorage.getItem('lifee_lang') || '');
            const detectLang = (text) => {
                const ch = (text || '').trim()[0] || '';
                if (/[\u3040-\u30ff]/.test(ch)) return 'Japanese';
                if (/[\uac00-\ud7af]/.test(ch)) return 'Korean';
                if (/[\u4e00-\u9fff]/.test(ch)) return 'Chinese';
                return 'English';
            };
            const scrollRef = useRef(null);
            const inputFieldRef = useRef(null);
            const hasTarotMaster = selectedPersonas.some(p => p.id === 'tarot-master');
            const tarotMasterPersona = selectedPersonas.find(p => p.id === 'tarot-master') || null;
            const debatePersonas = selectedPersonas.filter(p => p.id !== 'tarot-master');

            useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [history]);

            // 页面加载时拉取余额
            useEffect(() => {
                const url = user?.id ? `/credits?userId=${user.id}` : '/credits';
                fetch(url, { credentials: 'include' }).then(r => r.json()).then(d => {
                    if (typeof d.balance === 'number') setCredits(d.balance);
                }).catch(() => {});
            }, [user]);

            const runRound = async (userInput = null) => {
                setIsDebating(true);
                const cleanInput = (userInput ?? inputValue ?? "").toString().trim();

                if (cleanInput) {
                    setHistory(prev => [...prev, { personaId: "user", text: cleanInput }]);
                    await persistMessage('user', cleanInput);
                    setInputValue('');
                }

                try {
                    const situation = (context.situation || "").trim();

                    const payload = {
                        situation: situation || "Start the internal debate.",
                        userInput: cleanInput,
                        personas: debatePersonas.map(p => ({ id: p.id, name: p.name })),
                        sessionId: sessionId,
                        userId: user?.id || "",
                        language: language || detectLang(cleanInput)
                    };

                    if (!payload.personas.length) {
                        setOptions([]);
                        return;
                    }

                    const handlers = {
                        onMessage: async (msg) => {
                            setHistory(prev => [...prev, msg]);
                            if (msg.text) {
                                const role = msg.personaId === 'system' ? 'system' : 'assistant';
                                await persistMessage(role, msg.text);
                            }
                        },
                        onMessageUpdate: async (msg) => {
                            setHistory(prev => {
                                const updated = [...prev];
                                if (updated.length > 0 && updated[updated.length - 1].personaId === msg.personaId) {
                                    updated[updated.length - 1] = { ...msg };
                                }
                                return updated;
                            });
                        },
                        onOptions: (opts) => {
                            setOptions(Array.isArray(opts) ? opts : []);
                        }
                    };

                    // 先检查余额，不足直接弹付费墙
                    if (credits !== null && credits <= 0) {
                        setShowPaywall(true);
                        setIsDebating(false);
                        return;
                    }

                    // 流式模式：逐 chunk 实时显示
                    try {
                        await fetchLifeeDecisionStream(payload, handlers);
                        if (window.__lifeeNeedsVerification) {
                            window.__lifeeNeedsVerification = false;
                            setShowVerify(true);
                            return;
                        }
                        if (window.__lifeeNeedsPayment) {
                            window.__lifeeNeedsPayment = false;
                            setCredits(window.__lifeeBalance || 0);
                            setShowPaywall(true);
                            return;
                        }
                        if (window.__lifeeSessionId) setSessionId(window.__lifeeSessionId);
                        if (typeof window.__lifeeBalance === 'number') setCredits(window.__lifeeBalance);
                    } catch (streamErr) {
                        console.warn('stream failed; fallback to non-stream', streamErr);
                        const data = await fetchLifeeDecision(payload);
                        if (data?.needsVerification) {
                            setShowVerify(true);
                            return;
                        }
                        if (data?.needsPayment) {
                            setCredits(data.balance || 0);
                            setShowPaywall(true);
                            return;
                        }
                        if (Array.isArray(data?.messages)) {
                            for (const m of data.messages) await handlers.onMessage(m);
                        }
                        if (Array.isArray(data?.options)) handlers.onOptions(data.options);
                        if (data?.sessionId) setSessionId(data.sessionId);
                        if (typeof data?.balance === 'number') setCredits(data.balance);
                    }
                } catch (e) {
                    console.error(e);
                    setHistory(prev => [...prev, { personaId: "system", text: `(${e?.message || 'Request failed'})` }]);
                    setOptions([]);
                } finally {
                    setIsDebating(false);
                }
            };

            const copyText = (text) => { copyToClipboard(text); };

            const quoteText = (text, name) => {
                const quote = `"${text}" — ${name}\n\n`;
                setInputValue(prev => quote + prev);
                inputFieldRef.current?.focus();
            };

            const openTarotForDecision = (decision) => {
                setTarotDecision((decision || '').trim());
                setTarotModalOpen(true);
            };

            const handleInterpretTarot = async (cards) => {
                if (!tarotMasterPersona) return;

                const focus = tarotDecision || (context?.situation || '').trim() || 'this decision';
                const drawnCards = Array.isArray(cards) ? cards : [];
                const drawn = drawnCards.map(card => card.name).join(', ');
                setTarotModalOpen(false);

                const spreadPrompt = `Read a three-card tarot spread for this decision: "${focus}". Cards drawn: ${drawn}. Interpret them in this order: present tension, hidden influence, likely transformation. Keep the reading grounded in the decision and end with one concrete next step.`;
                const spreadSummary = `[Tarot spread for "${focus}"] ${drawn}`;

                setIsDebating(true);
                setHistory(prev => [...prev, { personaId: 'user', text: spreadSummary }]);
                await persistMessage('user', spreadSummary);

                try {
                    const contextBlock = buildContextBlock();
                    const situation = (context.situation || "").trim();
                    const finalSituation = contextBlock
                        ? `Context:\n${contextBlock}\n\nUser situation:\n${situation || "Start the internal debate."}\n\nDecision for tarot reading:\n${focus}`
                        : `${situation || "Start the internal debate."}\n\nDecision for tarot reading:\n${focus}`;

                    const payload = {
                        situation: finalSituation,
                        userInput: spreadPrompt,
                        personas: [{ id: tarotMasterPersona.id, name: tarotMasterPersona.name, knowledge: tarotMasterPersona.knowledge || '' }],
                        context: contextBlock
                    };

                    const handlers = {
                        onMessage: async (msg) => {
                            setHistory(prev => [...prev, msg]);
                            const role = msg.personaId === 'system' ? 'system' : 'assistant';
                            await persistMessage(role, msg.text || '');
                        },
                        onOptions: () => {}
                    };

                    try {
                        await fetchLifeeDecisionStream(payload, handlers);
                    } catch (streamErr) {
                        console.warn('tarot stream failed; fallback to progressive JSON calls', streamErr);
                        await fetchLifeeDecisionProgressive(payload, handlers);
                    }
                } catch (e) {
                    console.error(e);
                    setHistory(prev => [...prev, { personaId: "system", text: `(${e?.message || 'Tarot reading failed'})` }]);
                } finally {
                    setIsDebating(false);
                }
            };

            const autoStartedRef = useRef(false);
            useEffect(() => {
                if (autoStartedRef.current) return;
                if (!debatePersonas?.length) return;
                const initial = (context?.situation || '').trim();
                if (!initial) return;
                autoStartedRef.current = true;
                runRound(initial);
            }, [debatePersonas?.length]);

            return (
                <div className="h-[calc(100vh-64px)] flex flex-col overflow-hidden font-sans animate-in">
                    <div className="p-4 border-b border-[#F0EDEA] bg-white flex items-center justify-between z-10">
                        <div className="flex -space-x-2">{selectedPersonas.map(p => <div key={p.id} className="w-8 h-8 rounded-full border-2 border-white overflow-hidden shadow-sm"><AvatarDisplay avatar={p.avatar} className="w-full h-full text-xs" /></div>)}</div>
                        <button onClick={() => setView('summary')} className="flex items-center gap-2 text-xs font-bold text-[#E6C6C1] px-4 py-2 border border-[#E6C6C1] rounded-full hover:bg-[#E6C6C1] hover:text-white transition-all"><Icon name="PauseCircle" size={14} /> STOP & DECIDE</button>
                    </div>
                    <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 md:p-8 space-y-10 pb-64 no-scrollbar">
                        {history.map((m, idx) => {
                            const isUser = m.personaId === 'user';
                            const p = isUser
                                ? { name: 'YOU', avatar: (userAvatar || loadUserAvatar()) }
                                : (selectedPersonas.find(x => x.id === m.personaId) || (m.personaId === "system" ? { name: "SYSTEM", avatar: "⚠️" } : { name: 'Voice', avatar: '☁️' }));
                            return (
                                <div key={idx} className={`flex gap-4 md:gap-5 ${isUser ? 'flex-row-reverse' : 'items-start'} animate-in`}>
                                    <div className={`w-10 h-10 md:w-11 md:h-11 rounded-full border flex items-center justify-center shadow-sm shrink-0 bg-white overflow-hidden ${isUser ? 'border-blue-brand/30' : 'border-[#F0EDEA]'}`}><AvatarDisplay avatar={p.avatar} className="w-full h-full text-2xl" /></div>
                                    <div className={`max-w-[85%] md:max-w-[70%] flex flex-col ${isUser ? 'items-end' : 'items-start'}`}>
                                        <span className="text-[10px] font-black opacity-30 tracking-widest uppercase mb-1.5">{p.name}</span>
                                        <div className={`p-4 md:p-5 rounded-[24px] md:rounded-[28px] text-sm shadow-sm transition-all duration-300 leading-relaxed ${isUser ? 'bg-blue-brand text-white rounded-tr-none' : 'bg-white border border-[#F0EDEA] rounded-tl-none'}`}>{m.text}</div>

        function App() {
            const [view, setView] = useState('home');
            const [context, setContext] = useState({ situation: '', landingPeriods: [] });
            const [landingTab, setLandingTab] = useState('scenario');
            const [personas, setPersonas] = useState(INITIAL_PERSONAS);
            const [personaKnowledge, setPersonaKnowledge] = useState({});
            const [personaCatalogKnowledge, setPersonaCatalogKnowledge] = useState({});
            const [selectedIds, setSelectedIds] = useState([]);
            const [detailPersona, setDetailPersona] = useState(null);
            const [category, setCategory] = useState('ALL');
            const [communityTab, setCommunityTab] = useState('DEBATE');
            const [user, setUser] = useState(null);
            const [isGuest, setIsGuest] = useState(false);
            const [authOpen, setAuthOpen] = useState(false);
            const [userAvatar, setUserAvatar] = useState(() => loadUserAvatar());
            const [sessionId, setSessionId] = useState(null);
            const [sessionMessages, setSessionMessages] = useState([]);
            const [sessionSummaries, setSessionSummaries] = useState([]);
            const [summaryEvery, setSummaryEvery] = useState(SUMMARY_EVERY_DEFAULT);
            const [contextWindow, setContextWindow] = useState(CONTEXT_WINDOW_DEFAULT);
            const [personaAssets, setPersonaAssets] = useState({});
            const [personaAvatarOverrides, setPersonaAvatarOverrides] = useState(() => loadPersonaAvatarOverrides());
            const [personaCoverOverrides, setPersonaCoverOverrides] = useState(() => loadPersonaCoverOverrides());
            const [adminOpen, setAdminOpen] = useState(false);
            const [chatSessions, setChatSessions] = useState([]);
            const [chatSessionsLoading, setChatSessionsLoading] = useState(false);
            const [chatDetailSession, setChatDetailSession] = useState(null);
            const [chatDetailMessages, setChatDetailMessages] = useState([]);
            const [chatDetailSummaries, setChatDetailSummaries] = useState([]);
            const [chatStatus, setChatStatus] = useState('');
            const [favoritePersonas, setFavoritePersonas] = useState([]);
            const [editPersona, setEditPersona] = useState(null);
            const [personaIconEditorOpen, setPersonaIconEditorOpen] = useState(false);

            const sessionMessagesRef = useRef([]);

            useEffect(() => {
                sessionMessagesRef.current = sessionMessages;
            }, [sessionMessages]);

            useEffect(() => {
                // Load persona-specific knowledge notes (optional).
                // Kept in UI folder so static hosting can serve it.
                let cancelled = false;
                (async () => {
                    try {
                        const txt = await fetchText('./my-personas/audrey-hepburn.md');
                        if (cancelled) return;
                        const clipped = (txt || '').trim().slice(0, 12000);
                        if (clipped) setPersonaKnowledge(prev => ({ ...(prev || {}), 'audrey-hepburn': clipped }));
                    } catch (e) {
                        console.warn('persona knowledge load failed', e);
                    }
                })();
                return () => { cancelled = true; };
            }, []);

            useEffect(() => {
                // Load default persona knowledge from Supabase persona_catalog (decision_style).
                let cancelled = false;
                (async () => {
                    try {
                        const { data, error } = await supabaseClient
                            .from('persona_catalog')
                            .select('id, decision_style');
                        if (error) {
                            console.warn('persona_catalog load failed', error);
                            return;
                        }
                        if (cancelled) return;
                        const map = {};
                        (data || []).forEach((row) => {
                            const ds = (row?.decision_style || '').trim();
                            if (ds) map[row.id] = ds;
                        });
                        setPersonaCatalogKnowledge(map);
                    } catch (e) {
                        console.warn('persona_catalog load error', e);
                    }
                })();
                return () => { cancelled = true; };
            }, []);

            useEffect(() => {
                if (view !== 'persona-detail' && personaIconEditorOpen) setPersonaIconEditorOpen(false);
            }, [view, personaIconEditorOpen]);

            useEffect(() => {
                let mounted = true;
                const init = async () => {
                    const { data } = await supabaseClient.auth.getSession();
                    if (mounted) setUser(data?.session?.user || null);
                };
                init();
                const { data: sub } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user || null);
                    if (session?.user) setIsGuest(false);
                });
                return () => {
                    mounted = false;
                    sub?.subscription?.unsubscribe?.();
                };
            }, []);

            useEffect(() => {
                try {
                    const raw = window.localStorage.getItem('lifee_favorite_personas');
                    if (raw) setFavoritePersonas(JSON.parse(raw));
                } catch (_) {}
            }, []);

            useEffect(() => {
                try {
                    window.localStorage.setItem('lifee_favorite_personas', JSON.stringify(favoritePersonas || []));
                } catch (_) {}
            }, [favoritePersonas]);

            useEffect(() => {
                savePersonaAvatarOverrides(personaAvatarOverrides || {});
            }, [personaAvatarOverrides]);

            useEffect(() => {
                savePersonaCoverOverrides(personaCoverOverrides || {});
            }, [personaCoverOverrides]);

            useEffect(() => {
                if (!user) return;
                const ensureProfileAndSettings = async () => {
                    await supabaseClient.from('profiles').upsert({
                        id: user.id,
                        email: user.email,
                        display_name: user.user_metadata?.name || null,
                        avatar_url: user.user_metadata?.avatar_url || null
                    }, { onConflict: 'id' });

                    const { data: settings } = await supabaseClient.from('user_settings').select('summary_every, context_window').eq('id', user.id).maybeSingle();
                    if (!settings) {
                        await supabaseClient.from('user_settings').insert({
                            id: user.id,
                            summary_every: SUMMARY_EVERY_DEFAULT,
                            context_window: CONTEXT_WINDOW_DEFAULT
                        });
                        setSummaryEvery(SUMMARY_EVERY_DEFAULT);
                        setContextWindow(CONTEXT_WINDOW_DEFAULT);
                    } else {
                        setSummaryEvery(settings.summary_every || SUMMARY_EVERY_DEFAULT);
                        setContextWindow(settings.context_window || CONTEXT_WINDOW_DEFAULT);
                    }
                };
                ensureProfileAndSettings();
            }, [user]);

            useEffect(() => {
                if (!user) return;
                const loadPersonaAssets = async () => {
                    const { data } = await supabaseClient.from('personas').select('id, avatar_url, cover_url');
                    const map = {};
                    (data || []).forEach(row => { map[row.id] = row; });
                    setPersonaAssets(map);
                };
                loadPersonaAssets();

                const loadChatSessions = async () => {
                    setChatSessionsLoading(true);
                    const { data } = await supabaseClient
                        .from('chat_sessions')
                        .select('id, title, updated_at, latest_message_at')
                        .eq('user_id', user.id)
                        .order('updated_at', { ascending: false });
                    setChatSessions(data || []);
                    setChatSessionsLoading(false);
                };
                loadChatSessions();

                const loadLatestSession = async () => {
                    const { data: sessions } = await supabaseClient
                        .from('chat_sessions')
                        .select('id, title, updated_at')
                        .eq('user_id', user.id)
                        .order('updated_at', { ascending: false })
                        .limit(1);

                    const latest = sessions?.[0];
                    if (!latest) return;

                    setSessionId(latest.id);
                    const { data: msgs } = await supabaseClient
                        .from('chat_messages')
                        .select('id, role, content, seq, created_at')
                        .eq('session_id', latest.id)
                        .order('seq', { ascending: true })
                        .limit(200);
                    setSessionMessages((msgs || []).map(m => ({ role: m.role, text: m.content, seq: m.seq })));

                    const { data: sums } = await supabaseClient
                        .from('chat_summaries')
                        .select('summary, start_seq, end_seq, created_at')
                        .eq('session_id', latest.id)
                        .order('created_at', { ascending: true });
                    setSessionSummaries(sums || []);
                };
                loadLatestSession();
            }, [user]);

            const buildRoughSummary = (messages) => {
                const lines = messages.map(m => `${m.role.toUpperCase()}: ${m.text}`);
                const joined = lines.join('\n');
                if (joined.length <= 1200) return joined;
                return joined.slice(0, 1200) + '…';
            };

            const buildShareTextFromSession = (title, messages, summaries) => {
                const summaryBlock = (summaries || []).length
                    ? summaries.map(s => `Summary(${s.start_seq || '-'}-${s.end_seq || '-'})\n${s.summary}`).join('\n\n')
                    : '';
                const msgBlock = (messages || []).map(m => `${(m.role || '').toUpperCase()}: ${m.text || ''}`).join('\n');
                return [
                    `LIFEE Chat Export`,
                    `Title: ${title || 'New Chat'}`,
                    `Date: ${new Date().toISOString()}`,
                    ``,
                    summaryBlock ? `---\n${summaryBlock}\n---\n` : '',
                    msgBlock ? msgBlock : '(no messages yet)'
                ].filter(Boolean).join('\n');
            };

            const buildContextBlock = () => {
                const summaryBlock = sessionSummaries.length
                    ? sessionSummaries.map(s => `Summary(${s.start_seq || '-'}-${s.end_seq || '-'})\n${s.summary}`).join('\n\n')
                    : '';
                const latestMsgs = sessionMessages.slice(-contextWindow).map(m => `${m.role.toUpperCase()}: ${m.text}`).join('\n');
                return [summaryBlock, latestMsgs].filter(Boolean).join('\n\n');
            };

            const ensureSession = async () => {
                if (sessionId) return sessionId;
                const { data, error } = await supabaseClient.from('chat_sessions').insert({
                    user_id: user.id,
                    title: 'New Chat'
                }).select('id').single();
                if (error) return null;
                setSessionId(data.id);
                setSessionMessages([]);
                setSessionSummaries([]);
                return data.id;
            };

            const persistMessage = async (role, text) => {
                if (!user) return;
                const activeSessionId = await ensureSession();
                if (!activeSessionId) return;

                const nextSeq = (sessionMessagesRef.current?.length || 0) + 1;
                const newMsg = { role, text, seq: nextSeq };
                const nextMessages = [...sessionMessagesRef.current, newMsg];
                setSessionMessages(nextMessages);

                await supabaseClient.from('chat_messages').insert({
                    session_id: activeSessionId,
                    user_id: user.id,
                    role,
                    content: text,
                    seq: nextSeq
                });

                await supabaseClient.from('chat_sessions').update({
                    updated_at: new Date().toISOString(),
                    latest_message_at: new Date().toISOString()
                }).eq('id', activeSessionId);

                if (nextMessages.length % summaryEvery === 0) {
                    const batch = nextMessages.slice(-summaryEvery);
                    const summaryText = buildRoughSummary(batch);
                    const startSeq = nextMessages.length - summaryEvery + 1;
                    const endSeq = nextMessages.length;

                    const summaryRow = {
                        session_id: activeSessionId,
                        user_id: user.id,
                        summary: summaryText,
                        start_seq: startSeq,
                        end_seq: endSeq
                    };

                    await supabaseClient.from('chat_summaries').insert(summaryRow);
                    setSessionSummaries(prev => [...prev, summaryRow]);
                }
            };

            const handleNewChat = async () => {
                if (!user) {
                    setSessionId(null);
                    setSessionMessages([]);
                    setSessionSummaries([]);
                    setContext({ situation: '', landingPeriods: [] });
                    setSelectedIds([]);
                    setView('home');
                    return;
                }
                const { data } = await supabaseClient.from('chat_sessions').insert({
                    user_id: user.id,
                    title: 'New Chat'
                }).select('id').single();
                setSessionId(data?.id || null);
                setSessionMessages([]);
                setSessionSummaries([]);
                setContext({ situation: '', landingPeriods: [] });
                setSelectedIds([]);
                setView('home');
                await refreshChatSessions();
            };

            const toggleSelect = (e, p) => { e.stopPropagation(); setSelectedIds(prev => prev.includes(p.id) ? prev.filter(id => id !== p.id) : [...prev, p.id]); };

            const isAdmin = user?.email === ADMIN_EMAIL;

                    .from('chat_summaries')

                    .eq('session_id', sessionRow.id)

                    session_id: sessionRow.id,
                    title: sessionRow.title || 'New Chat',

                    created_at: new Date().toISOString()

                                        type="button"
                                        onClick={() => setLandingTab(key)}
                                        className={`capsule-item ${landingTab === key ? 'capsule-item-active' : 'capsule-item-inactive'}`}
                                    >
                                        {label}
                                    </button>
                                ))}
                            </div>
                            <div className="animate-in pb-4" key={landingTab}>
                                <div className="flex flex-wrap justify-center gap-2 md:gap-3">
                                    {LANDING_CATEGORIES[landingTab].map(opt => {
                                        const isSel = (context.landingPeriods || []).includes(opt);
                                        return (
                                            <button
                                                key={opt}
                                                type="button"
                                                onClick={() => setContext(prev => ({ ...prev, landingPeriods: isSel ? (prev.landingPeriods || []).filter(x => x !== opt) : [...(prev.landingPeriods || []), opt] }))}
                                                className={`landing-opt ${isSel ? 'selected' : ''}`}
                                            >
                                                {opt.toUpperCase()}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                        <button disabled={!context.situation} onClick={() => setView('persona-selection')} className="w-full max-w-lg py-5 md:py-7 bg-blue-brand text-white rounded-full font-black shadow-[0_4px_14px_rgba(152,166,212,0.35)] transition-all hover:translate-y-[-2px] uppercase tracking-[0.3em] text-[10px] md:text-xs disabled:opacity-20 active:scale-95">STEP FORWARD</button>
                    </section>
                );
            };

            return (
                <div className="min-h-screen">
                    <AppLayout
                        activeView={view}
                        setView={setView}
                        user={user}
                        isAdmin={isAdmin}
                        onOpenAdmin={() => setAdminOpen(true)}
                        onLogin={() => setAuthOpen(true)}
                        onSignOut={async () => {
                            await supabaseClient.auth.signOut();
                            setUser(null);
                            setIsGuest(false);
                            setView('home');
                            setAuthOpen(true);
                        }}
                        onNewChat={handleNewChat}
                    >
                        {(user || isGuest) ? renderContent() : (
                            <div className="min-h-screen flex items-center justify-center">
                                <div className="text-center px-6">
                                    <h1 className="text-4xl font-serif italic text-[#1A1A1A] mb-4">Welcome to LIFEE</h1>
                                    <p className="text-xs uppercase tracking-[0.3em] opacity-40">Please sign in to continue</p>
<div className="pt-6 flex flex-col items-center gap-2">
                                        <button onClick={() => setAuthOpen(true)} className="px-8 py-4 bg-blue-brand text-white rounded-full font-bold uppercase text-xs tracking-[0.2em] shadow-xl">Sign in</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </AppLayout>
                    <AuthModal isOpen={authOpen || (!user && !isGuest)} onClose={() => setAuthOpen(false)} onAuthed={(u) => { setUser(u); setIsGuest(false); }} onGuest={() => { setIsGuest(true); setAuthOpen(false); }} />
                    {isAdmin && (
                        <AdminPanel
                            isOpen={adminOpen}
                            onClose={() => setAdminOpen(false)}
                            personas={displayPersonas.filter(p => !p.id.startsWith('custom-'))}
                            onRefresh={async () => {
                                const { data } = await supabaseClient.from('personas').select('id, avatar_url, cover_url');
                                const map = {};
                                (data || []).forEach(row => { map[row.id] = row; });
                                setPersonaAssets(map);
                            }}
                        />
                    )}
                    <PersonaEditModal
                        isOpen={!!editPersona}
                        persona={editPersona}
                        onClose={() => setEditPersona(null)}
                        onSave={(next) => {
                            setPersonas(prev => prev.map(p => p.id === next.id ? next : p));
                            setEditPersona(null);
                        }}
                    />
                    <PersonaIconEditorModal
                        isOpen={personaIconEditorOpen}
                        persona={detailPersona}
                        onClose={() => setPersonaIconEditorOpen(false)}
                        onSetAvatar={(value) => {
                            if (!detailPersona?.id) return;
                            setPersonaAvatarOverrides(prev => ({ ...(prev || {}), [detailPersona.id]: value }));
                            setDetailPersona(prev => prev ? ({ ...prev, avatar: value }) : prev);
                        }}
                        onUseDefault={() => {
                            if (!detailPersona?.id) return;
                            setPersonaAvatarOverrides(prev => {
                                const next = { ...(prev || {}) };
                                delete next[detailPersona.id];
                                return next;
                            });
                            const base = personaAssets?.[detailPersona.id]?.avatar_url || personas.find(x => x.id === detailPersona.id)?.avatar || '👤';
                            setDetailPersona(prev => prev ? ({ ...prev, avatar: base }) : prev);
                        }}
                    />
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
