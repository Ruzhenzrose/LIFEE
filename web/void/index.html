    <!-- Preload critical API data in parallel with React / Supabase scripts.
         Fires as soon as the parser hits this tag — before React evaluates, before
         auth resolves. Promises are parked on window.__lifeePreload for useEffects
         to await instead of issuing fresh fetches. -->
    <script>
        (function () {
            window.__lifeePreload = {};
            // /personas/hot has no user dependency — fire immediately.
            try {
                window.__lifeePreload.hot = fetch('/personas/hot?days=7&limit=3', { credentials: 'include' })
                    .then(r => r.ok ? r.json() : { hot: [] })
                    .catch(() => ({ hot: [] }));
            } catch (_) {}

            // /sessions needs userId. Supabase stores the auth token in localStorage
            // under sb-<project-ref>-auth-token — peek at it without waiting for the
            // Supabase lib to load. We also lift the full user object so App can
            // hydrate its useState synchronously (skipping the null → user flash).
            try {
                let userId = null;
                let user = null;
                for (const k of Object.keys(localStorage)) {
                    if (k.startsWith('sb-') && k.endsWith('-auth-token')) {
                        try {
                            const token = JSON.parse(localStorage.getItem(k));
                            user = token?.user || token?.currentSession?.user || null;
                            userId = user?.id || null;
                            if (userId) break;
                        } catch (_) {}
                    }
                }
                if (user) window.__lifeePreload.user = user;
                if (userId) {
                    window.__lifeePreload.userId = userId;
                    window.__lifeePreload.sessions = fetch(`/sessions?userId=${encodeURIComponent(userId)}`, { credentials: 'include' })
                        .then(r => r.ok ? r.json() : { sessions: [] })
                        .catch(() => ({ sessions: [] }));
                }
                // /credits — pass userId if available so backend returns the
                // account balance (not the IP/cookie anonymous bucket).
                const creditsUrl = userId
                    ? `/credits?userId=${encodeURIComponent(userId)}`
                    : '/credits';
                window.__lifeePreload.credits = fetch(creditsUrl, { credentials: 'include' })
                    .then(r => r.ok ? r.json() : null)
                    .catch(() => null);
                // Hydrate the in-memory balance early from localStorage so the
                // sidebar card shows a number instantly on first paint. Cache is
                // keyed by userId so a sign-out / different-user flow doesn't
                // flash the previous account's balance.
                try {
                    const key = `lifee_balance_cache_${userId || 'anon'}`;
                    const cached = window.localStorage.getItem(key);
                    const n = cached == null ? NaN : parseInt(cached, 10);
                    if (Number.isFinite(n)) window.__lifeeBalance = n;
                } catch (_) {}
            } catch (_) {}
        })();
    </script>

        * { box-sizing: border-box; }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: #12110f;
            color: #ede8e0;
            margin: 0;
            overflow: hidden;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(232,168,76,0.2); border-radius: 2px; }

            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        }

            -webkit-backdrop-filter: blur(20px);

        /* ── Warm amber border ── */
        .iridescent-border {
            position: relative;
        }
        .iridescent-border::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: inherit;
            background: linear-gradient(135deg, #e8a84c, #c47a6c, #8a9a6c, #e8a84c);
            background-size: 300% 300%;
            animation: iridescentShift 4s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        @keyframes iridescentShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── Wordmark (solid, breathing opacity) ── */
        .wordmark {
            color: #e8a84c;
            letter-spacing: -0.02em;
            animation: wordmark-breath 4s ease-in-out infinite;
        }
        @keyframes wordmark-breath {
            0%, 100% { opacity: 0.92; }
            50%      { opacity: 1; }
        }

        /* ── Gradient button ── */
        .btn-gradient {
            background: linear-gradient(135deg, #e8a84c, #c47a6c);
            color: #0f0800;
            font-weight: 700;
            transition: all 0.25s ease;
        }
        .btn-gradient:hover {
            background: linear-gradient(135deg, #f0b860, #d08878);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(232, 168, 76, 0.3);
        }
        .btn-gradient:active { transform: translateY(0); }

        /* ── Warm hover — fixed-width sunset band sweeping across text ──
           Band has terracotta → amber → cream → amber → terracotta with transparent margins.
           A currentColor layer underneath keeps the un-covered portion of the text in its
           native colour, so the text is never invisible.

           The JS at the bottom of the file tracks the cursor: enter ends with the band
           parked under the pointer; exit continues the sweep in the same direction off right.
           --shine-pos is registered as a <percentage> via @property so it can be animated/transitioned. */
        @property --shine-pos {
            syntax: '<percentage>';
            inherits: false;
            initial-value: 130%;
        }
        .warm-shine-active {
            /* !important so class-level `background:` shorthands declared later
               in the stylesheet (e.g. .btn-ghost, .btn-gradient variants) can't
               strip our currentColor fallback and make text invisible outside
               the gradient band. */
            background-image: linear-gradient(
                110deg,
                transparent 0%,
                transparent 35%,
                rgba(196, 122, 108, 0.35) 37%,
                rgba(232, 168, 76, 1) 42%,
                rgba(252, 227, 168, 1) 50%,
                rgba(232, 168, 76, 1) 58%,
                rgba(196, 122, 108, 0.35) 63%,
                transparent 65%,
                transparent 100%
            ) !important;
            background-color: currentColor !important;
            background-size: 220% 100% !important;
            background-position: var(--shine-pos) 50% !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            transition: --shine-pos 1.1s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .hover-warm { transition: color 0.25s ease; }
        /* Icon-only buttons: animate color so material-symbols / svg icons also glow */
        .hover-warm-icon { transition: color 0.25s ease; }
        .hover-warm-icon:hover { color: #f0b860; }

        /* ── Ghost button ── */

            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.5), 0 0 32px rgba(232, 168, 76, 0.12);

            letter-spacing: 0.15em;

            border: 1px solid rgba(232, 168, 76, 0.3);
        }

        /* ── Landing option pills ── */
        .void-opt {
            border: 1px solid rgba(232, 168, 76, 0.15);
            background: rgba(35, 32, 24, 0.4);
            color: rgba(237, 232, 224, 0.6);
            border-radius: 9999px;

        /* ── Textarea focus ── */

            'help.a.what':       { en: 'LIFEE is a multi-persona dialogue tool. You describe a situation and several AI personas argue from different perspectives — giving you angles, advice, and pushback to help you think a problem through.', zh: 'LIFEE 是一个多角色对话工具。你描述一个处境，几位 AI 角色从不同立场发声——给你视角、建议与质疑，帮你把一件事想透。' },

            'help.a.multi':      { en: 'A single voice is easy to get trapped in. Multiple personas challenge, extend, and contradict each other — you see the problem more clearly than thinking alone.', zh: '单一视角容易让人陷进去。多个角色之间会质疑、补充、反驳——比一个人反复想更能看清问题。' },

            // Persona dossier — decisionStyle
            'persona.audrey-hepburn.decisionStyle': { en: "Choose the simplest graceful option: protect your dignity, keep your promise, and make one small act of kindness that moves the story forward.", zh: "选最简单也最优雅的选项：守住尊严、兑现承诺、做一件小小的善意之事，让故事往前推进一步。" },
            'persona.krishnamurti.decisionStyle':   { en: "Never gives answers. Only questions. Points you back to look at the problem itself, not solutions.", zh: "从不给答案，只给问题。把你引回到问题本身，而不是解决方案上。" },
            'persona.lacan.decisionStyle':          { en: "Responds to questions with questions. No comfort, no advice. Cuts through certainty to let the unconscious speak.", zh: "以问题回应问题。不给安慰，不给建议。切开你的确信，让无意识开口。" },
            'persona.buffett.decisionStyle':        { en: "Slow down, ignore noise, and ask the plain question: what is the real value here, what are the downside risks, and can you hold this choice for a long time?", zh: "慢下来，忽略噪音，问最朴素的问题：真正的价值在哪，下行风险是什么，这个选择你能长期持有吗？" },
            'persona.munger.decisionStyle':         { en: "Invert the problem, check incentives, and test the idea from several disciplines before trusting your first conclusion.", zh: "把问题反过来看，检查激励机制，用多个学科的视角交叉检验，再去相信你的第一个结论。" },
            'persona.drucker.decisionStyle':        { en: "Ask the right questions before seeking answers: What are your strengths? What are your values? Where do you belong? What can you contribute?", zh: "找答案之前先问对问题：你的长处是什么？你的价值观是什么？你属于哪里？你能贡献什么？" },
            'persona.welch.decisionStyle':          { en: "Face reality as it is, not as you wish it were. Make a decision and go — a wrong decision fast beats no decision at all.", zh: "看清真实的现实，而不是你希望的现实。做了决策就走——一个快的错决策也好过没决策。" },
            'persona.shannon.decisionStyle':        { en: "Strip the problem down to its information-theoretic core: what are the real signals, what is noise, and what is the minimum you need to decide?", zh: "把问题剥到信息论的骨架：什么是真信号、什么是噪音、做决策的最少信息量是多少？" },
            'persona.turing.decisionStyle':         { en: "Reduce the problem to a formal procedure: can you write an algorithm for this decision? If not, where does the undecidability lie?", zh: "把问题化为形式化过程：这个决策你能写成算法吗？写不了的话，不可判定性在哪？" },
            'persona.vonneumann.decisionStyle':     { en: "Model the decision as a game: who are the players, what are their strategies, and what is the equilibrium? Then calculate.", zh: "把决策建模成一局博弈：玩家是谁、策略是什么、均衡点在哪？然后去算。" },

            // Persona dossier — voice (first-person utterance)

            'persona.krishnamurti.voice':    { en: "Are you really asking, or seeking confirmation? Don't accept what I say — look for yourself.", zh: "你是在真的发问，还是在寻求确认？不要接受我说的——自己去看。" },
