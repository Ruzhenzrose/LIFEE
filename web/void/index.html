                                class="absolute top-4 right-4 w-9 h-9 rounded-full bg-black/40 backdrop-blur-sm hover:bg-black/60 flex items-center justify-center text-white/70 hover:text-white transition-colors"
                                aria-label="Close"
                            >
                                <span class="material-symbols-outlined" style=${{ fontSize: '20px' }}>close</span>
                            </button>

                            <div class="absolute left-8 bottom-6 right-8">
                                <p class="text-[10px] text-primary uppercase tracking-[0.3em] font-bold mb-2">${persona.role || t('detail.dossier')}</p>
                                <h2 class="font-headline text-4xl md:text-5xl font-bold text-white leading-[1.05]">${persona.name}</h2>
                            </div>

                        <!-- Body: scrollable sections -->

                                    <p class="font-headline text-xl italic text-on-surface leading-snug relative pl-6">${persona.worldview}</p>
                                </div>

                            <!-- Prose sections -->
                            ${sections.map((s, i) => html`

                                    <div class="flex items-baseline gap-4 mb-3">
                                        <p class="text-[10px] text-on-surface-variant/40 uppercase tracking-[0.3em] font-bold">N° 0${i + 1}</p>
                                        <h3 class="font-headline text-sm font-bold text-on-surface/90 uppercase tracking-widest">${s.label}</h3>
                                        <div class="flex-1 h-px bg-on-surface/8"></div>
                                    </div>
                                    <p class=${`text-sm leading-relaxed ${s.italic ? 'italic text-on-surface-variant' : 'text-on-surface/85'}`}>${s.body}</p>
                                </div>
                            `)}

                            <!-- Life Context (timeline-ish) -->
                            ${persona.lifeContext && persona.lifeContext.length ? html`
                                <div>
                                    <div class="flex items-baseline gap-4 mb-5">
                                        <p class="text-[10px] text-on-surface-variant/40 uppercase tracking-[0.3em] font-bold">N° 0${sections.length + 1}</p>
                                        <h3 class="font-headline text-sm font-bold text-on-surface/90 uppercase tracking-widest">${t('detail.lifeContext')}</h3>
                                        <div class="flex-1 h-px bg-on-surface/8"></div>
                                    </div>
                                    <div class="space-y-5">
                                        ${persona.lifeContext.map((ctx, i) => html`
                                            <div key=${i} class="grid grid-cols-[auto_1fr] gap-6 items-start">
                                                <p class="font-headline text-xs font-bold text-primary/70 uppercase tracking-wider w-32 shrink-0 pt-0.5">${ctx.period}</p>
                                                <p class="text-sm text-on-surface/80 leading-relaxed">${ctx.detail}</p>

                        </div>

                        <!-- Footer: add/remove CTA -->
                        <div class="px-8 py-5 border-t border-white/8 bg-surface-container-low/60 shrink-0 flex items-center justify-between gap-4">

        // ══════════════════════════════════════════════
        //  ACCOUNT MODAL — display name, avatar, password reset, sign out
        // ══════════════════════════════════════════════
        function AccountModal({ isOpen, onClose, user, onSignOut, userAvatar, onUserAvatarChange }) {
            const [displayName, setDisplayName] = useState('');
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState('');
            // `saved` flips the Save button label to Saved after a successful
            // save. Editing the input resets it back to Save.
            const [saved, setSaved] = useState(false);

            useEffect(() => {
                let mounted = true;
                (async () => {
                    if (!isOpen || !user) return;
                    setStatus(''); setSaved(false);
                    // Prefer auth user_metadata (authoritative, survives RLS issues);
                    // fall back to the profiles mirror and then email-local-part.
                    let fromProfiles = '';
                    try {
                        const { data } = await supabaseClient
                            .from('profiles').select('display_name').eq('id', user.id).maybeSingle();
                        fromProfiles = data?.display_name || '';
                    } catch (_) { /* table missing / RLS — ignore */ }
                    if (!mounted) return;
                    setDisplayName(
                        user.user_metadata?.name
                        || fromProfiles
                        || user.email?.split('@')[0]
                        || ''
                    );
                })();
                return () => { mounted = false; };
            }, [isOpen, user?.id]);

            if (!isOpen) return null;

            const saveProfile = async () => {
                if (!user) return;
                setLoading(true); setStatus('');
                try {
                    const next = (displayName || '').trim() || null;
                    // Primary: auth user metadata. Not affected by RLS, synced via
                    // session so every component reading user.user_metadata.name
                    // (sidebar card, etc.) updates on the next auth state change.
                    const { data: updated, error: authErr } =
                        await supabaseClient.auth.updateUser({ data: { name: next } });
                    if (authErr) throw authErr;
                    // Best-effort mirror into profiles table (may fail on RLS /
                    // missing table — that's fine, the auth metadata is the source
                    // of truth for display name now).
                    try {
                        await supabaseClient.from('profiles')
                            .upsert({ id: user.id, email: user.email, display_name: next }, { onConflict: 'id' });
                    } catch (_) {}
                    // Broadcast so App's setUser picks up the fresh metadata
                    // without waiting for a full auth state change round-trip.
                    if (updated?.user) {
                        window.dispatchEvent(new CustomEvent('lifee:user-updated', { detail: updated.user }));
                    }
                    setSaved(true);
                } catch (e) { setStatus(e?.message || 'Save failed'); setSaved(false); }
                finally { setLoading(false); }
            };

            const resetPassword = async () => {
                if (!user?.email) return;
                setLoading(true); setStatus('');
                try {
                    const { error } = await supabaseClient.auth.resetPasswordForEmail(
                        user.email, { redirectTo: window.location.href }
                    );
                    if (error) throw error;
                    setStatus(t('account.passwordEmailSent'));
                } catch (e) { setStatus(e?.message || 'Send failed'); }
                finally { setLoading(false); }
            };

            const handleAvatarUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                setStatus('');
                try {
                    const url = await fileToDataURL(file);
                    window.saveUserAvatar?.(url);
                    onUserAvatarChange?.(url);
                    setStatus('Avatar updated');
                } catch (err) { setStatus(err?.message || 'Upload failed'); }
                finally { e.target.value = ''; }
            };

            const useRandomAvatar = () => {
                setStatus('');
                window.saveUserAvatar?.(null);
                const next = window.rotateUserDefaultAvatar?.() || '✨';
                onUserAvatarChange?.(next);
                setStatus('Switched to a random default icon');
            };

            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>
                    <div class="relative w-full max-w-md mx-4 glass-card rounded-3xl p-8 animate-in iridescent-border">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="font-headline text-lg font-bold text-on-surface">${t('account.title')}</h2>
                            <button onClick=${onClose} class="w-8 h-8 rounded-full btn-ghost flex items-center justify-center">
                                <${Icon} name="X" size=${14} />
                            </button>
                        </div>

                        <div class="space-y-5">
                            <!-- Avatar row -->
                            <div class="p-4 rounded-2xl bg-surface-container border border-outline/20">
                                <div class="flex items-center gap-4">
                                    <${AvatarDisplay} avatar=${userAvatar || '👤'} size=${52} />
                                    <div class="flex-1 min-w-0">
                                        <p class="text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/60 mb-1">${t('account.avatar')}</p>
                                        <p class="text-xs text-on-surface-variant/80 leading-snug">${t('account.avatarDesc')}</p>
                                    </div>
                                </div>
                                <div class="mt-3 grid grid-cols-2 gap-2">
                                    <label class="cursor-pointer btn-ghost rounded-xl py-2 text-[11px] text-center">
                                        <span>${t('account.upload')}</span>
                                        <input type="file" accept="image/*" class="hidden" disabled=${loading} onChange=${handleAvatarUpload} />
                                    </label>
                                    <button type="button" disabled=${loading} onClick=${useRandomAvatar}
                                        class="btn-ghost rounded-xl py-2 text-[11px] disabled:opacity-40"
                                    >${t('account.randomDefault')}</button>
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="p-4 rounded-2xl bg-surface-container border border-outline/20">
                                <p class="text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/60 mb-1">${t('account.email')}</p>
                                <p class="text-sm text-on-surface break-all">${user?.email || '—'}</p>
                            </div>

                            <!-- Display name -->
                            <div class="space-y-2">
                                <p class="text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/60">${t('account.displayName')}</p>
                                <input
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                    value=${displayName}
                                    onInput=${(e) => { setDisplayName(e.target.value); if (saved) setSaved(false); }}
                                    placeholder=${t('account.namePlaceholder')}
                                />
                                <button onClick=${saveProfile} disabled=${loading || saved}
                                    class="w-full btn-gradient rounded-xl py-3 text-sm disabled:opacity-60"
                                >${loading ? t('account.working') : (saved ? t('account.saved') : t('account.save'))}</button>
                            </div>

                            <!-- Password + Sign out -->
                            <div class="grid grid-cols-2 gap-3">
                                <button onClick=${resetPassword} disabled=${loading || !user}
                                    class="btn-ghost rounded-xl py-3 text-xs disabled:opacity-40"
                                >${t('account.resetPassword')}</button>
                                <button onClick=${() => { onSignOut?.(); onClose?.(); }}
                                    class="btn-ghost rounded-xl py-3 text-xs text-tertiary/80 hover:text-tertiary"
                                >${t('account.signOut')}</button>
                            </div>

                            ${status ? html`<p class="text-xs text-primary/80">${status}</p>` : null}
                        </div>
                    </div>
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  PROFILE MODAL — user_memory editor
        // ══════════════════════════════════════════════
        const DEFAULT_USER_MEMORY_TEMPLATE = `# USER.md - About You\n\n## Facts\n*Stable info: age, job, city, family, education*\n\n## Events\n*Current or recent: job change, decisions, recent experiences*\n\n## Insights\n*Self-realizations: "I realized I'm afraid of failure"*\n\n## Preferences\n*Communication style, response depth, topics to avoid*\n\n## Advice\n*Advice given by personas that you accepted or rejected*\n\n---\n*This file records information you share in conversations, helping personas understand you better.*\n`;

        function ProfileModal({ isOpen, onClose, user }) {
            const [content, setContent] = useState('');
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState('');
            const [editing, setEditing] = useState(false);
            // Name mirrors user.user_metadata.name. Hidden entirely for users
            // who haven't set a name yet (fresh signups) — they fill it in the
            // Account modal first. Once a name exists, either modal can edit it.
            const initialName = user?.user_metadata?.name || '';
            const [nameDraft, setNameDraft] = useState(initialName);
            const showNameField = Boolean(initialName);

            useEffect(() => {
                let mounted = true;
                (async () => {
                    if (!isOpen || !user) return;
                    setStatus(''); setEditing(false);
                    setNameDraft(user.user_metadata?.name || '');
                    const { data } = await supabaseClient.from('profiles').select('user_memory').eq('id', user.id).maybeSingle();
                    if (!mounted) return;
                    setContent(data?.user_memory || DEFAULT_USER_MEMORY_TEMPLATE);
                })();
                return () => { mounted = false; };
            }, [isOpen, user?.id]);

            if (!isOpen) return null;

            const saveMemory = async () => {
                if (!user) return;
                setLoading(true); setStatus('');
                try {
                    // If the name changed, push it to auth metadata first so
                    // sidebar / AccountModal see it on the next render.
                    const nextName = (nameDraft || '').trim();
                    if (showNameField && nextName !== initialName) {
                        const { data: updated, error: authErr } =
                            await supabaseClient.auth.updateUser({ data: { name: nextName || null } });
                        if (authErr) throw authErr;
                        if (updated?.user) {
                            window.dispatchEvent(new CustomEvent('lifee:user-updated', { detail: updated.user }));
                        }
                    }
                    const { error } = await supabaseClient.from('profiles')
                        .upsert({ id: user.id, user_memory: content }, { onConflict: 'id' });
                    if (error) throw error;
                    setStatus(t('account.saved'));
                    setEditing(false);
                } catch (e) { setStatus(e?.message || 'Save failed'); }
                finally { setLoading(false); }
            };

            const resetMemory = () => {
                if (!confirm(t('profile.confirmReset'))) return;
                setContent(DEFAULT_USER_MEMORY_TEMPLATE);
                setEditing(true);
            };

            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>
                    <div class="relative w-full max-w-2xl mx-4 glass-card rounded-3xl p-8 animate-in iridescent-border" style=${{ maxHeight: '85vh', display: 'flex', flexDirection: 'column' }}>
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="font-headline text-lg font-bold text-on-surface">${t('profile.title')}</h2>
                            <button onClick=${onClose} class="w-8 h-8 rounded-full btn-ghost flex items-center justify-center">
                                <${Icon} name="X" size=${14} />
                            </button>
                        </div>
                        <p class="text-xs text-on-surface-variant/70 mb-4 leading-relaxed">
                            ${t('profile.desc')}
                        </p>
                        ${showNameField ? html`
                            <div class="mb-4">
                                <p class="text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/60 mb-1.5">${t('profile.name')}</p>
                                <input
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                    value=${nameDraft}
                                    onInput=${(e) => { setNameDraft(e.target.value); setEditing(true); }}
                                    placeholder=${t('account.namePlaceholder')}
                                />
                            </div>
                        ` : null}
                        <textarea
                            class="flex-1 min-h-[320px] w-full p-4 bg-surface-container border border-outline/30 text-on-surface rounded-2xl text-xs md:text-sm leading-relaxed focus:outline-none focus:border-primary/50 void-textarea font-mono"
                            value=${content}
                            onInput=${(e) => { setContent(e.target.value); setEditing(true); }}
                            placeholder=${t('profile.placeholder')}
                        ></textarea>
                        <div class="flex gap-3 mt-4">
                            <button onClick=${saveMemory} disabled=${loading || !editing || !user}
                                class="flex-1 btn-gradient rounded-xl py-3 text-sm disabled:opacity-40"
                            >${loading ? t('profile.saving') : t('profile.save')}</button>
                            <button onClick=${resetMemory} disabled=${loading}
                                class="btn-ghost rounded-xl py-3 px-6 text-sm disabled:opacity-40"
                            >${t('profile.reset')}</button>
                        </div>
                        ${status ? html`<p class="text-xs text-primary/80 mt-2">${status}</p>` : null}
                    </div>
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  SHARE CHAT MODAL — copy or download current chat
        // ══════════════════════════════════════════════
        function ShareChatModal({ isOpen, onClose, shareText }) {
            const [status, setStatus] = useState('');
            if (!isOpen) return null;

            const doCopy = async () => {
                setStatus('');
                const ok = await (window.copyToClipboard ? window.copyToClipboard(shareText || '') : Promise.resolve(false));
                setStatus(ok ? t('share.copied') : 'Copy failed (please copy manually)');
            };

            const doDownload = () => {
                try {
                    const blob = new Blob([shareText || ''], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `lifee-chat-${Date.now()}.txt`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(url);
                    setStatus(t('share.downloaded'));
                } catch (e) { setStatus(e?.message || 'Download failed'); }
            };

            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>
                    <div class="relative w-full max-w-2xl mx-4 glass-card rounded-3xl p-8 animate-in iridescent-border">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="font-headline text-lg font-bold text-on-surface">${t('share.title')}</h2>
                            <button onClick=${onClose} class="w-8 h-8 rounded-full btn-ghost flex items-center justify-center">
                                <${Icon} name="X" size=${14} />
                            </button>
                        </div>
                        <textarea
                            readOnly
                            class="w-full h-72 p-4 bg-surface-container border border-outline/30 text-on-surface-variant rounded-2xl text-xs leading-relaxed focus:outline-none void-textarea font-mono"
                            value=${shareText || '(no messages yet)'}
                        ></textarea>
                        <div class="flex gap-3 mt-4">
                            <button onClick=${doCopy} class="flex-1 btn-gradient rounded-xl py-3 text-sm">${t('share.copy')}</button>
                            <button onClick=${doDownload} class="flex-1 btn-ghost rounded-xl py-3 text-sm">${t('share.download')}</button>
                        </div>
                        ${status ? html`<p class="text-xs text-primary/80 mt-2">${status}</p>` : null}
                    </div>
                </div>
            `;
        }

        const PERSONA_EMOJIS = ['👤','🎭','🛡️','🌱','🦉','💎','🌩️','🌊','🔥','🎀','🧸','☁️','🌸','🔮','⚡','🦋','🌙','🪐','🍀','🕯️'];

            const [draft, setDraft] = useState(null);

                if (!isOpen) return;

        function MyPersonasView({ onBack, personas, favoritePersonas, toggleFavoritePersona, onSaveCustom, onDeleteCustom, openConfirm }) {
            const [category, setCategory] = useState('ALL');
            const [editOpen, setEditOpen] = useState(false);
            const [editTarget, setEditTarget] = useState(null);
            const filtered = category === 'ALL'
                ? personas
                : category === 'CUSTOM'
                    ? personas.filter(p => p.isCustom)
                    : personas.filter(p => p.category === category);

            const openCreate = () => { setEditTarget(null); setEditOpen(true); };
            const openEdit = (p) => { setEditTarget(p); setEditOpen(true); };
            const handleDelete = (p) => {
                const doDelete = () => onDeleteCustom?.(p.id);
                if (openConfirm) {
                    openConfirm({
                        title: t('personas.confirmDelete').replace('%s', p.name),
                        message: t('personas.confirmDeleteDesc'),
                        confirmLabel: t('common.delete'),
                        cancelLabel: t('common.cancel'),
                        destructive: true,
                        onConfirm: doDelete,

                    if (!confirm(t('personas.confirmDelete').replace('%s', p.name))) return;

            return html`

                                        </div>
                                    ` : null}
                                </div>
                            `;
                        })}
                        ${filtered.length === 0 ? html`
                            <div class="col-span-full text-center py-12 text-sm text-on-surface-variant/50 italic">
                                ${t('personas.empty')}

                    </div>

                        isOpen=${editOpen}
                        persona=${editTarget}
                        onClose=${() => setEditOpen(false)}

        }

                                            <p class="text-sm font-semibold text-on-surface mb-2">${faq.q}</p>
                                            <p class="text-[13px] text-on-surface-variant/75 leading-relaxed">${faq.a}</p>
                                        </div>
                                    `)}
                                </div>
                            </div>
                        `)}
                    </div>

                    <!-- Footer CTA -->
                    <div class="mt-12 pt-8 border-t border-on-surface/8 flex items-center justify-between gap-4">
                        <p class="text-sm text-on-surface-variant/70">${t('help.feedbackCta')}</p>
                        <button
                            onClick=${() => onOpenFeedback?.()}
                            class="btn-gradient rounded-full px-5 py-2.5 text-xs font-semibold flex items-center gap-2 shrink-0"
                        >
                            <span class="material-symbols-outlined" style=${{ fontSize: '14px' }}>feedback</span>
                            <span>${t('nav.feedback')}</span>
                        </button>
                    </div>
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  COMMUNITY VIEW (stub)
        // ══════════════════════════════════════════════
        function CommunityView({ onBack }) {
            return html`<${PlaceholderView} title="Community" icon="Globe" onBack=${onBack} />`;
        }

        // ══════════════════════════════════════════════
        //  buildShareText — format sessionMessages for export
        // ══════════════════════════════════════════════
        function buildShareText(messages, personas) {
            const personaMap = {};
            (personas || []).forEach(p => { personaMap[p.id] = p; });
            const roleLabel = (pid) => {
                if (pid === 'user') return 'YOU';
                if (pid === 'system') return 'SYSTEM';
                if (pid === 'lifee-followup') return 'FOLLOW-UP';
                const p = personaMap[pid];
                return (p?.name || pid || 'UNKNOWN').toUpperCase();
            };
            const body = (messages || [])
                .filter(m => m && m.text && m.personaId !== 'lifee-followup')
                .map(m => `${roleLabel(m.personaId)}: ${m.text}`)
                .join('\n\n');
            return [
                'LIFEE Chat Export',
                `Date: ${new Date().toISOString()}`,
                '',
                body || '(no messages yet)',
            ].join('\n');
        }

        // ══════════════════════════════════════════════
        //  MAIN APP
        // ══════════════════════════════════════════════
        function App() {
            // Subscribe App to locale changes so every descendant re-renders
            // (and picks up fresh t() strings) on toggle.
            useLocale();
            const [view, setView] = useState('home');
            const [context, setContext] = useState({ situation: '', landingPeriods: [] });
            const _NO_KNOWLEDGE = new Set(['serene', 'architect', 'rebel', 'caretaker', 'tarot-master']);
            const [personas, setPersonas] = useState(INITIAL_PERSONAS.filter(p => !_NO_KNOWLEDGE.has(p.id)));
            const [selectedIds, setSelectedIds] = useState([]);
            // Hydrate from the Supabase token already sitting in localStorage so
            // the first paint knows the user is signed in — skipping the flash
            // of "Not signed in" while supabase.auth.getSession() resolves.
            const [user, setUser] = useState(() => window.__lifeePreload?.user || null);
            const [isGuest, setIsGuest] = useState(false);
            const [authOpen, setAuthOpen] = useState(false);
            const [redeemOpen, setRedeemOpen] = useState(false);
            const [feedbackOpen, setFeedbackOpen] = useState(false);
            const [shareOpen, setShareOpen] = useState(false);
            const [shareText, setShareText] = useState('');
            const openShare = useCallback(({ messages, personas: personasForShare } = {}) => {
                const text = buildShareText(messages || [], personasForShare || []);
                setShareText(text);
                setShareOpen(true);
            }, []);
            const [confirmState, setConfirmState] = useState({ isOpen: false });
            const openConfirm = useCallback((opts) => {
                setConfirmState({ isOpen: true, ...opts });
            }, []);
            const closeConfirm = useCallback(() => {
                setConfirmState(s => ({ ...s, isOpen: false }));
            }, []);
            const [userAvatar, setUserAvatar] = useState(() => {
                try { return window.localStorage.getItem('lifee_user_avatar') || null; } catch (_) { return null; }
            });
            const [sessionId, setSessionId] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [hasEnteredDebate, setHasEnteredDebate] = useState(false);
            useEffect(() => { if (view === 'debate') setHasEnteredDebate(true); }, [view]);
            const [sessionMessages, setSessionMessages] = useState([]);
            const [sessionOptions, setSessionOptions] = useState([]);
            const [sessionSummaries, setSessionSummaries] = useState([]);
            // Hydrate sidebar instantly from localStorage; /sessions fetch
            // refreshes in the background. Keyed by userId so a signed-out
            // visit doesn't reveal a previous user's sessions.
            const chatSessionsCacheKey = (uid) => `lifee_chat_sessions_cache_${uid || 'guest'}`;
            const [chatSessions, setChatSessions] = useState(() => {
                try {
                    const uid = window.__lifeePreload?.userId || '';
                    const raw = window.localStorage.getItem(chatSessionsCacheKey(uid));
                    return raw ? (JSON.parse(raw) || []) : [];
                } catch (_) { return []; }
            });
            const [chatSessionsLoading, setChatSessionsLoading] = useState(false);
            // Persist chatSessions to cache on any change (star toggle, delete,
            // rename, etc.) so the next visit hydrates with the latest state.
            useEffect(() => {
                try {
                    const uid = user?.id || window.__lifeePreload?.userId || '';
                    if (!uid) return;
                    window.localStorage.setItem(chatSessionsCacheKey(uid), JSON.stringify(chatSessions || []));
                } catch (_) {}
            }, [chatSessions, user?.id]);
            const [favoritePersonas, setFavoritePersonas] = useState([]);
            const [personaAssets, setPersonaAssets] = useState({});
            const [personaAvatarOverrides, setPersonaAvatarOverrides] = useState(() => {
                try { return JSON.parse(window.localStorage.getItem('lifee_persona_avatar_overrides') || '{}'); } catch (_) { return {}; }
            });
            const [personaCoverOverrides, setPersonaCoverOverrides] = useState(() => {
                try { return JSON.parse(window.localStorage.getItem('lifee_persona_cover_overrides') || '{}'); } catch (_) { return {}; }
            });
            const [personaCatalogKnowledge, setPersonaCatalogKnowledge] = useState({});
            const [customPersonas, setCustomPersonas] = useState(() => {
                try { return JSON.parse(window.localStorage.getItem('lifee_custom_personas') || '[]'); } catch (_) { return []; }
            });
            useEffect(() => {
                try { window.localStorage.setItem('lifee_custom_personas', JSON.stringify(customPersonas || [])); } catch (_) {}
            }, [customPersonas]);
            const upsertCustomPersona = useCallback((p) => {
                if (!p?.id) return;
                setCustomPersonas(prev => {
                    const idx = prev.findIndex(x => x.id === p.id);
                    if (idx >= 0) {
                        const next = [...prev]; next[idx] = { ...prev[idx], ...p }; return next;
                    }
                    return [...prev, p];
                });
            }, []);
            const deleteCustomPersona = useCallback((id) => {
                setCustomPersonas(prev => prev.filter(p => p.id !== id));
                setSelectedIds(prev => prev.filter(x => x !== id));
                setFavoritePersonas(prev => prev.filter(p => p.id !== id));
            }, []);
            const [summaryEvery] = useState(SUMMARY_EVERY_DEFAULT);
            const [contextWindow] = useState(CONTEXT_WINDOW_DEFAULT);

            const sessionMessagesRef = useRef([]);
            useEffect(() => { sessionMessagesRef.current = sessionMessages; }, [sessionMessages]);

            // Persist userAvatar
            useEffect(() => {
                try { if (userAvatar) window.localStorage.setItem('lifee_user_avatar', userAvatar); } catch (_) {}
            }, [userAvatar]);

            // Persist favorites
            useEffect(() => {
                try { window.localStorage.setItem('lifee_favorite_personas', JSON.stringify(favoritePersonas || [])); } catch (_) {}
            }, [favoritePersonas]);

            // Persist overrides
            useEffect(() => {
                try { window.localStorage.setItem('lifee_persona_avatar_overrides', JSON.stringify(personaAvatarOverrides || {})); } catch (_) {}
            }, [personaAvatarOverrides]);
            useEffect(() => {
                try { window.localStorage.setItem('lifee_persona_cover_overrides', JSON.stringify(personaCoverOverrides || {})); } catch (_) {}
            }, [personaCoverOverrides]);

            // Auth init
            useEffect(() => {
                let mounted = true;
                (async () => {
                    const { data } = await supabaseClient.auth.getSession();
                    if (mounted) setUser(data?.session?.user || null);
                })();
                const { data: sub } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user || null);
                    if (session?.user) setIsGuest(false);
                });
                // In-app fast path: AccountModal fires this after auth.updateUser
                // so the sidebar reflects the new display name without waiting
                // for onAuthStateChange to fire.
                const onUserUpdated = (e) => {
                    if (e?.detail) setUser(e.detail);
                };
                window.addEventListener('lifee:user-updated', onUserUpdated);
                return () => {
                    mounted = false;
                    sub?.subscription?.unsubscribe?.();
                    window.removeEventListener('lifee:user-updated', onUserUpdated);
                };
            }, []);

            // Load favorite personas
            useEffect(() => {
                try {
                    const raw = window.localStorage.getItem('lifee_favorite_personas');
                    if (raw) setFavoritePersonas(JSON.parse(raw));
                } catch (_) {}
            }, []);

            // Upsert profile + load settings
            useEffect(() => {
                if (!user) return;
                (async () => {
                    await supabaseClient.from('profiles').upsert({
                        id: user.id,
                        email: user.email,
                        display_name: user.user_metadata?.name || null,
                        avatar_url: user.user_metadata?.avatar_url || null,
                    }, { onConflict: 'id' });

                    const { data: settings } = await supabaseClient
                        .from('user_settings').select('summary_every, context_window').eq('id', user.id).maybeSingle();
                    if (!settings) {
                        await supabaseClient.from('user_settings').insert({
                            id: user.id,
                            summary_every: SUMMARY_EVERY_DEFAULT,
                            context_window: CONTEXT_WINDOW_DEFAULT,
                        });
                    }
                })();
            }, [user]);

            // Load persona assets + chat sessions
            useEffect(() => {
                if (!user) return;
                (async () => {
                    const { data } = await supabaseClient.from('personas').select('id, avatar_url, cover_url');
                    const map = {};
                    (data || []).forEach(row => { map[row.id] = row; });
                    setPersonaAssets(map);
                })();

                (async () => {
                    setChatSessionsLoading(true);
                    try {
                        // Prefer pre-fired fetch started in <head> before React
                        // evaluated (only valid if the peeked userId matches).
                        const pre = (window.__lifeePreload?.userId === user.id)
                            ? window.__lifeePreload?.sessions
                            : null;
                        const res = pre
                            ? await pre
                            : await fetch(`/sessions?userId=${user.id}`, { credentials: 'include' }).then(r => r.json());
                        const sessions = res?.sessions || [];
                        setChatSessions(sessions);
                        try { window.localStorage.setItem(chatSessionsCacheKey(user.id), JSON.stringify(sessions)); } catch (_) {}
                    } catch (_) { setChatSessions([]); }
                    setChatSessionsLoading(false);
                })();

                // (Removed: auto-load latest session caused race condition
                //  where a new conversation would be overwritten mid-stream)
            }, [user]);

            // Load persona_catalog knowledge
            useEffect(() => {
                (async () => {
                    try {
                        const { data } = await supabaseClient.from('persona_catalog').select('id, decision_style');
                        const map = {};
                        (data || []).forEach(row => { if (row?.decision_style?.trim()) map[row.id] = row.decision_style.trim(); });
                        setPersonaCatalogKnowledge(map);
                    } catch (_) {}
                })();
            }, []);

            const refreshChatSessions = useCallback(async () => {
                if (!user) return;
                setChatSessionsLoading(true);
                try {
                    const res = await fetch(`/sessions?userId=${user.id}`, { credentials: 'include' }).then(r => r.json());
                    setChatSessions(res?.sessions || []);
                } catch (_) { setChatSessions([]); }
                setChatSessionsLoading(false);
            }, [user]);

            // Localise a persona's name/role/worldview/decisionStyle/voice/
            // lifeContext for the current locale. Custom personas skip
            // localization since they're user-created and only have original
            // text. lifeContext entries are stored as JSON in I18N and parsed
            // back into an array here.
            const localizePersona = (p) => {
                if (!p?.id || p.isCustom) return p;
                const get = (suffix) => {
                    const key = `persona.${p.id}.${suffix}`;
                    return I18N[key] ? t(key) : null;
                };
                let lifeContext = p.lifeContext;
                const rawLC = get('lifeContext');
                if (rawLC) {
                    try {
                        const parsed = JSON.parse(rawLC);
                        if (Array.isArray(parsed)) lifeContext = parsed;
                    } catch (_) {}
                }
                return {
                    ...p,
                    name:          get('name')          || p.name,
                    role:          get('role')          || p.role,
                    worldview:     get('worldview')     || p.worldview,
                    decisionStyle: get('decisionStyle') || p.decisionStyle,
                    voice:         get('voice')         || p.voice,
                    lifeContext,
                };
            };

            // Display personas (merge assets + overrides + catalog knowledge + i18n)
            const displayPersonas = [
                ...personas.map(p => {
                    const asset = personaAssets[p.id];
                    const avatarOverride = personaAvatarOverrides?.[p.id];
                    const coverOverride = personaCoverOverrides?.[p.id];
                    return localizePersona({
                        ...p,
                        avatar: avatarOverride || asset?.avatar_url || p.avatar,
                        cover_url: coverOverride || asset?.cover_url || p.cover_url || null,
                        knowledge: (p.knowledge || '').trim() || (personaCatalogKnowledge[p.id] || '').trim(),
                    });
                }),
                ...(customPersonas || []).map(p => ({ ...p, isCustom: true, category: p.category || 'CUSTOM' })),
            ];

            const buildContextBlock = useCallback(() => {
                const summaryBlock = sessionSummaries.length
                    ? sessionSummaries.map(s => `Summary(${s.start_seq}-${s.end_seq})\n${s.summary}`).join('\n\n')
                    : '';
                const latestMsgs = sessionMessages.slice(-contextWindow).map(m => `${m.role.toUpperCase()}: ${m.text}`).join('\n');
                return [summaryBlock, latestMsgs].filter(Boolean).join('\n\n');
            }, [sessionSummaries, sessionMessages, contextWindow]);

            const ensureSession = useCallback(async () => sessionId || null, [sessionId]);
            const persistMessage = useCallback(async () => {}, []);

            const handleNewSession = useCallback(async () => {
                setSessionId(null);
                setSessionMessages([]);
                setSessionSummaries([]);
                setSessionOptions([]);
                setContext({ situation: '', landingPeriods: [] });
                setSelectedIds([]);
                setView('home');
            }, []);

            // Submitting from Home always starts a fresh session (empty sessionId
            // + no restored messages). Keeps the user's just-typed situation and
            // selected personas intact so ChatArena auto-starts with them.
            const startFreshDebate = useCallback(() => {
                setSessionId(null);
                setSessionMessages([]);
                setSessionSummaries([]);
                setSessionOptions([]);
                setView('debate');
            }, []);

            const handleSignOut = useCallback(async () => {
                await supabaseClient.auth.signOut();
                setUser(null);
                setIsGuest(false);
                setView('home');
                setAuthOpen(true);
            }, []);

            const toggleFavoritePersona = useCallback((persona) => {
                if (!persona?.id) return;
                setFavoritePersonas(prev => {
                    const exists = (prev || []).some(p => p.id === persona.id);
                    return exists ? prev.filter(p => p.id !== persona.id) : [...(prev || []), persona];
                });
            }, []);

            const restoreSession = useCallback(async (s) => {
                try {
                    const res = await fetch(`/sessions/${s.id}/messages`, { credentials: 'include' }).then(r => r.json());
                    if (res?.messages) {
                        setSessionMessages(res.messages.map(m => ({ personaId: m.persona_id || m.role, text: m.content, seq: m.seq })));
                        setSessionOptions(Array.isArray(res.options) ? res.options : []);
                        setSessionId(s.id);
                        if (s.personas?.length) {
                            const ids = s.personas.map(pid => {
                                const found = displayPersonas.find(p =>
                                    p.id === pid || p.name === pid || p.id === pid.toLowerCase().replace(/\s+/g, '')
                                );
                                return found?.id;
                            }).filter(Boolean);
                            if (ids.length) setSelectedIds(ids);
                        }
                        setView('debate');
                    }
                } catch (e) { console.error('restore failed', e); }
            }, [displayPersonas]);

            const isAdmin = user?.email === ADMIN_EMAIL;

            // ── Persistent ChatArena: mounted once activated, hidden via CSS when view != debate ──
            const renderChatArena = () => {
                if (!window.VOID_VIEWS?.debate) return null;
                return window.VOID_VIEWS.debate({
                    context,
                    selectedPersonas: displayPersonas.filter(p => selectedIds.includes(p.id)),
                    allPersonas: displayPersonas,
                    setSelectedIds,
                    setView,
                    ensureSession,
                    persistMessage,
                    buildContextBlock,
                    userAvatar,
                    user,
                    initialMessages: sessionMessages,
                    initialOptions: sessionOptions,
                    parentSessionId: sessionId,
                    onSessionCreated: (id) => {
                        setSessionId(id);
                        refreshChatSessions();
                    },
                    onOpenShare: openShare,
                });
            };

            // Back = return to debate if user has an active conversation, else home
            const goBack = () => setView(hasEnteredDebate ? 'debate' : 'home');

            // ── Render content for current non-debate view ──
            const renderContent = () => {
                if (view === 'debate') {
                    // Handled by persistent ChatArena above
                    if (window.VOID_VIEWS?.debate) return null;
                    return html`<${PlaceholderView} title="Chat Arena" icon="MessageSquare" onBack=${goBack} />`;
                }

                if (view === 'settings') {
                    if (window.VOID_VIEWS?.settings) return window.VOID_VIEWS.settings({
                        user, isAdmin, onBack: goBack,
                        onSignOut: handleSignOut, onLogin: () => setAuthOpen(true),
                        userAvatar, onUserAvatarChange: (a) => setUserAvatar(a),
                    });
                    return html`<${SettingsView}
                        onBack=${goBack}
                        user=${user}
                        setView=${setView}
                        onSignOut=${handleSignOut}
                        onLogin=${() => setAuthOpen(true)}
                        userAvatar=${userAvatar}
                        onUserAvatarChange=${(a) => setUserAvatar(a)}
                    />`;
                }

                if (view === 'my-chats') {
                    if (window.VOID_VIEWS?.myChats) return window.VOID_VIEWS.myChats({
                        onBack: goBack, chatSessions, chatSessionsLoading,
                        restoreSession, refreshChatSessions,
                    });
                    return html`<${MyChatsView}
                        onBack=${goBack}
                        chatSessions=${chatSessions}
                        chatSessionsLoading=${chatSessionsLoading}
                        restoreSession=${restoreSession}
                    />`;
                }

                if (view === 'my-personas') {
                    if (window.VOID_VIEWS?.myPersonas) return window.VOID_VIEWS.myPersonas({
                        onBack: goBack, personas: displayPersonas,
                        favoritePersonas, toggleFavoritePersona,
                    });
                    return html`<${MyPersonasView}
                        onBack=${goBack}
                        personas=${displayPersonas}
                        favoritePersonas=${favoritePersonas}
                        toggleFavoritePersona=${toggleFavoritePersona}
                        onSaveCustom=${upsertCustomPersona}
                        onDeleteCustom=${deleteCustomPersona}
                        openConfirm=${openConfirm}
                    />`;
                }

                if (view === 'help') {
                    if (window.VOID_VIEWS?.help) return window.VOID_VIEWS.help({ onBack: goBack });
                    return html`<${HelpView} onBack=${goBack} onOpenFeedback=${() => setFeedbackOpen(true)} />`;
                }

                if (view === 'community') {
                    if (window.VOID_VIEWS?.community) return window.VOID_VIEWS.community({ onBack: goBack });
                    return html`<${CommunityView} onBack=${goBack} />`;
                }

                if (view === 'persona-selection') {
                    // Inline persona-selection (can also be delegated)
                    return html`<${PersonaSelectionView}
                        personas=${displayPersonas}
                        selectedIds=${selectedIds}
                        setSelectedIds=${setSelectedIds}
                        setView=${setView}
                    />`;
                }

                // Default: home
                return html`<${HomeView}
                    context=${context}
                    setContext=${setContext}
                    setView=${setView}
                    personas=${displayPersonas}
                    selectedIds=${selectedIds}
                    setSelectedIds=${setSelectedIds}
                    startFreshDebate=${startFreshDebate}
                    chatSessions=${chatSessions}
                />`;
            };

            return html`
                <div class="flex h-screen overflow-hidden bg-surface">
                    <!-- Background ambient glow -->
                    <div class="fixed inset-0 pointer-events-none z-0" aria-hidden="true">
                        <div class="absolute top-0 left-1/4 w-96 h-96 rounded-full opacity-[0.05]"
                            style=${{ background: 'radial-gradient(circle, #e8a84c 0%, transparent 70%)' }}></div>
                        <div class="absolute bottom-1/4 right-1/4 w-72 h-72 rounded-full opacity-[0.03]"
                            style=${{ background: 'radial-gradient(circle, #8a9a6c 0%, transparent 70%)' }}></div>
                        <div class="absolute top-1/2 right-0 w-64 h-64 rounded-full opacity-[0.03]"
                            style=${{ background: 'radial-gradient(circle, #c47a6c 0%, transparent 70%)' }}></div>
                    </div>

                    <!-- Sidebar -->
                    <${Sidebar}
                        view=${view}
                        setView=${setView}
                        user=${user}
                        isGuest=${isGuest}
                        onNewSession=${handleNewSession}
                        chatSessions=${chatSessions}
                        setChatSessions=${setChatSessions}
                        setSessionMessages=${setSessionMessages}
                        setSessionOptions=${setSessionOptions}
                        sessionId=${sessionId}
                        setSessionId=${setSessionId}
                        setSelectedIds=${setSelectedIds}
                        personas=${displayPersonas}
                        onLogin=${() => setAuthOpen(true)}
                        onSignOut=${handleSignOut}
                        userAvatar=${userAvatar}
                        sidebarOpen=${sidebarOpen}
                        setSidebarOpen=${setSidebarOpen}
                        onOpenRedeem=${() => setRedeemOpen(true)}
                        onOpenFeedback=${() => setFeedbackOpen(true)}
                        openConfirm=${openConfirm}
                    />

                    <!-- Main content area (no top header — editorial/masthead lives in each view) -->
                    <div class="flex-1 flex flex-col overflow-hidden relative z-10">
                        <!-- Main content -->
                        <main class="flex-1 min-h-0 overflow-hidden flex flex-col">
                            <!-- Persistent ChatArena (stays mounted once activated) -->
                            <div class=${`flex-1 min-h-0 flex flex-col overflow-hidden ${view === 'debate' ? '' : 'hidden'}`}>
                                ${(user || isGuest) && hasEnteredDebate ? renderChatArena() : null}
                            </div>
                            <!-- Non-debate views -->
                            <div class=${`flex-1 min-h-0 overflow-y-auto no-scrollbar ${view !== 'debate' ? '' : 'hidden'}`}>
                              <div class="w-full max-w-[1400px] mx-auto h-full">
                                ${(user || isGuest) ? renderContent() : html`
                                    <div class="flex flex-col items-center justify-center min-h-[80vh] gap-8 animate-in px-4 text-center">
                                        <div>
                                            <h1 class="font-headline text-5xl font-bold wordmark mb-3">LIFEE</h1>
                                            <p class="text-sm text-on-surface-variant">Your life coach and friend.</p>
                                        </div>
                                        <div class="glass-card iridescent-border rounded-3xl p-8 max-w-sm w-full">
                                            <p class="text-sm text-on-surface-variant/70 mb-6 leading-relaxed">
                                                Sign in to save sessions, manage personas, and unlock the full LIFEE experience.
                                            </p>
                                            <button
                                                onClick=${() => setAuthOpen(true)}
                                                class="w-full btn-gradient rounded-xl py-3 text-sm font-bold mb-3"
                                            >Sign In / Sign Up</button>
                                            <button
                                                onClick=${() => setIsGuest(true)}
                                                class="w-full btn-ghost rounded-xl py-3 text-sm"
                                            >${t('auth.guest')}</button>
                                        </div>
                                    </div>
                                `}
                              </div>
                            </div>
                        </main>
                    </div>

                    <!-- Auth modal -->
                    <${AuthModal}
                        isOpen=${authOpen || (!user && !isGuest)}
                        onClose=${() => setAuthOpen(false)}
                        onAuthed=${(u) => { setUser(u); setIsGuest(false); setAuthOpen(false); }}
                        onGuest=${() => { setIsGuest(true); setAuthOpen(false); }}
                    />

                    <!-- Redeem modal (app-level so any view can trigger it) -->
                    <${RedeemModal}
                        isOpen=${redeemOpen}
                        onClose=${() => setRedeemOpen(false)}
                        user=${user}
                    />

                    <!-- Feedback modal -->
                    <${FeedbackModal}
                        isOpen=${feedbackOpen}
                        onClose=${() => setFeedbackOpen(false)}
                        user=${user}
                    />

                    <!-- Share-chat modal — opened from the chat More (⋮) menu -->
                    <${ShareChatModal}
                        isOpen=${shareOpen}
                        onClose=${() => setShareOpen(false)}
                        shareText=${shareText}
                    />

                    <!-- Themed confirm modal (replaces window.confirm) -->
                    <${ConfirmModal}
                        state=${confirmState}
                        onClose=${closeConfirm}
                    />
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  PERSONA SELECTION (full page variant)
        // ══════════════════════════════════════════════
        function PersonaSelectionView({ personas, selectedIds, setSelectedIds, setView }) {
            const [category, setCategory] = useState('ALL');
            const filtered = category === 'ALL' ? personas : personas.filter(p => p.category === category);

            return html`
                <div class="animate-in w-full flex flex-col items-center pt-10 pb-32 px-4">
                    <h2 class="font-headline text-2xl font-bold text-on-surface mb-2">Assemble the Council</h2>
                    <p class="text-xs text-on-surface-variant/50 mb-8 uppercase tracking-widest">Select voices for your debate</p>

                    <div class="flex gap-1.5 mb-8 flex-wrap justify-center">
                        ${['ALL', 'CREATIVE', 'RATIONAL', 'SUPPORT', 'CUSTOM'].map(cat => html`
                            <button
                                key=${cat}
                                onClick=${() => setCategory(cat)}
                                class=${`px-3 py-1.5 rounded-full text-[9px] font-bold uppercase tracking-wider transition-all
                                    ${category === cat ? 'bg-primary/20 text-primary border border-primary/30' : 'text-on-surface-variant/50 hover:text-primary'}`}
                            >${cat}</button>
                        `)}
                    </div>

                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 w-full max-w-5xl">
                        ${filtered.map(p => {
                            const isSel = selectedIds.includes(p.id);
                            return html`
                                <div
                                    key=${p.id}
                                    class=${`persona-card relative glass-card rounded-2xl p-4 cursor-pointer flex flex-col gap-3
                                        ${isSel ? 'border-primary/40 bg-primary/5' : ''}`}
                                    onClick=${() => setSelectedIds(prev =>
                                        prev.includes(p.id) ? prev.filter(id => id !== p.id) : [...prev, p.id]
                                    )}
                                >
                                    <div class=${`absolute top-3 right-3 w-5 h-5 rounded-full border flex items-center justify-center transition-all
                                        ${isSel ? 'bg-primary border-primary' : 'border-outline/30'}`}>
                                        ${isSel && html`<${Icon} name="Check" size=${10} className="text-on-primary" />`}
                                    </div>
                                    <div class="w-10 h-10 rounded-xl bg-surface-container flex items-center justify-center text-xl overflow-hidden">
                                        <${AvatarDisplay} avatar=${p.avatar} size=${40} />
                                    </div>
                                    <div>
                                        <p class="text-xs font-bold text-on-surface uppercase tracking-tight">${p.name}</p>
                                        <p class="text-[9px] text-primary/60 uppercase tracking-wide">${p.role}</p>
                                    </div>
                                    <p class="text-[10px] text-on-surface-variant/50 italic line-clamp-2">"${p.worldview}"</p>
                                </div>
                            `;
                        })}
                    </div>

                    ${selectedIds.length >= 1 && html`
                        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 animate-in">
                            <button
                                onClick=${() => setView('debate')}
                                class="btn-gradient px-10 py-4 rounded-full text-xs font-bold uppercase tracking-widest"
                                style=${{ boxShadow: '0 8px 32px rgba(232,168,76,0.35)' }}
                            >
                                Begin · ${selectedIds.length} ${selectedIds.length === 1 ? 'voice' : 'voices'}
                            </button>
                        </div>
                    `}
                </div>
            `;
        }

        // ── Mount ──
        window.VOID_VIEWS = window.VOID_VIEWS || {};

        const container = document.getElementById('void-root');
        const root = ReactDOM.createRoot(container);
        root.render(React.createElement(App));
    })();
    </script>

    <!-- Warm-shine: cursor-tracked enter (band parks under the pointer), same-direction exit -->
    <script>
    (function () {
        const SHINE_TAGS = new Set([
            'H1','H2','H3','H4','H5','H6','P','A','SPAN','STRONG','EM','CODE',
            'SMALL','B','I','LI','DT','DD','BLOCKQUOTE','LABEL','BUTTON','TH','TD'
        ]);
        const SWEEP_MS = 1100;

        // Emoji / pictographs rely on colour fonts. background-clip:text would force them into
        // a solid currentColor silhouette (white when text is white, etc.), so skip any leaf whose
        // text contains one — keeps native emoji colours at the cost of no shine for those elements.
        const EMOJI_RE = /\p{Extended_Pictographic}/u;

        function isLeafText(el) {
            if (!el || !el.tagName) return false;
            if (!SHINE_TAGS.has(el.tagName)) return false;
            if (el.classList.contains('no-shine')) return false;
            // .btn-gradient already has its own gold background + dark text; shine would
            // override the background and make the dark text unreadable.
            if (el.classList.contains('btn-gradient')) return false;
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') return false;
            for (const child of el.children) {
                const t = child.tagName;
                if (t !== 'BR' && t !== 'WBR') return false;
            }
            if (EMOJI_RE.test(el.textContent || '')) return false;
            return true;
        }

        // Auto-split a multi-line leaf into one <span> per visual line so the
        // shine band can target the line under the cursor (not the whole block).
        // Runs once per element on first hover; loses inline text-level styling
        // (<em>, <strong>, etc.) because we re-emit as plain-text spans.
        //
        // React-rendered children that are purely text (no nested formatting)
        // round-trip cleanly; if React later re-renders the same element, the
        // split is wiped and we re-split on the next hover.
        function splitLeafIntoLines(el) {
            if (el._shineSplit) return;
            const text = el.textContent;
            if (!text || text.trim().length === 0) return;
            const P = window.Pretext;
            if (!P || !P.prepareWithSegments) return;
            const width = el.offsetWidth;
            if (!width || width < 10) return;
            const cs = getComputedStyle(el);
            const fontStr = `${cs.fontStyle || 'normal'} ${cs.fontWeight || '400'} ${cs.fontSize} ${cs.fontFamily}`;
            const lh = parseFloat(cs.lineHeight);
            const fs = parseFloat(cs.fontSize);
            const lineHeightPx = Number.isFinite(lh) ? lh : (Number.isFinite(fs) ? fs * 1.35 : 20);
            // Safety check: if the element is currently rendered as a single line
            // (its actual height ≈ one line-height), don't split. Pretext's glyph
            // metrics can disagree slightly with the browser's layout and cause
            // false-positive wraps on tight headings like "LIFEE".
            if (el.offsetHeight < lineHeightPx * 1.5) {
                el._shineSplit = true;
                return;
            }
            try {
                const prepared = P.prepareWithSegments(text, fontStr, { whiteSpace: cs.whiteSpace || 'normal' });
                const out = P.layoutWithLines(prepared, width, lineHeightPx);
                const lines = (out.lines || []).map(l => l.text);
                if (lines.length < 2) { el._shineSplit = true; return; }
                el.innerHTML = '';
                lines.forEach((line, i) => {
                    if (i > 0) el.appendChild(document.createElement('br'));
                    const span = document.createElement('span');
                    span.textContent = line;
                    el.appendChild(span);
                });
                el._shineSplit = true;
            } catch (_) {
                /* swallow — leave element untouched */
            }
        }

        // Map cursor's horizontal ratio along the element to the background-position value
        // that lands the band centre (image-50%) under the cursor.
        //   With background-size 220%, image_left = pos% × (container - image) = pos × -1.2 × W.
        //   Band centre at image_left + 1.1W. Set = ratio × W:  pos = (1.1 - ratio) × 83.33.
        function cursorToPos(el, clientX) {
            const rect = el.getBoundingClientRect();
            if (rect.width <= 0) return 50;
            const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            return (1.1 - ratio) * 83.33;
        }

        const ENTER_TRANSITION  = '--shine-pos 1.1s cubic-bezier(0.22, 1, 0.36, 1)';
        const FOLLOW_TRANSITION = '--shine-pos 0.4s cubic-bezier(0.22, 1, 0.36, 1)';
        const EXIT_TRANSITION   = '--shine-pos 1.1s cubic-bezier(0.22, 1, 0.36, 1)';

        // Only split tags likely to hold prose. Buttons/labels/inline bits stay
        // whole so a short "Sign In" doesn't get its letters rewritten.
        const SPLIT_TAGS = new Set(['P', 'LI', 'BLOCKQUOTE', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 'DD', 'DT']);

        document.addEventListener('mouseover', (e) => {
            let el = e.target;
            if (!(el instanceof Element)) return;

            // If this is a multi-line prose leaf, rewrite it into one-span-per-line
            // on first hover. The event target may then be a newly-created child
            // span on subsequent mouseover events; shine will track those.
            if (el instanceof Element && isLeafText(el) && SPLIT_TAGS.has(el.tagName)) {
                splitLeafIntoLines(el);
            }

            if (!isLeafText(el)) return;

            if (el._shineExitTimer) {
                clearTimeout(el._shineExitTimer);
                el._shineExitTimer = null;
            }

            const targetPos = cursorToPos(el, e.clientX).toFixed(2) + '%';

            if (!el.classList.contains('warm-shine-active')) {
                // First entry: slow elegant sweep from off-left to the cursor.
                el.style.transition = ENTER_TRANSITION;
                el.style.setProperty('--shine-pos', '130%');
                el.classList.add('warm-shine-active');
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        el.style.setProperty('--shine-pos', targetPos);
                    });
                });
            } else {
                el.style.transition = FOLLOW_TRANSITION;
                el.style.setProperty('--shine-pos', targetPos);
            }
        }, true);

        document.addEventListener('mousemove', (e) => {
            const el = e.target;
            if (!(el instanceof Element)) return;
            if (!isLeafText(el)) return;
            if (!el.classList.contains('warm-shine-active')) return;
            if (el._shineExitTimer) return;
            el.style.transition = FOLLOW_TRANSITION;
            el.style.setProperty('--shine-pos', cursorToPos(el, e.clientX).toFixed(2) + '%');
        }, true);

        document.addEventListener('mouseout', (e) => {
            const el = e.target;
            if (!(el instanceof Element)) return;
            if (!isLeafText(el)) return;
            if (el.contains(e.relatedTarget)) return;
            if (!el.classList.contains('warm-shine-active')) return;

            // Continue same direction off to the right, with the long sweep easing
            el.style.transition = EXIT_TRANSITION;
            el.style.setProperty('--shine-pos', '-40%');
            if (el._shineExitTimer) clearTimeout(el._shineExitTimer);
            el._shineExitTimer = setTimeout(() => {
                el.classList.remove('warm-shine-active');
                el.style.removeProperty('--shine-pos');
                el.style.transition = '';
                el._shineExitTimer = null;
            }, SWEEP_MS);
        }, true);
    })();
    </script>
</body>
</html>
