<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFEE</title>

    <!-- Tailwind CSS CDN with Void color theme config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'surface': '#12110f',
                        'surface-dim': '#0e0d0b',
                        'surface-bright': '#1a1815',
                        'surface-container-lowest': '#100f0d',
                        'surface-container-low': '#161410',
                        'surface-container': '#1c1a16',
                        'surface-container-high': '#232018',
                        'surface-container-highest': '#2a2720',
                        'surface-variant': '#1e1b16',
                        'on-surface': '#ede8e0',
                        'on-surface-variant': '#a09484',
                        'primary': '#e8a84c',
                        'on-primary': '#1a0e00',
                        'on-primary-fixed': '#0f0800',
                        'primary-container': '#7a4e1a',
                        'on-primary-container': '#fde8c0',
                        'secondary': '#8a9a6c',
                        'secondary-dim': '#7a8a5e',
                        'on-secondary': '#1a2008',
                        'secondary-container': '#3a4a20',
                        'on-secondary-container': '#d4e4b0',
                        'tertiary': '#c47a6c',
                        'on-tertiary': '#2a1010',
                        'tertiary-container': '#6a2e28',
                        'on-tertiary-container': '#f4d0c8',
                        'outline': '#6b5e4e',
                        'outline-variant': '#3a3028',
                    },
                    fontFamily: {
                        'headline': ['"Space Grotesk"', 'sans-serif'],
                        'body': ['Manrope', 'sans-serif'],
                        'label': ['Manrope', 'sans-serif'],
                    },
                    animation: {
                        'shimmer': 'shimmer 2.5s linear infinite',
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'slide-in': 'slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { backgroundPosition: '-200% center' },
                            '100%': { backgroundPosition: '200% center' },
                        },
                        fadeIn: {
                            from: { opacity: 0, transform: 'translateY(10px)' },
                            to: { opacity: 1, transform: 'translateY(0)' },
                        },
                        slideIn: {
                            from: { opacity: 0, transform: 'translateX(-16px)' },
                            to: { opacity: 1, transform: 'translateX(0)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 0.7 },
                            '50%': { opacity: 1 },
                        },
                    },
                    backdropBlur: {
                        xs: '2px',
                    },
                }
            }
        };
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

    <!-- React 18 + htm -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>

    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Turnstile CAPTCHA -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>

    <!-- Shared modules from web/ui/ -->
    <script src="/constants.js"></script>
    <script src="/api.js"></script>

    <!-- Void-specific component files -->
    <script src="./components/ui.js"></script>
    <script src="./components/ChatArena.js"></script>
    <script src="./components/modals.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: #12110f;
            color: #ede8e0;
            margin: 0;
            overflow: hidden;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(232,168,76,0.2); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(232,168,76,0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── Glass morphism ── */
        .glass {
            background: rgba(18, 17, 15, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .glass-light {
            background: rgba(35, 32, 24, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(24px);
        }
        .glass-card {
            background: rgba(28, 26, 22, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(232, 168, 76, 0.08);
        }

        /* ── Warm amber border ── */
        .iridescent-border {
            position: relative;
        }
        .iridescent-border::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: inherit;
            background: linear-gradient(135deg, #e8a84c, #c47a6c, #8a9a6c, #e8a84c);
            background-size: 300% 300%;
            animation: iridescentShift 4s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        @keyframes iridescentShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── Wordmark (solid, breathing opacity) ── */
        .wordmark {
            color: #e8a84c;
            letter-spacing: -0.02em;
            animation: wordmark-breath 4s ease-in-out infinite;
        }
        @keyframes wordmark-breath {
            0%, 100% { opacity: 0.92; }
            50%      { opacity: 1; }
        }

        /* ── Gradient button ── */
        .btn-gradient {
            background: linear-gradient(135deg, #e8a84c, #c47a6c);
            color: #0f0800;
            font-weight: 700;
            transition: all 0.25s ease;
        }
        .btn-gradient:hover {
            background: linear-gradient(135deg, #f0b860, #d08878);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(232, 168, 76, 0.3);
        }
        .btn-gradient:active { transform: translateY(0); }

        /* ── Warm hover — fixed-width sunset band sweeping across text ──
           Band has terracotta → amber → cream → amber → terracotta with transparent margins.
           A currentColor layer underneath keeps the un-covered portion of the text in its
           native colour, so the text is never invisible.

           The JS at the bottom of the file tracks the cursor: enter ends with the band
           parked under the pointer; exit continues the sweep in the same direction off right.
           --shine-pos is registered as a <percentage> via @property so it can be animated/transitioned. */
        @property --shine-pos {
            syntax: '<percentage>';
            inherits: false;
            initial-value: 130%;
        }
        .warm-shine-active {
            background-image: linear-gradient(
                110deg,
                transparent 0%,
                transparent 35%,
                rgba(196, 122, 108, 0.35) 37%,
                rgba(232, 168, 76, 1) 42%,
                rgba(252, 227, 168, 1) 50%,
                rgba(232, 168, 76, 1) 58%,
                rgba(196, 122, 108, 0.35) 63%,
                transparent 65%,
                transparent 100%
            );
            background-color: currentColor;
            background-size: 220% 100%;
            background-position: var(--shine-pos) 50%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: --shine-pos 1.1s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .hover-warm { transition: color 0.25s ease; }
        /* Icon-only buttons: animate color so material-symbols / svg icons also glow */
        .hover-warm-icon { transition: color 0.25s ease; }
        .hover-warm-icon:hover { color: #f0b860; }

        /* ── Ghost button ── */
        .btn-ghost {
            background: transparent;
            border: 1px solid rgba(232, 168, 76, 0.2);
            color: #e8a84c;
            transition: all 0.2s ease;
        }
        .btn-ghost:hover {
            background: rgba(232, 168, 76, 0.08);
            border-color: rgba(232, 168, 76, 0.4);
        }

        /* ── Sidebar transition ── */
        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), width 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        /* ── Persona card hover ── */
        .persona-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .persona-card:hover {
            transform: translateY(-4px);
            border-color: rgba(232, 168, 76, 0.3) !important;
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.5), 0 0 32px rgba(232, 168, 76, 0.12);
        }

        /* ── Animate in ── */
        .animate-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Capsule tabs ── */
        .void-tab {
            padding: 8px 20px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: all 0.2s ease;
            white-space: nowrap;
            color: rgba(160, 148, 132, 0.6);
        }
        .void-tab:hover { color: #e8a84c; }
        .void-tab.active {
            background: linear-gradient(135deg, rgba(232,168,76,0.2), rgba(196,122,108,0.1));
            color: #e8a84c;
            border: 1px solid rgba(232, 168, 76, 0.3);
        }

        /* ── Landing option pills ── */
        .void-opt {
            border: 1px solid rgba(232, 168, 76, 0.15);
            background: rgba(35, 32, 24, 0.4);
            color: rgba(237, 232, 224, 0.6);
            border-radius: 9999px;
            padding: 9px 18px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .void-opt:hover {
            border-color: rgba(232, 168, 76, 0.4);
            color: #e8a84c;
            background: rgba(232, 168, 76, 0.08);
        }
        .void-opt.selected {
            background: linear-gradient(135deg, rgba(232,168,76,0.25), rgba(196,122,108,0.12));
            color: #e8a84c;
            border-color: rgba(232, 168, 76, 0.5);
            box-shadow: 0 4px 16px rgba(232, 168, 76, 0.2);
        }

        /* ── Textarea focus ── */
        .void-textarea:focus {
            outline: none;
            border-color: rgba(232, 168, 76, 0.4) !important;
            box-shadow: 0 0 0 3px rgba(232, 168, 76, 0.1), 0 0 24px rgba(232, 168, 76, 0.08);
        }

        /* ── Session item hover actions ── */
        .session-actions { opacity: 0; transition: opacity 0.2s ease; }
        .session-row:hover .session-actions { opacity: 1; }

        /* ── Suggested questions scroll ── */
        .sq-scroll {
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            -ms-overflow-style: none;
            scrollbar-width: none;
            padding: 4px 0 12px 0;
        }
        .sq-scroll::-webkit-scrollbar { display: none; }
        .sq-track {
            display: inline-flex;
            gap: 10px;
            padding: 0 2px;
            min-width: 100%;
        }
        .sq-pill {
            background: rgba(28, 26, 22, 0.6);
            border: 1px solid rgba(232, 168, 76, 0.12);
            border-radius: 9999px;
            padding: 10px 18px;
            white-space: nowrap;
            font-size: 12px;
            color: rgba(237, 232, 224, 0.7);
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        .sq-pill:hover {
            border-color: rgba(232, 168, 76, 0.35);
            color: #e8a84c;
            background: rgba(232, 168, 76, 0.06);
        }

        /* ── Material Symbol sizing ── */
        .material-symbols-outlined {
            font-size: 20px;
            line-height: 1;
            vertical-align: middle;
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="void-root" class="h-full"></div>

    <script>
    (function () {
        'use strict';

        const html = htm.bind(React.createElement);
        const { useState, useEffect, useLayoutEffect, useRef, useCallback } = React;

        // ── Icon helper (Lucide via CDN) ──
        function Icon({ name, size = 18, className = '', style }) {
            // Span is React-owned; <i>→<svg> is managed manually and cleared in cleanup
            // so Lucide's node replacement never leaves stale children for React to trip on.
            const ref = useRef(null);
            useLayoutEffect(() => {
                const el = ref.current;
                if (!el) return undefined;
                while (el.firstChild) el.removeChild(el.firstChild);
                const inner = document.createElement('i');
                const kebab = name.replace(/([A-Z])/g, (m, c, i) => (i > 0 ? '-' : '') + c.toLowerCase());
                inner.setAttribute('data-lucide', kebab);
                el.appendChild(inner);
                try { window.lucide?.createIcons?.({ nodes: [inner] }); } catch (_) {}
                return () => {
                    try { while (el.firstChild) el.removeChild(el.firstChild); } catch (_) {}
                };
            }, [name]);
            return html`<span ref=${ref} class=${'inline-flex items-center justify-center shrink-0 ' + className} style=${{ width: size, height: size, lineHeight: 0, ...(style || {}) }} aria-hidden="true" />`;
        }

        // ── Material Symbol helper ──
        function MS({ name, size = 20, className = '' }) {
            return html`<span class=${'material-symbols-outlined ' + className} style=${{ fontSize: size }}>${name}</span>`;
        }

        // ── Relative time ──
        function relativeTime(ts) {
            if (!ts) return '';
            const diff = Date.now() - new Date(ts).getTime();
            const m = Math.floor(diff / 60000);
            if (m < 1) return 'just now';
            if (m < 60) return `${m}m ago`;
            const h = Math.floor(m / 60);
            if (h < 24) return `${h}h ago`;
            const d = Math.floor(h / 24);
            if (d < 7) return `${d}d ago`;
            return new Date(ts).toLocaleDateString();
        }

        // ── AvatarDisplay ──
        function AvatarDisplay({ avatar, className = '', size = 40 }) {
            if (!avatar) {
                return html`<div class=${'flex items-center justify-center bg-surface-container-high rounded-full ' + className} style=${{ width: size, height: size }}>
                    <${Icon} name="User" size=${Math.floor(size * 0.5)} className="text-on-surface-variant" />
                </div>`;
            }
            if (typeof avatar === 'string' && (avatar.startsWith('http') || avatar.startsWith('data:'))) {
                return html`<img src=${avatar} class=${'object-cover rounded-full ' + className} style=${{ width: size, height: size }} loading="lazy" alt="" />`;
            }
            return html`<div class=${'flex items-center justify-center rounded-full ' + className} style=${{ width: size, height: size, fontSize: Math.floor(size * 0.5) }}>${avatar}</div>`;
        }

        // ══════════════════════════════════════════════
        //  AUTH MODAL
        // ══════════════════════════════════════════════
        function AuthModal({ isOpen, onClose, onAuthed, onGuest }) {
            const [mode, setMode] = useState('login');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');
            const [otpSent, setOtpSent] = useState(false);
            const [otpCode, setOtpCode] = useState('');
            const [humanVerified, setHumanVerified] = useState(false);
            const turnstileRef = useRef(null);
            const widgetIdRef = useRef(null);

            useEffect(() => {
                if (!isOpen || humanVerified) return;
                const renderWidget = () => {
                    if (turnstileRef.current && window.turnstile && widgetIdRef.current === null) {
                        widgetIdRef.current = window.turnstile.render(turnstileRef.current, {
                            sitekey: TURNSTILE_SITEKEY,
                            callback: async (token) => {
                                const result = await verifyHumanTokenWithServer(token);
                                if (result.ok) {
                                    setHumanVerified(true);
                                    if (result.bypassed) setMessage('Local preview: verification skipped.');
                                } else {
                                    setMessage(result.message || 'Verification failed. Please retry.');
                                }
                            },
                            theme: 'dark',
                        });
                    }
                };
                if (window.turnstile) { renderWidget(); }
                else {
                    const timer = setInterval(() => {
                        if (window.turnstile) { clearInterval(timer); renderWidget(); }
                    }, 200);
                    return () => clearInterval(timer);
                }
                return () => {
                    if (widgetIdRef.current !== null && window.turnstile) {
                        window.turnstile.remove(widgetIdRef.current);
                        widgetIdRef.current = null;
                    }
                };
            }, [isOpen, humanVerified]);

            if (!isOpen) return null;

            const handleAuth = async () => {
                setLoading(true);
                setMessage('');
                try {
                    if (mode === 'login') {
                        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                        if (data?.user) onAuthed(data.user);
                    } else if (otpSent) {
                        const { data, error } = await supabaseClient.auth.verifyOtp({ email, token: otpCode, type: 'signup' });
                        if (error) throw error;
                        if (data?.user) onAuthed(data.user);
                    } else {
                        const { error } = await supabaseClient.auth.signUp({ email, password });
                        if (error) throw error;
                        setOtpSent(true);
                        setMessage('Verification code sent to your email.');
                    }
                } catch (err) {
                    setMessage(err?.message || 'Operation failed. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>
                    <div class="relative w-full max-w-sm mx-4 glass-card rounded-3xl p-8 animate-in iridescent-border">
                        <div class="flex items-center justify-between mb-7">
                            <div>
                                <h2 class="font-headline text-lg font-bold text-on-surface">
                                    ${mode === 'login' ? 'Welcome back' : 'Create account'}
                                </h2>
                                <p class="text-xs text-on-surface-variant mt-0.5">LIFEE</p>
                            </div>
                            <button onClick=${onClose} class="w-8 h-8 rounded-full btn-ghost flex items-center justify-center">
                                <${Icon} name="X" size=${14} />
                            </button>
                        </div>

                        ${!humanVerified ? html`
                            <div class="flex flex-col items-center gap-4 py-4">
                                <p class="text-sm text-on-surface-variant">Please verify you're human</p>
                                <div ref=${turnstileRef}></div>
                                ${message && html`<p class="text-xs text-tertiary/80 text-center">${message}</p>`}
                            </div>
                        ` : otpSent ? html`
                            <div class="space-y-4">
                                <p class="text-sm text-on-surface-variant">${message || 'Enter the verification code sent to your email.'}</p>
                                <input
                                    type="text"
                                    placeholder="6-digit code"
                                    value=${otpCode}
                                    onInput=${e => setOtpCode(e.target.value)}
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                />
                                <button
                                    onClick=${handleAuth}
                                    disabled=${loading || !otpCode}
                                    class="w-full btn-gradient rounded-xl py-3 text-sm disabled:opacity-40"
                                >${loading ? 'Verifying…' : 'Verify & Sign Up'}</button>
                            </div>
                        ` : html`
                            <div class="space-y-3">
                                <input
                                    type="email"
                                    placeholder="Email address"
                                    value=${email}
                                    onInput=${e => setEmail(e.target.value)}
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                />
                                <input
                                    type="password"
                                    placeholder="Password"
                                    value=${password}
                                    onInput=${e => setPassword(e.target.value)}
                                    onKeyDown=${e => { if (e.key === 'Enter') handleAuth(); }}
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                />
                                ${message && html`<p class="text-xs text-tertiary/80">${message}</p>`}
                                <button
                                    onClick=${handleAuth}
                                    disabled=${loading || !email || !password}
                                    class="w-full btn-gradient rounded-xl py-3 text-sm disabled:opacity-40"
                                >${loading ? 'Please wait…' : mode === 'login' ? 'Sign In' : 'Send Verification Code'}</button>
                                <div class="flex items-center gap-2 pt-1">
                                    <div class="flex-1 h-px bg-outline/20"></div>
                                    <span class="text-xs text-on-surface-variant">or</span>
                                    <div class="flex-1 h-px bg-outline/20"></div>
                                </div>
                                <button
                                    onClick=${() => { onGuest(); }}
                                    class="w-full btn-ghost rounded-xl py-3 text-sm"
                                >Continue as Guest</button>
                                <p class="text-center text-xs text-on-surface-variant pt-1">
                                    ${mode === 'login'
                                        ? html`No account? <button onClick=${() => { setMode('signup'); setMessage(''); }} class="text-primary hover:underline">Sign up</button>`
                                        : html`Already have one? <button onClick=${() => { setMode('login'); setMessage(''); setOtpSent(false); }} class="text-primary hover:underline">Sign in</button>`}
                                </p>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  SIDEBAR
        // ══════════════════════════════════════════════
        function Sidebar({
            view, setView, user, isGuest, onNewSession, chatSessions,
            setChatSessions, setSessionMessages, setSessionOptions,
            sessionId, setSessionId, setSelectedIds,
            personas, onLogin, onSignOut, userAvatar,
            sidebarOpen, setSidebarOpen,
        }) {
            const [userMenuOpen, setUserMenuOpen] = useState(false);
            const userCardRef = useRef(null);

            // Close user menu on outside click
            useEffect(() => {
                if (!userMenuOpen) return;
                const handler = (e) => {
                    if (userCardRef.current && !userCardRef.current.contains(e.target)) {
                        setUserMenuOpen(false);
                    }
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, [userMenuOpen]);

            const restoreSession = async (s) => {
                try {

                    if (res?.messages) {

                        if (s.personas?.length && setSelectedIds) {

        // ══════════════════════════════════════════════
        //  HOME VIEW
        // ══════════════════════════════════════════════
        function HomeView({ context, setContext, setView, personas, selectedIds, setSelectedIds, startFreshDebate }) {
            // Domain classification by persona id
            const DOMAIN_MAP = {
                'krishnamurti': 'Philosophy', 'lacan': 'Philosophy', 'Simone de Beauvoir': 'Philosophy',
                'buffett': 'Business', 'munger': 'Business', 'drucker': 'Business', 'welch': 'Business',
                'shannon': 'Science', 'turing': 'Science', 'vonneumann': 'Science',
                'audrey-hepburn': 'Arts',
            };
            const getDomain = (p) => DOMAIN_MAP[p.id] || p.category || 'Other';
            const DOMAIN_ORDER = ['Philosophy', 'Business', 'Science', 'Arts'];

            // Group personas by domain
            const grouped = {};
            DOMAIN_ORDER.forEach(d => grouped[d] = []);
            personas.forEach(p => {
                const d = getDomain(p);
                if (grouped[d]) grouped[d].push(p);
            });

            const toggleSelect = (id) => {
                setSelectedIds(prev =>
                    prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
                );
            };

            const selectedPersonas = personas.filter(p => selectedIds.includes(p.id));

            // Preview: hovered/tapped persona in the right panel
            const [previewId, setPreviewId] = useState(null);
            // Detail modal state (full persona profile)
            const [detailPersonaId, setDetailPersonaId] = useState(null);
            const detailPersona = detailPersonaId ? personas.find(p => p.id === detailPersonaId) : null;

            // Transient toast for gentle guidance (e.g. "pick a voice first")
            const [toastMsg, setToastMsg] = useState('');
            useEffect(() => {
                if (!toastMsg) return;
                const t = setTimeout(() => setToastMsg(''), 2800);
                return () => clearTimeout(t);
            }, [toastMsg]);

            const trySubmit = () => {
                if (!context.situation?.trim()) return;
                if (selectedIds.length === 0) {
                    setToastMsg('Pick at least one voice from the Council below.');
                    return;
                }
                // Home → always a new session (the sidebar keeps past ones)
                (startFreshDebate || (() => setView('debate')))();
            };

            // Preload persona cover images in parallel so first click is instant
            useEffect(() => {
                personas.forEach(p => {
                    if (!p.cover_url) return;
                    const img = new Image();
                    img.src = p.cover_url;
                });
            }, [personas.length]);

            // Domain carousel — per-domain section height (1 row vs 2 rows)
            const activeDomains = DOMAIN_ORDER.filter(d => grouped[d].length > 0);
            const CARDS_PER_ROW = 3;
            const HEADER_H = 70;   // domain header row + gap + buffer
            const ROW_H = 120;     // one row of persona cards + buffer
            const sectionHFor = (n) => HEADER_H + Math.min(2, Math.ceil(n / CARDS_PER_ROW)) * ROW_H;
            const sectionHeights = activeDomains.map(d => sectionHFor(grouped[d].length));

            const carouselRef = useRef(null);
            const sectionRefs = useRef([]);
            const scrollLockRef = useRef(false);
            const [activeDomainIdx, setActiveDomainIdx] = useState(0);
            const currentSectionH = sectionHeights[activeDomainIdx] ?? 300;

            // Read actual offsetTop of each section (avoids rounding drift from computed heights)
            const getOffsets = () => sectionRefs.current.map(el => el?.offsetTop ?? 0);
            const idxAtScroll = (top) => {
                const offs = getOffsets();
                let best = 0, bestDist = Infinity;
                for (let i = 0; i < offs.length; i++) {
                    const dist = Math.abs(top - offs[i]);
                    if (dist < bestDist) { bestDist = dist; best = i; }
                }
                return best;
            };

            // Manual RAF-based scroll (guaranteed duration + easing to match CSS height transition)
            const SCROLL_DURATION = 300;
            const easeOut = (t) => 1 - Math.pow(1 - t, 3);  // cubic ease-out, matches Tailwind ease-out
            const scrollAnimRef = useRef(null);
            const animateScrollTo = (top) => {
                const el = carouselRef.current;
                if (!el) return;
                if (scrollAnimRef.current != null) cancelAnimationFrame(scrollAnimRef.current);
                const startTop = el.scrollTop;
                const startTime = performance.now();
                const step = (now) => {
                    const t = Math.min(1, (now - startTime) / SCROLL_DURATION);
                    el.scrollTop = startTop + (top - startTop) * easeOut(t);
                    if (t < 1) scrollAnimRef.current = requestAnimationFrame(step);
                    else scrollAnimRef.current = null;
                };
                scrollAnimRef.current = requestAnimationFrame(step);
            };

            const goToDomain = (idx) => {
                const el = carouselRef.current;
                if (!el) return;
                const clamped = Math.max(0, Math.min(activeDomains.length - 1, idx));
                const target = sectionRefs.current[clamped]?.offsetTop ?? 0;
                scrollLockRef.current = true;
                setActiveDomainIdx(clamped);  // triggers height transition
                animateScrollTo(target);       // synchronized RAF scroll
                setTimeout(() => { scrollLockRef.current = false; }, SCROLL_DURATION + 50);
            };

            useEffect(() => {
                const el = carouselRef.current;
                if (!el) return;
                let wheelLock = false;
                const wheelHandler = (e) => {
                    if (e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY)) return;
                    e.preventDefault();
                    if (wheelLock) return;
                    const dir = e.deltaY > 0 ? 1 : -1;
                    const currentIdx = idxAtScroll(el.scrollTop);
                    const nextIdx = Math.max(0, Math.min(activeDomains.length - 1, currentIdx + dir));
                    if (nextIdx === currentIdx) return;
                    wheelLock = true;
                    scrollLockRef.current = true;
                    setActiveDomainIdx(nextIdx);
                    const nextTop = sectionRefs.current[nextIdx]?.offsetTop ?? 0;
                    animateScrollTo(nextTop);
                    setTimeout(() => { wheelLock = false; scrollLockRef.current = false; }, SCROLL_DURATION + 50);
                };
                const scrollHandler = () => {
                    if (scrollLockRef.current) return;
                    const idx = idxAtScroll(el.scrollTop);
                    setActiveDomainIdx(prev => prev === idx ? prev : idx);
                };
                el.addEventListener('wheel', wheelHandler, { passive: false });
                el.addEventListener('scroll', scrollHandler);

                // Vertical mouse drag on carousel → switch domain
                let vDrag = false;
                let vStartY = 0;
                let vStartTop = 0;
                let vLastY = 0;
                let vLastT = 0;
                let vVel = 0;
                let vMoved = 0;
                let vRaf = null;
                const cancelVMomentum = () => { if (vRaf != null) { cancelAnimationFrame(vRaf); vRaf = null; } };
                const snapToNearest = () => {
                    const idx = idxAtScroll(el.scrollTop);
                    scrollLockRef.current = true;
                    setActiveDomainIdx(idx);
                    const target = sectionRefs.current[idx]?.offsetTop ?? 0;
                    animateScrollTo(target);
                    setTimeout(() => { scrollLockRef.current = false; }, SCROLL_DURATION + 50);
                };
                const runVMomentum = () => {
                    const friction = 0.92;
                    const tick = () => {
                        if (Math.abs(vVel) < 0.03) { vRaf = null; snapToNearest(); return; }
                        el.scrollTop -= vVel * 16;
                        vVel *= friction;
                        vRaf = requestAnimationFrame(tick);
                    };
                    vRaf = requestAnimationFrame(tick);
                };
                const vOnDown = (e) => {
                    if (e.button !== 0) return;
                    cancelVMomentum();
                    vDrag = true;
                    vMoved = 0;
                    vStartY = e.clientY;
                    vLastY = e.clientY;
                    vLastT = performance.now();
                    vVel = 0;
                    vStartTop = el.scrollTop;
                };
                const vOnMove = (e) => {
                    if (!vDrag) return;
                    const dy = e.clientY - vStartY;
                    vMoved = Math.max(vMoved, Math.abs(dy));
                    el.scrollTop = vStartTop - dy;
                    const now = performance.now();
                    const dt = now - vLastT;
                    if (dt > 0) vVel = vVel * 0.6 + ((e.clientY - vLastY) / dt) * 0.4;
                    vLastY = e.clientY;
                    vLastT = now;
                };
                const vOnUp = () => {
                    if (!vDrag) return;
                    vDrag = false;
                    if (performance.now() - vLastT > 80) vVel = 0;
                    if (Math.abs(vVel) > 0.15) runVMomentum();
                    else snapToNearest();
                };
                el.addEventListener('mousedown', vOnDown);
                window.addEventListener('mousemove', vOnMove);
                window.addEventListener('mouseup', vOnUp);

                // Mouse drag-to-scroll with momentum (feels like mobile swipe)
                const rows = el.querySelectorAll('[data-h-row]');
                const cleanups = [];
                rows.forEach(row => {
                    let dragging = false;
                    let startX = 0;
                    let startY = 0;
                    let startScroll = 0;
                    let moved = 0;
                    let lastX = 0;
                    let lastTime = 0;
                    let velocity = 0;   // px per ms (positive = pointer moving right)
                    let rafId = null;

                    const cancelMomentum = () => {
                        if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; }
                    };
                    const restoreSnap = () => { row.style.scrollSnapType = ''; };
                    const runMomentum = (done) => {
                        const friction = 0.94;          // per 16ms frame
                        const minV = 0.02;              // px/ms stop threshold
                        const tick = () => {
                            if (Math.abs(velocity) < minV) {
                                rafId = null;
                                if (done) done();
                                return;
                            }
                            row.scrollLeft -= velocity * 16;
                            velocity *= friction;
                            rafId = requestAnimationFrame(tick);
                        };
                        rafId = requestAnimationFrame(tick);
                    };

                    const onDown = (e) => {
                        if (e.button !== 0) return;
                        cancelMomentum();
                        // Disable scroll-snap during interaction so every scrollLeft
                        // delta renders freely. Restored after momentum completes.
                        row.style.scrollSnapType = 'none';
                        dragging = true;
                        moved = 0;
                        startX = e.clientX;
                        startY = e.clientY;
                        lastX = e.clientX;
                        lastTime = performance.now();
                        velocity = 0;
                        startScroll = row.scrollLeft;
                        row.style.cursor = 'grabbing';
                        row.style.userSelect = 'none';
                    };
                    const onMove = (e) => {
                        if (!dragging) return;
                        const dx = e.clientX - startX;
                        const dy = e.clientY - startY;
                        moved = Math.max(moved, Math.hypot(dx, dy));
                        row.scrollLeft = startScroll - dx;
                        // Smooth velocity sample (EMA)
                        const now = performance.now();
                        const dt = now - lastTime;
                        if (dt > 0) {
                            const instantV = (e.clientX - lastX) / dt;
                            velocity = velocity * 0.6 + instantV * 0.4;
                        }
                        lastX = e.clientX;
                        lastTime = now;
                    };
                    const onUp = () => {
                        if (!dragging) return;
                        dragging = false;
                        row.style.cursor = '';
                        row.style.userSelect = '';
                        // Decay velocity if last sample was stale (finger paused before release)
                        if (performance.now() - lastTime > 80) velocity = 0;
                        if (Math.abs(velocity) > 0.1) {
                            runMomentum(restoreSnap);
                        } else {
                            restoreSnap();
                        }
                    };
                    // Suppress click after drag so cards don't get selected
                    const onClickCapture = (e) => {
                        if (moved > 5) {
                            e.stopPropagation();
                            e.preventDefault();
                            moved = 0;
                        }
                    };
                    row.style.cursor = 'grab';
                    row.addEventListener('mousedown', onDown);
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onUp);
                    row.addEventListener('click', onClickCapture, true);
                    cleanups.push(() => {
                        cancelMomentum();
                        row.removeEventListener('mousedown', onDown);
                        window.removeEventListener('mousemove', onMove);
                        window.removeEventListener('mouseup', onUp);
                        row.removeEventListener('click', onClickCapture, true);
                        row.style.cursor = '';
                        row.style.userSelect = '';
                        row.style.scrollSnapType = '';
                    });
                });

                return () => {
                    el.removeEventListener('wheel', wheelHandler);
                    el.removeEventListener('scroll', scrollHandler);
                    el.removeEventListener('mousedown', vOnDown);
                    window.removeEventListener('mousemove', vOnMove);
                    window.removeEventListener('mouseup', vOnUp);
                    cancelVMomentum();
                    cleanups.forEach(fn => fn());
                };
            }, [personas.length]);

            // Featured = preview > most recent selected > default (Audrey)
            const lastSelected = selectedPersonas[selectedPersonas.length - 1];
            const featured =
                (previewId && personas.find(p => p.id === previewId)) ||
                lastSelected ||
                personas.find(p => p.id === 'audrey-hepburn') ||
                personas[0];

            // Masthead date
            const today = new Date();
            const dateStr = today.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }).toUpperCase();

            return html`
                <div class="animate-in flex flex-col w-full h-full overflow-y-auto no-scrollbar">
                    <!-- Masthead -->
                    <div class="w-full max-w-6xl mx-auto px-8 pt-10 pb-4">
                        <div class="flex items-baseline justify-between border-b border-on-surface/10 pb-3">
                            <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em] font-bold">Vol. I</p>
                            <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em]">${dateStr}</p>
                            <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em]">The Council</p>
                        </div>
                    </div>

                    <!-- Hero: split layout (input left, featured right) -->
                    <section class="w-full max-w-6xl mx-auto px-8 pt-8 pb-16 grid grid-cols-1 md:grid-cols-5 gap-10">
                        <!-- Left: input area -->
                        <div class="md:col-span-3 flex flex-col justify-center gap-5">
                            <p class="text-[10px] text-on-surface-variant/40 uppercase tracking-[0.3em]">Today's question</p>
                            <h1 class="font-headline text-4xl md:text-5xl font-bold leading-[1.1] text-on-surface">
                                What's on<br/>your mind?
                            </h1>
                            <div class="flex items-end gap-3 mt-4">
                                <div class="flex-1 flex items-center bg-surface-container border border-outline-variant/20 rounded-2xl px-5 py-4 focus-within:border-primary/30 transition-colors">
                                    <textarea
                                        rows="1"
                                        class="flex-1 bg-transparent text-on-surface placeholder-on-surface-variant/30 text-sm focus:outline-none resize-none leading-relaxed overflow-y-auto"
                                        placeholder="Describe your situation..."
                                        style=${{ maxHeight: '180px' }}
                                        value=${context.situation}
                                        onInput=${e => {
                                            setContext(c => ({ ...c, situation: e.target.value }));
                                            e.target.style.height = 'auto';
                                            e.target.style.height = Math.min(e.target.scrollHeight, 180) + 'px';
                                        }}
                                        onKeyDown=${e => {
                                            // Enter → send; Shift+Enter → newline (default)
                                            if (e.key === 'Enter' && !e.shiftKey) {
                                                e.preventDefault();
                                                trySubmit();
                                            }
                                        }}
                                    ></textarea>
                                </div>
                                <button
                                    disabled=${!context.situation?.trim()}
                                    onClick=${trySubmit}
                                    class="btn-gradient w-14 h-14 rounded-2xl flex items-center justify-center shrink-0 disabled:opacity-20 disabled:cursor-not-allowed"
                                    title="Send"
                                >
                                    <span class="material-symbols-outlined" style=${{ fontSize: '22px' }}>arrow_forward</span>
                                </button>
                            </div>
                            ${toastMsg ? html`
                                <div class="text-xs text-primary/80 animate-in flex items-center gap-2">
                                    <span class="material-symbols-outlined" style=${{ fontSize: '14px' }}>info</span>
                                    ${toastMsg}
                                </div>
                            ` : null}
                            ${selectedIds.length > 0 ? html`
                                <div class="flex flex-wrap gap-2">
                                    ${selectedPersonas.map(p => html`
                                        <span key=${p.id}
                                            class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-primary/8 border border-primary/15 text-xs text-primary/80">
                                            <span class="text-sm">${p.avatar || '☁️'}</span>
                                            ${p.name}
                                            <button onClick=${() => toggleSelect(p.id)}
                                                class="ml-0.5 text-primary/40 hover:text-primary text-base leading-none">×</button>
                                        </span>
                                    `)}
                                </div>
                            ` : html`
                                <p class="text-xs text-on-surface-variant/40 italic">→ Select voices below to begin.</p>
                            `}
                        </div>

                        <!-- Right: featured persona card (click to add to conversation) -->
                        ${featured ? (() => {
                            const isSel = selectedIds.includes(featured.id);
                            const label = previewId ? 'Preview' : (isSel ? 'In conversation' : 'Featured');
                            return html`
                                <div class="md:col-span-2">
                                    <div
                                        onClick=${() => toggleSelect(featured.id)}
                                        class=${`group relative h-full rounded-3xl overflow-hidden cursor-pointer transition-all duration-300 min-h-[300px]
                                            ${isSel
                                                ? 'ring-2 ring-primary shadow-xl shadow-primary/30'
                                                : 'ring-1 ring-outline-variant/20 hover:ring-primary/60 hover:shadow-xl hover:shadow-primary/20'}`}
                                        style=${featured.cover_url ? {
                                            backgroundImage: `linear-gradient(to bottom, rgba(18,17,15,0.2), rgba(18,17,15,0.95)), url(${featured.cover_url})`,
                                            backgroundSize: 'cover',
                                            backgroundPosition: featured.cover_position || 'center',
                                        } : {}}
                                    >
                                        <div class=${featured.cover_url ? '' : 'bg-surface-container-high h-full'}>
                                            <div class="flex flex-col justify-between h-full min-h-[300px] p-6">
                                                <div class="flex items-start justify-between">
                                                    <p class="text-[9px] text-on-surface-variant/70 uppercase tracking-[0.3em] font-bold">${label}</p>
                                                    <span class="text-2xl opacity-80">${featured.avatar || '☁️'}</span>
                                                </div>
                                                <div>
                                                    <p class="text-[10px] text-primary/80 uppercase tracking-widest font-bold mb-2">${featured.role}</p>
                                                    <h3 class="font-headline text-3xl font-bold leading-tight text-white mb-3">${featured.name}</h3>
                                                    <p class="text-xs italic text-white/70 leading-relaxed line-clamp-3 max-w-xs mb-4">"${featured.worldview}"</p>
                                                    <button
                                                        onClick=${(e) => { e.stopPropagation(); setDetailPersonaId(featured.id); }}
                                                        class="inline-flex items-center gap-1.5 text-[10px] font-label uppercase tracking-[0.25em] text-white/60 hover:text-primary transition-colors"
                                                    >
                                                        <span>Read full dossier</span>
                                                        <span class="material-symbols-outlined" style=${{ fontSize: '12px' }}>arrow_outward</span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        })() : null}
                    </section>

                    <!-- Domain sections (editorial list style) -->
                    <section class="w-full max-w-6xl mx-auto px-8 pb-20">
                        <div class="flex items-baseline gap-4 mb-10 border-t border-on-surface/10 pt-6">
                            <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em] font-bold">The Council</p>
                            <div class="flex-1 h-px bg-on-surface/8"></div>
                            <p class="text-[10px] text-on-surface-variant/40">${personas.length} voices</p>
                        </div>

                        <!-- Vertical carousel (one domain at a time, dynamic height: 1 or 2 rows)
                             Height transition delayed by half the scroll duration so the row
                             reveal happens AFTER we've arrived at the new domain's top. -->
                        <div ref=${carouselRef} class="relative overflow-y-auto no-scrollbar transition-[height] duration-300 delay-150 ease-out"
                             style=${{ scrollbarWidth: 'none', height: currentSectionH + 'px' }}>
                            ${activeDomains.map((domain, dIdx, arr) => {
                                const items = grouped[domain];
                                const h = sectionHeights[dIdx];
                                return html`
                                    <div key=${domain}
                                         ref=${(node) => { sectionRefs.current[dIdx] = node; }}
                                         class="flex flex-col gap-5 pt-2 overflow-hidden"
                                         style=${{ height: h + 'px' }}>
                                        <!-- Domain header -->
                                        <div class="flex items-baseline justify-between">
                                            <div class="flex items-baseline gap-4">
                                                <p class="text-[10px] text-on-surface-variant/40 uppercase tracking-[0.3em] font-bold">N° 0${dIdx + 1}</p>
                                                <h2 class="font-headline text-2xl font-bold text-on-surface">${domain}</h2>
                                            </div>
                                            <div class="flex items-center gap-3 text-[11px] text-on-surface-variant/40">
                                                <span class="italic">${items.length} ${items.length === 1 ? 'voice' : 'voices'}</span>
                                                <span class="opacity-60">·</span>
                                                <span class="uppercase tracking-widest">${dIdx + 1}/${arr.length}</span>
                                            </div>
                                        </div>

                                        <!-- Persona row(s) — fixed-width cards, wrap to up to 2 rows -->
                                        <div class="flex-1 min-h-0 flex flex-wrap content-start gap-x-8 gap-y-4">
                                            ${items.map(p => {
                                                const isSel = selectedIds.includes(p.id);
                                                const isPreview = previewId === p.id;
                                                return html`
                                                    <div
                                                        key=${p.id}
                                                        onClick=${() => {
                                                            if (previewId === p.id) toggleSelect(p.id);
                                                            else setPreviewId(p.id);
                                                        }}
                                                        class=${`group cursor-pointer w-72 py-4 border-t transition-colors
                                                            ${isSel ? 'border-primary/40' : isPreview ? 'border-primary/30' : 'border-on-surface/10 hover:border-on-surface/30'}`}
                                                    >
                                                        <div class="flex items-start gap-3">
                                                            <span class=${`text-xl mt-0.5 transition-opacity ${isSel || isPreview ? 'opacity-100' : 'opacity-70 group-hover:opacity-100'}`}>${p.avatar || '☁️'}</span>
                                                            <div class="flex-1 min-w-0">

                        <!-- Bottom domain tabs -->
                        <div class="flex items-center justify-start flex-wrap gap-x-8 gap-y-3 mt-6 pt-4 border-t border-on-surface/10">

                    ${detailPersona ? html`<${PersonaDetail}

            `;
        }

        // ══════════════════════════════════════════════
        //  PERSONA DETAIL MODAL (editorial dossier)
        // ══════════════════════════════════════════════
        function PersonaDetail({ persona, isSel, onClose, onToggle }) {
            // Lock body scroll + close on ESC
            useEffect(() => {
                const prevOverflow = document.body.style.overflow;
                document.body.style.overflow = 'hidden';
                const onKey = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', onKey);
                return () => {
                    document.body.style.overflow = prevOverflow;
                    window.removeEventListener('keydown', onKey);
                };
            }, []);

            const sections = [];
            if (persona.decisionStyle) sections.push({ label: 'Decision Style', body: persona.decisionStyle });
            if (persona.voice) sections.push({ label: 'In Their Voice', body: `"${persona.voice}"`, italic: true });

            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center animate-in">
                    <!-- Backdrop -->
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>

                    <!-- Panel -->
                    <div class="relative w-full max-w-3xl max-h-[90vh] mx-4 bg-surface-container/95 backdrop-blur-2xl rounded-3xl border border-white/10 shadow-2xl overflow-hidden flex flex-col">
                        <!-- Hero: cover + close -->
                        <div class="relative h-[280px] shrink-0"
                             style=${persona.cover_url ? {
                                 backgroundImage: `linear-gradient(to bottom, rgba(18,17,15,0.15) 0%, rgba(18,17,15,0.55) 55%, rgba(28,26,22,0.95) 100%), url(${persona.cover_url})`,
                                 backgroundSize: 'cover',
                                 backgroundPosition: persona.cover_position || 'center',
                             } : { backgroundColor: '#1c1a16' }}>
                            <button
                                onClick=${onClose}
                                class="absolute top-4 right-4 w-9 h-9 rounded-full bg-black/40 backdrop-blur-sm hover:bg-black/60 flex items-center justify-center text-white/70 hover:text-white transition-colors"
                                aria-label="Close"
                            >
                                <span class="material-symbols-outlined" style=${{ fontSize: '20px' }}>close</span>
                            </button>

                            <div class="absolute left-8 bottom-6 right-8">
                                <p class="text-[10px] text-primary uppercase tracking-[0.3em] font-bold mb-2">${persona.role || 'Dossier'}</p>
                                <h2 class="font-headline text-4xl md:text-5xl font-bold text-white leading-[1.05]">${persona.name}</h2>
                            </div>
                        </div>

                        <!-- Body: scrollable sections -->
                        <div class="flex-1 overflow-y-auto px-8 py-8 space-y-8 no-scrollbar">
                            <!-- Worldview (pull quote) -->
                            ${persona.worldview ? html`
                                <div class="relative">
                                    <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em] font-bold mb-3">Worldview</p>
                                    <span class="absolute -left-2 -top-2 font-headline text-[72px] text-primary/20 leading-none select-none pointer-events-none">"</span>
                                    <p class="font-headline text-xl italic text-on-surface leading-snug relative pl-6">${persona.worldview}</p>
                                </div>
                            ` : null}

                            <!-- Prose sections -->
                            ${sections.map((s, i) => html`
                                <div key=${s.label}>
                                    <div class="flex items-baseline gap-4 mb-3">
                                        <p class="text-[10px] text-on-surface-variant/40 uppercase tracking-[0.3em] font-bold">N° 0${i + 1}</p>
                                        <h3 class="font-headline text-sm font-bold text-on-surface/90 uppercase tracking-widest">${s.label}</h3>
                                        <div class="flex-1 h-px bg-on-surface/8"></div>
                                    </div>
                                    <p class=${`text-sm leading-relaxed ${s.italic ? 'italic text-on-surface-variant' : 'text-on-surface/85'}`}>${s.body}</p>
                                </div>
                            `)}

                            <!-- Life Context (timeline-ish) -->
                            ${persona.lifeContext && persona.lifeContext.length ? html`
                                <div>
                                    <div class="flex items-baseline gap-4 mb-5">
                                        <p class="text-[10px] text-on-surface-variant/40 uppercase tracking-[0.3em] font-bold">N° 0${sections.length + 1}</p>
                                        <h3 class="font-headline text-sm font-bold text-on-surface/90 uppercase tracking-widest">Life Context</h3>
                                        <div class="flex-1 h-px bg-on-surface/8"></div>
                                    </div>
                                    <div class="space-y-5">
                                        ${persona.lifeContext.map((ctx, i) => html`
                                            <div key=${i} class="grid grid-cols-[auto_1fr] gap-6 items-start">
                                                <p class="font-headline text-xs font-bold text-primary/70 uppercase tracking-wider w-32 shrink-0 pt-0.5">${ctx.period}</p>
                                                <p class="text-sm text-on-surface/80 leading-relaxed">${ctx.detail}</p>
                                            </div>
                                        `)}
                                    </div>
                                </div>
                            ` : null}
                        </div>

                        <!-- Footer: add/remove CTA -->
                        <div class="px-8 py-5 border-t border-white/8 bg-surface-container-low/60 shrink-0 flex items-center justify-between gap-4">
                            <p class="text-[10px] text-on-surface-variant/40 uppercase tracking-[0.3em] hidden md:block">
                                ${isSel ? 'Currently in your Council' : 'Not yet added'}
                            </p>
                            <div class="flex items-center gap-3 ml-auto">
                                <button
                                    onClick=${onClose}
                                    class="text-[10px] text-on-surface-variant/60 hover:text-on-surface uppercase tracking-[0.25em] px-4 py-2.5 rounded-lg hover:bg-white/5 transition-colors"
                                >Close</button>
                                <button
                                    onClick=${() => { onToggle(); onClose(); }}
                                    class=${isSel
                                        ? 'no-shine text-[10px] uppercase tracking-[0.25em] font-bold px-5 py-2.5 rounded-lg bg-white/5 text-on-surface hover:bg-white/10 transition-colors'
                                        : 'no-shine text-[10px] uppercase tracking-[0.25em] font-bold px-5 py-2.5 rounded-lg btn-gradient'}
                                >
                                    ${isSel ? 'Remove from Council' : 'Add to Council'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ══════════════════════════════════════════════
