    <!-- Preload critical API data in parallel with React / Supabase scripts.
         Fires as soon as the parser hits this tag тАФ before React evaluates, before
         auth resolves. Promises are parked on window.__lifeePreload for useEffects
         to await instead of issuing fresh fetches. -->
    <script>
        (function () {
            window.__lifeePreload = {};
            // /personas/hot has no user dependency тАФ fire immediately.
            try {
                window.__lifeePreload.hot = fetch('/personas/hot?days=7&limit=3', { credentials: 'include' })
                    .then(r => r.ok ? r.json() : { hot: [] })
                    .catch(() => ({ hot: [] }));
            } catch (_) {}

            // /sessions needs userId. Supabase stores the auth token in localStorage
            // under sb-<project-ref>-auth-token тАФ peek at it without waiting for the
            // Supabase lib to load. We also lift the full user object so App can
            // hydrate its useState synchronously (skipping the null тЖТ user flash).
            try {
                let userId = null;
                let user = null;
                for (const k of Object.keys(localStorage)) {
                    if (k.startsWith('sb-') && k.endsWith('-auth-token')) {
                        try {
                            const token = JSON.parse(localStorage.getItem(k));
                            user = token?.user || token?.currentSession?.user || null;
                            userId = user?.id || null;
                            if (userId) break;
                        } catch (_) {}
                    }
                }
                if (user) window.__lifeePreload.user = user;
                if (userId) {
                    window.__lifeePreload.userId = userId;
                    window.__lifeePreload.sessions = fetch(`/sessions?userId=${encodeURIComponent(userId)}`, { credentials: 'include' })
                        .then(r => r.ok ? r.json() : { sessions: [] })
                        .catch(() => ({ sessions: [] }));
                }
                // /credits тАФ pass userId if available so backend returns the
                // account balance (not the IP/cookie anonymous bucket).
                const creditsUrl = userId
                    ? `/credits?userId=${encodeURIComponent(userId)}`
                    : '/credits';
                window.__lifeePreload.credits = fetch(creditsUrl, { credentials: 'include' })
                    .then(r => r.ok ? r.json() : null)
                    .catch(() => null);
                // Hydrate the in-memory balance early from localStorage so the
                // sidebar card shows a number instantly on first paint. Cache is
                // keyed by userId so a sign-out / different-user flow doesn't
                // flash the previous account's balance.
                try {
                    const key = `lifee_balance_cache_${userId || 'anon'}`;
                    const cached = window.localStorage.getItem(key);
                    const n = cached == null ? NaN : parseInt(cached, 10);
                    if (Number.isFinite(n)) window.__lifeeBalance = n;
                } catch (_) {}
            } catch (_) {}
        })();
    </script>

    <!-- htm тЖТ React shim: translate HTML-style attrs (`class`, `for`) to React
         names so template literals don't trigger "Invalid DOM property" warnings. -->
    <script>
        window.__voidH = function (type, props, ...children) {
            if (props && typeof props === 'object') {
                if ('class' in props && !('className' in props)) {
                    props.className = props.class;
                    delete props.class;
                }
                if ('for' in props && !('htmlFor' in props)) {
                    props.htmlFor = props.for;
                    delete props.for;
                }
            }
            return React.createElement(type, props, ...children);
        };
    </script>

        /* тФАтФА Warm hover тАФ fixed-width sunset band sweeping across text тФАтФА
           Band has terracotta тЖТ amber тЖТ cream тЖТ amber тЖТ terracotta with transparent margins.
           A currentColor layer underneath keeps the un-covered portion of the text in its
           native colour, so the text is never invisible.

           The JS at the bottom of the file tracks the cursor: enter ends with the band
           parked under the pointer; exit continues the sweep in the same direction off right.
           --shine-pos is registered as a <percentage> via @property so it can be animated/transitioned. */
        @property --shine-pos {
            syntax: '<percentage>';
            inherits: false;
            initial-value: 130%;
        }
        .warm-shine-active {
            /* !important so class-level `background:` shorthands declared later
               in the stylesheet (e.g. .btn-ghost, .btn-gradient variants) can't
               strip our currentColor fallback and make text invisible outside
               the gradient band. */
            background-image: linear-gradient(
                110deg,
                transparent 0%,
                transparent 35%,
                rgb(var(--color-tertiary) / 0.35) 37%,
                rgb(var(--color-primary) / 1) 42%,
                rgb(var(--color-on-primary-container) / 1) 50%,
                rgb(var(--color-primary) / 1) 58%,
                rgb(var(--color-tertiary) / 0.35) 63%,
                transparent 65%,
                transparent 100%
            ) !important;
            background-color: currentColor !important;
            background-size: 220% 100% !important;
            background-position: var(--shine-pos) 50% !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            transition: --shine-pos 1.1s cubic-bezier(0.22, 1, 0.36, 1);
        }

            'common.deleteChat':         { en: 'Delete this conversation?', zh: 'хИащЩдш┐Щф╕кхп╣шпЭя╝Я' },
            'confirm.deleteChat.title':  { en: 'Delete conversation',       zh: 'хИащЩдхп╣шпЭ' },
            'confirm.deleteChat.desc':   { en: 'This will permanently remove the conversation and its messages. This cannot be undone.', zh: 'ш┐Щх░Жц░╕ф╣ЕхИащЩдшпехп╣шпЭхПКхЕ╢ц╢ИцБпя╝МцЧац│ХцБвхдНуАВ' },

            // Generic
            'common.back':       { en: 'Back',           zh: 'ш┐ФхЫЮ' },
            'common.cancel':     { en: 'Cancel',         zh: 'хПЦц╢И' },
            'common.delete':     { en: 'Delete',         zh: 'хИащЩд' },
        };

        // Module-level locale + subscription event. App keeps the "source of
        // truth" via useState тЖТ setLocale; components read via t(key).
        window.__lifeeLocale = (() => {
            try {
                const saved = window.localStorage.getItem('lifee_locale');
                if (saved === 'zh' || saved === 'en') return saved;
            } catch (_) {}
            // Default: Chinese if browser lang starts with zh, else English.
            return (navigator.language || 'en').toLowerCase().startsWith('zh') ? 'zh' : 'en';
        })();
        const t = (key) => (I18N[key] && I18N[key][window.__lifeeLocale]) || I18N[key]?.en || key;
        const setLocale = (loc) => {
            if (loc !== 'en' && loc !== 'zh') return;
            window.__lifeeLocale = loc;
            try { window.localStorage.setItem('lifee_locale', loc); } catch (_) {}
            window.dispatchEvent(new CustomEvent('lifee:locale', { detail: loc }));
        };
        const useLocale = () => {
            const [loc, setLoc] = useState(window.__lifeeLocale);
            useEffect(() => {
                const h = (e) => setLoc(e.detail);
                window.addEventListener('lifee:locale', h);
                return () => window.removeEventListener('lifee:locale', h);
            }, []);
            return loc;
        };
        window.t = t;
        window.setLocale = setLocale;
        window.useLocale = useLocale;

        // тФАтФА Icon helper (Lucide via CDN) тФАтФА
        function Icon({ name, size = 18, className = '', style }) {
            // Span is React-owned; <i>тЖТ<svg> is managed manually and cleared in cleanup
            // so Lucide's node replacement never leaves stale children for React to trip on.
            const ref = useRef(null);
            useLayoutEffect(() => {
                const el = ref.current;
                if (!el) return undefined;
                while (el.firstChild) el.removeChild(el.firstChild);
                const inner = document.createElement('i');
                const kebab = name.replace(/([A-Z])/g, (m, c, i) => (i > 0 ? '-' : '') + c.toLowerCase());
                inner.setAttribute('data-lucide', kebab);
                el.appendChild(inner);
                try { window.lucide?.createIcons?.({ nodes: [inner] }); } catch (_) {}
                return () => {
                    try { while (el.firstChild) el.removeChild(el.firstChild); } catch (_) {}
                };
            }, [name]);
            return html`<span ref=${ref} class=${'inline-flex items-center justify-center shrink-0 ' + className} style=${{ width: size, height: size, lineHeight: 0, ...(style || {}) }} aria-hidden="true" />`;
        }

        // тФАтФА Material Symbol helper тФАтФА
        function MS({ name, size = 20, className = '' }) {
            return html`<span class=${'material-symbols-outlined ' + className} style=${{ fontSize: size }}>${name}</span>`;
        }

        // тФАтФА Relative time тФАтФА
        function relativeTime(ts) {
            if (!ts) return '';
            const diff = Date.now() - new Date(ts).getTime();
            const m = Math.floor(diff / 60000);
            if (m < 1) return 'just now';
            if (m < 60) return `${m}m ago`;
            const h = Math.floor(m / 60);
            if (h < 24) return `${h}h ago`;
            const d = Math.floor(h / 24);
            if (d < 7) return `${d}d ago`;
            return new Date(ts).toLocaleDateString();
        }

        // тФАтФА AvatarDisplay тФАтФА
        // objectPosition: хПпщАЙ CSS object-position хнЧчмжф╕▓я╝ИхжВ '50% 25%'я╝Йя╝МчФиф║О
        // цикчЙИчЕзчЙЗшгБхЬЖхд┤хГПцЧ╢цККшД╕цОихИ░хЬЖх┐Гя╝Ищ╗Шшод center ч╗Пх╕╕хИЗхИ░шГ╕хПг/шВйшЖАя╝ЙуАВ
        function AvatarDisplay({ avatar, className = '', size = 40, objectPosition }) {
            if (!avatar) {
                return html`<div class=${'flex items-center justify-center bg-surface-container-high rounded-full ' + className} style=${{ width: size, height: size }}>
                    <${Icon} name="User" size=${Math.floor(size * 0.5)} className="text-on-surface-variant" />
                </div>`;
            }
            if (typeof avatar === 'string' && (avatar.startsWith('http') || avatar.startsWith('data:') || avatar.startsWith('/'))) {
                const imgStyle = { width: size, height: size };
                if (objectPosition) imgStyle.objectPosition = objectPosition;
                return html`<img src=${avatar} class=${'object-cover rounded-full ' + className} style=${imgStyle} loading="lazy" alt="" />`;
            }
            return html`<div class=${'flex items-center justify-center rounded-full ' + className} style=${{ width: size, height: size, fontSize: Math.floor(size * 0.5) }}>${avatar}</div>`;
        }

        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        //  AUTH MODAL
        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        function AuthModal({ isOpen, onClose, onAuthed }) {
            const [mode, setMode] = useState('login');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');
            const [otpSent, setOtpSent] = useState(false);
            const [otpCode, setOtpCode] = useState('');
            const [resendCooldown, setResendCooldown] = useState(0); // хПСщАБщкМшпБчаБхРОчЪД 60s хАТшобцЧ╢
            // Turnstile х╖▓чз╗щЩдя╝ЪhumanVerified щ╗Шшод trueя╝Мш╖│ш┐ЗщкМшпБчаБ UI чЫ┤цОеш┐ЫхЕе
            // щВочо▒/хпЖчаБшбихНХуАВф╕ЛщЭвщВгф╕к widget useEffect хЫаф╕║ humanVerified=true цЧйщААхЗ║уАВ
            const [humanVerified, setHumanVerified] = useState(true);
            const turnstileRef = useRef(null);
            const widgetIdRef = useRef(null);

            // цпПцмбцЙУх╝А modal хЕИцКК state щЗНч╜охИ░чЩ╗х╜Хщб╡уАВхРжхИЩчЩ╗хЗ║ тЖТ щЗНх╝Аф╝ЪхБЬхЬиф╕Кф╕АцмбчЪД OTP цнеуАВ
            useEffect(() => {
                if (isOpen) {
                    setMode('login');
                    setOtpSent(false);
                    setOtpCode('');
                    setPassword('');
                    setMessage('');
                    setLoading(false);
                    setResendCooldown(0);
                }
            }, [isOpen]);

            useEffect(() => {
                if (resendCooldown <= 0) return;
                const t = setTimeout(() => setResendCooldown(s => s - 1), 1000);
                return () => clearTimeout(t);
            }, [resendCooldown]);

            useEffect(() => {
                if (!isOpen || humanVerified) return;
                const renderWidget = () => {
                    if (turnstileRef.current && window.turnstile && widgetIdRef.current === null) {
                        widgetIdRef.current = window.turnstile.render(turnstileRef.current, {
                            sitekey: TURNSTILE_SITEKEY,
                            callback: async (token) => {
                                const result = await verifyHumanTokenWithServer(token);
                                if (result.ok) {
                                    setHumanVerified(true);
                                    if (result.bypassed) setMessage('Local preview: verification skipped.');
                                } else {
                                    setMessage(result.message || 'Verification failed. Please retry.');
                                }
                            },
                            theme: window.__lifeeTheme === 'light' ? 'light' : 'dark',
                        });
                    }
                };
                if (window.turnstile) { renderWidget(); }
                else {
                    const timer = setInterval(() => {
                        if (window.turnstile) { clearInterval(timer); renderWidget(); }
                    }, 200);
                    return () => clearInterval(timer);
                }
                return () => {
                    if (widgetIdRef.current !== null && window.turnstile) {
                        window.turnstile.remove(widgetIdRef.current);
                        widgetIdRef.current = null;
                    }
                };
            }, [isOpen, humanVerified]);

            if (!isOpen) return null;

            const handleAuth = async () => {
                setLoading(true);
                setMessage('');
                try {
                    if (mode === 'login') {
                        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                        if (data?.user) onAuthed(data.user);
                    } else {
                        // ц│ихЖМя╝Ъх┐Ещб╗хЕИчВ╣ш┐З"хПСщАБщкМшпБчаБ"я╝МOTP цЙНшГ╜швлхбл
                        const { data, error } = await supabaseClient.auth.verifyOtp({ email, token: otpCode, type: 'signup' });
                        if (error) throw error;
                        if (data?.user) onAuthed(data.user);
                    }
                } catch (err) {
                    setMessage(err?.message || 'Operation failed. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            const handleSendCode = async () => {
                setLoading(true);
                setMessage('');
                try {
                    const { error } = await supabaseClient.auth.signUp({ email, password });
                    if (error) throw error;
                    setOtpSent(true);
                    setResendCooldown(60);
                    setMessage(window.__lifeeLocale === 'zh'
                        ? 'щкМшпБчаБх╖▓хПСщАБхИ░щВочо▒'
                        : 'Verification code sent to your email.');
                } catch (err) {
                    setMessage(err?.message || 'Failed to send code.');
                } finally {
                    setLoading(false);
                }
            };

            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>
                    <div class="relative w-full max-w-sm mx-4 glass-card rounded-3xl p-8 animate-in iridescent-border">
                        <div class="flex items-center justify-between mb-7">
                            <div>
                                <h2 class="font-headline text-lg font-bold text-on-surface">
                                    ${mode === 'login' ? t('auth.welcomeBack') : t('auth.createAccount')}
                                </h2>
                                <p class="text-xs text-on-surface-variant mt-0.5">LIFEE</p>
                            </div>
                            <button onClick=${onClose} class="w-8 h-8 rounded-full btn-ghost flex items-center justify-center">
                                <${Icon} name="X" size=${14} />
                            </button>
                        </div>

                        ${!humanVerified ? html`
                            <div class="flex flex-col items-center gap-4 py-4">
                                <p class="text-sm text-on-surface-variant">${t('auth.verifyHuman')}</p>
                                <div ref=${turnstileRef}></div>
                                ${message && html`<p class="text-xs text-tertiary/80 text-center">${message}</p>`}
                            </div>
                        ` : html`
                            <div class="space-y-3">
                                ${mode === 'signup' ? html`
                                    <div class="flex gap-2">
                                        <input
                                            type="email"
                                            placeholder=${t('auth.emailPh')}
                                            value=${email}
                                            onInput=${e => setEmail(e.target.value)}
                                            class="flex-1 min-w-0 bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                        />
                                        <button
                                            onClick=${handleSendCode}
                                            disabled=${loading || !email || !password || resendCooldown > 0}
                                            class="shrink-0 px-3 rounded-xl btn-ghost text-xs whitespace-nowrap disabled:opacity-40"
                                        >${resendCooldown > 0
                                            ? t('auth.resendIn').replace('{s}', resendCooldown)
                                            : t('auth.sendCode')}</button>
                                    </div>
                                ` : html`
                                    <input
                                        type="email"
                                        placeholder=${t('auth.emailPh')}
                                        value=${email}
                                        onInput=${e => setEmail(e.target.value)}
                                        class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                    />
                                `}
                                <input
                                    type="password"
                                    placeholder=${t('auth.passwordPh')}
                                    value=${password}
                                    onInput=${e => setPassword(e.target.value)}
                                    onKeyDown=${e => { if (e.key === 'Enter' && mode === 'login') handleAuth(); }}
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                />
                                ${mode === 'signup' ? html`
                                    <input
                                        type="text"
                                        placeholder=${t('auth.otpPh')}
                                        value=${otpCode}
                                        onInput=${e => setOtpCode(e.target.value)}
                                        onKeyDown=${e => { if (e.key === 'Enter' && otpCode) handleAuth(); }}
                                        class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                    />
                                ` : null}
                                ${message && html`<p class="text-xs text-tertiary/80">${message}</p>`}
                                <button
                                    onClick=${handleAuth}
                                    disabled=${loading || !email || !password || (mode === 'signup' && !otpCode)}
                                    class="w-full btn-gradient rounded-xl py-3 text-sm disabled:opacity-40"
                                >${loading
                                    ? t('auth.pleaseWait')
                                    : mode === 'login' ? t('auth.signInBtn') : t('auth.verifyBtn')}</button>
                                <p class="text-center text-xs text-on-surface-variant pt-3">
                                    ${mode === 'login'
                                        ? html`<span>${t('auth.noAccount')} <button onClick=${() => { setMode('signup'); setMessage(''); setOtpSent(false); setOtpCode(''); }} class="text-primary hover:underline">${t('auth.signUp')}</button></span>`
                                        : html`<span>${t('auth.haveAccount')} <button onClick=${() => { setMode('login'); setMessage(''); setOtpSent(false); setOtpCode(''); }} class="text-primary hover:underline">${t('auth.signInBtn')}</button></span>`}
                                </p>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        //  SIDEBAR
        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        function Sidebar({
            view, setView, user, onNewSession, chatSessions,
            setChatSessions, setSessionMessages, setSessionOptions,
            sessionId, setSessionId, setSelectedIds,
            personas, onLogin, onSignOut, userAvatar,
            sidebarOpen, setSidebarOpen,
            onOpenRedeem, onOpenFeedback,
            themeMode, setThemeMode,
            openConfirm,
        }) {
            const [userMenuOpen, setUserMenuOpen] = useState(false);
            const userCardRef = useRef(null);

            // Close user menu on outside click
            useEffect(() => {
                if (!userMenuOpen) return;
                const handler = (e) => {
                    if (userCardRef.current && !userCardRef.current.contains(e.target)) {
                        setUserMenuOpen(false);
                    }
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, [userMenuOpen]);

            const restoreSession = async (s) => {
                try {
                    const r = await fetch(`/sessions/${s.id}/messages`, { credentials: 'include' });
                    if (!r.ok) { console.warn('restore: backend returned', r.status); return; }
                    const res = await r.json().catch(() => null);
                    if (res?.messages) {
                        setSessionMessages(res.messages.map(m => ({ personaId: m.persona_id || m.role, text: m.content, seq: m.seq })));
                        if (setSessionOptions) setSessionOptions(Array.isArray(res.options) ? res.options : []);
                        setSessionId(s.id);
                        if (s.personas?.length && setSelectedIds) {
                            const ids = s.personas.map(pid => {
                                const found = (personas || []).find(p =>
                                    p.id === pid || p.name === pid || p.id === pid.toLowerCase().replace(/\s+/g, '')
                                );
                                return found?.id;
                            }).filter(Boolean);
                            if (ids.length) setSelectedIds(ids);
                        }
                        setView('debate');
                    }
                } catch (e) { console.error('restore session failed', e); }
            };

            const starSession = (s, e) => {
                e.stopPropagation();
                const newVal = !s.starred;
                // Optimistic: flip UI immediately, reconcile on response.
                setChatSessions(prev => prev.map(x => x.id === s.id ? { ...x, starred: newVal } : x));
                fetch(`/sessions/${s.id}`, {
                    method: 'PATCH', credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ starred: newVal })
                }).then(r => {
                    if (!r.ok) throw new Error('patch failed');
                }).catch(() => {
                    // Revert on failure.
                    setChatSessions(prev => prev.map(x => x.id === s.id ? { ...x, starred: !newVal } : x));
                });
            };

            const deleteSession = (s, e) => {
                e.stopPropagation();
                const doDelete = async () => {
                    await fetch(`/sessions/${s.id}`, { method: 'DELETE', credentials: 'include' });
                    setChatSessions(prev => prev.filter(x => x.id !== s.id));
                    if (sessionId === s.id) {
                        setSessionId(null);
                        setSessionMessages([]);
                        setView('home');
                    }
                };
                if (openConfirm) {
                    openConfirm({
                        title: t('confirm.deleteChat.title'),
                        message: t('confirm.deleteChat.desc'),
                        confirmLabel: t('common.delete'),
                        cancelLabel: t('common.cancel'),
                        destructive: true,
                        onConfirm: doDelete,
                    });
                } else {
                    // Fallback тАФ should not happen once openConfirm is wired.
                    if (!confirm(t('common.deleteChat'))) return;
                    doDelete();
                }
            };

            const displayName = user?.user_metadata?.name || user?.email?.split('@')[0] || 'User';
            const userInitial = (displayName || 'U')[0].toUpperCase();
            const userEmail = user?.email || 'user@example.com';
            // Credits тАФ stale-while-revalidate. Boot from in-memory / localStorage
            // so the card shows a number on first paint; revalidate in background.
            const balanceCacheKey = (uid) => `lifee_balance_cache_${uid || 'anon'}`;
            const [userCredits, setUserCredits] = useState(() => {
                if (typeof window.__lifeeBalance === 'number') return window.__lifeeBalance;
                try {
                    const uid = user?.id || window.__lifeePreload?.userId || '';
                    const cached = window.localStorage.getItem(balanceCacheKey(uid));
                    const n = cached == null ? NaN : parseInt(cached, 10);
                    if (Number.isFinite(n)) return n;
                } catch (_) {}
                return 'тАФ';
            });

            const applyBalance = useCallback((n) => {
                if (typeof n !== 'number' || !Number.isFinite(n)) return;
                setUserCredits(n);
                window.__lifeeBalance = n;
                try {
                    const uid = user?.id || window.__lifeePreload?.userId || '';
                    window.localStorage.setItem(balanceCacheKey(uid), String(n));
                } catch (_) {}
            }, [user?.id]);

            useEffect(() => {
                if (!user) {
                    setUserCredits('тАФ');
                    return;
                }
                let cancelled = false;
                fetch(`/credits?userId=${encodeURIComponent(user.id)}`, { credentials: 'include' })
                    .then(r => r.ok ? r.json() : null)
                    .then(d => { if (!cancelled && d && typeof d.balance === 'number') applyBalance(d.balance); })
                    .catch(() => {});
                const onBalance = (e) => {
                    if (typeof e?.detail === 'number') applyBalance(e.detail);
                };
                window.addEventListener('lifee:balance', onBalance);
                return () => {
                    cancelled = true;
                    window.removeEventListener('lifee:balance', onBalance);
                };
            }, [user?.id, applyBalance]);

            // Collapsed rail (Claude-style): icons only тАФ structure mirrors expanded sidebar so
            // every icon stays on the same horizontal line as its expanded counterpart.
            // Both branches share a single outer <aside> so width can animate between states
            // (otherwise React unmounts/remounts and the toggle is instant).
            const collapsedInner = html`
                <div class="flex flex-col h-full w-14 pt-10 pb-10 items-center">
                    <!-- Masthead mirror: Toggle replaces the LIFEE wordmark; subtitle-height spacer keeps nav aligned -->
                    <div class="w-full pb-4 mb-8 border-b border-on-surface/10 flex flex-col items-center">
                        <button
                            onClick=${() => setSidebarOpen(true)}
                            class="w-9 h-7 rounded flex items-center justify-center text-on-surface-variant/50 hover-warm-icon -mt-0.5"
                            title="Open sidebar"
                        ><${Icon} name="Sidebar" size=${16} style=${{ transform: 'scaleX(1.35)' }} /></button>
                        <div class="mt-2 h-[15px]"></div>
                    </div>

                    <!-- Nav section mirror: starts at the same Y as expanded nav, uses the
                         same Material Symbols set so icon shapes match the expanded view -->
                    <nav class="flex-1 w-full flex flex-col items-center gap-2 mt-2">
                        <button
                            onClick=${() => onNewSession?.()}
                            class=${`w-9 h-9 rounded-lg flex items-center justify-center hover-warm-icon ${view === 'home' ? 'text-primary' : 'text-on-surface-variant/60'}`}
                            title=${t('nav.home')}
                        ><span class="material-symbols-outlined" style=${{ fontSize: '18px' }}>home</span></button>

                        <button
                            onClick=${() => setView('community')}

        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        //  REDEEM MODAL тАФ redeem a credit code
        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        function RedeemModal({ isOpen, onClose, user }) {
            const [code, setCode]       = useState('');
            const [loading, setLoading] = useState(false);
            const [status, setStatus]   = useState('');
            const [statusKind, setStatusKind] = useState(''); // 'ok' | 'err'

            useEffect(() => {
                if (!isOpen) { setCode(''); setStatus(''); setStatusKind(''); }
            }, [isOpen]);

            if (!isOpen) return null;

            const submit = async () => {
                const trimmed = (code || '').trim();
                if (!trimmed || !user) return;
                setLoading(true);
                setStatus(''); setStatusKind('');
                try {
                    const r = await fetch('/credits/redeem', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ userId: user.id, code: trimmed }),
                    });
                    const data = await r.json();
                    if (data?.ok) {
                        setStatus(data.message || 'Redeemed successfully');
                        setStatusKind('ok');
                        // Broadcast the new balance so sidebar credit badge updates immediately.
                        if (typeof data.balance === 'number') {
                            window.__lifeeBalance = data.balance;
                            window.dispatchEvent(new CustomEvent('lifee:balance', { detail: data.balance }));
                        }
                        setCode('');
                    } else {
                        setStatus(data?.message || 'Invalid code');
                        setStatusKind('err');
                    }
                } catch (e) {
                    setStatus(e?.message || 'Network error');
                    setStatusKind('err');
                } finally {
                    setLoading(false);
                }
            };

            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>
                    <div class="relative w-full max-w-md mx-4 glass-card rounded-3xl p-10 animate-in iridescent-border">
                        <div class="flex items-center justify-between mb-7">
                            <div class="flex items-center gap-2.5">
                                <span class="material-symbols-outlined text-primary" style=${{ fontSize: '22px' }}>redeem</span>
                                <h2 class="font-headline text-xl font-bold text-on-surface">${t('redeem.title')}</h2>
                            </div>
                            <button onClick=${onClose} class="w-8 h-8 rounded-full btn-ghost flex items-center justify-center">
                                <span class="material-symbols-outlined" style=${{ fontSize: '14px' }}>close</span>
                            </button>
                        </div>

                        <p class="text-sm text-on-surface-variant/70 mb-6 leading-relaxed">
                            ${t('redeem.desc')}
                        </p>

                            type="text"
                            placeholder=${t('redeem.placeholder')}
                            value=${code}
                            onInput=${(e) => setCode(e.target.value.toUpperCase())}
                            onKeyDown=${(e) => { if (e.key === 'Enter') submit(); }}
                            class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-4 text-base uppercase tracking-[0.25em] text-center font-mono focus:outline-none focus:border-primary/50 void-textarea mb-4"
                            autoFocus
                        />

                        ${status ? html`
                            <p class=${'text-xs mb-3 ' + (statusKind === 'ok' ? 'text-primary/80' : 'text-tertiary/80')}>
                                ${status}
                            </p>
                        ` : null}

                        <button
                            onClick=${submit}
                            disabled=${loading || !code.trim() || !user}
                            class="w-full btn-gradient rounded-xl py-4 text-base font-semibold disabled:opacity-40"
                        >${loading ? t('redeem.redeeming') : t('redeem.action')}</button>
                    </div>
                </div>
            `;
        }

        //  FEEDBACK MODAL тАФ user sends a note to the team
        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        function FeedbackModal({ isOpen, onClose, user }) {
            const [content, setContent] = useState('');
            const [loading, setLoading] = useState(false);
            const [status, setStatus]   = useState('');
            const [statusKind, setStatusKind] = useState(''); // 'ok' | 'err'

            useEffect(() => {
                if (!isOpen) { setStatus(''); setStatusKind(''); }
            }, [isOpen]);

            if (!isOpen) return null;

            const submit = async () => {
                const trimmed = (content || '').trim();
                if (!trimmed) return;
                setLoading(true);
                setStatus(''); setStatusKind('');
                try {
                    const r = await fetch('/feedback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({
                            content: trimmed,
                            userId: user?.id || '',
                            email: user?.email || '',
                            url: window.location.href,
                        }),
                    });
                    const data = await r.json();
                    if (data?.ok) {
                        setStatus(t('feedback.sent'));
                        setStatusKind('ok');
                        setContent('');
                        // Auto-close after a beat so user sees the confirmation.
                        setTimeout(() => onClose?.(), 1200);
                    } else {
                        setStatus(data?.message || t('feedback.failed'));
                        setStatusKind('err');
                    }
                } catch (e) {
                    setStatus(e?.message || t('feedback.failed'));
                    setStatusKind('err');
                } finally {
                    setLoading(false);
                }
            };

            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>
                    <div class="relative w-full max-w-md mx-4 glass-card rounded-3xl p-10 animate-in iridescent-border">
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center gap-2.5">
                                <span class="material-symbols-outlined text-primary" style=${{ fontSize: '22px' }}>feedback</span>
                                <h2 class="font-headline text-xl font-bold text-on-surface">${t('feedback.title')}</h2>
                            </div>
                            <button onClick=${onClose} class="w-8 h-8 rounded-full btn-ghost flex items-center justify-center">
                                <span class="material-symbols-outlined" style=${{ fontSize: '14px' }}>close</span>
                            </button>
                        </div>

                        <p class="text-sm text-on-surface-variant/70 mb-5 leading-relaxed">${t('feedback.desc')}</p>

                        <textarea
                            value=${content}
                            onInput=${(e) => setContent(e.target.value)}
                            placeholder=${t('feedback.placeholder')}
                            rows=${6}
                            class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm leading-relaxed focus:outline-none focus:border-primary/50 void-textarea resize-none mb-4"
                            autoFocus
                        ></textarea>

                        ${status ? html`
                            <p class=${'text-xs mb-3 ' + (statusKind === 'ok' ? 'text-primary/80' : 'text-tertiary/80')}>
                                ${status}
                            </p>
                        ` : null}

                        <button
                            onClick=${submit}
                            disabled=${loading || !content.trim()}
                            class="w-full btn-gradient rounded-xl py-4 text-base font-semibold disabled:opacity-40"
                        >${loading ? t('feedback.sending') : t('feedback.submit')}</button>
                    </div>
                </div>
            `;
        }

        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        //  CONFIRM MODAL тАФ themed replacement for window.confirm()
        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        function ConfirmModal({ state, onClose }) {
            const { isOpen, title, message, confirmLabel, cancelLabel, destructive, onConfirm } = state || {};

            useEffect(() => {
                if (!isOpen) return;
                const onKey = (e) => {
                    if (e.key === 'Escape') onClose?.();
                    else if (e.key === 'Enter') { onConfirm?.(); onClose?.(); }
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [isOpen, onConfirm, onClose]);

            if (!isOpen) return null;

            const confirmClass = destructive
                ? 'w-full sm:w-auto px-5 py-2.5 rounded-xl bg-tertiary/90 hover:bg-tertiary text-on-tertiary text-sm font-semibold transition-colors'
                : 'w-full sm:w-auto px-5 py-2.5 rounded-xl btn-gradient text-sm font-semibold';
            const iconName = destructive ? 'warning' : 'help';
            const iconColor = destructive ? 'text-tertiary' : 'text-primary';

            return html`
                <div class="fixed inset-0 z-[60] flex items-center justify-center">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>
                    <div class="relative w-full max-w-sm mx-4 glass-card rounded-3xl p-8 animate-in iridescent-border">
                        <div class="flex items-start gap-3 mb-5">
                            <span class=${'material-symbols-outlined ' + iconColor} style=${{ fontSize: '22px' }}>${iconName}</span>
                            <h2 class="font-headline text-lg font-bold text-on-surface leading-tight pt-0.5">${title || t('common.deleteChat')}</h2>
                        </div>
                        ${message ? html`
                            <p class="text-sm text-on-surface-variant/75 leading-relaxed mb-7">${message}</p>
                        ` : null}
                        <div class="flex flex-col-reverse sm:flex-row sm:justify-end gap-2">
                            <button
                                onClick=${onClose}
                                class="w-full sm:w-auto px-5 py-2.5 rounded-xl btn-ghost text-sm font-medium"
                            ><span>${cancelLabel || t('common.cancel')}</span></button>
                            <button
                                onClick=${() => { onConfirm?.(); onClose?.(); }}
                                class=${confirmClass}
                                autoFocus
                            ><span>${confirmLabel || t('common.delete')}</span></button>
                        </div>
                    </div>
                </div>
            `;
        }

        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        //  HOME VIEW
        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        function HomeView({ user, context, setContext, setView, personas, customPersonas, selectedIds, setSelectedIds, setPersonas, upsertCustomPersona, startFreshDebate, chatSessions, debateSettings, setDebateSettings, setPersonaCoverOverrides, setPersonaAvatarOverrides }) {
            // Domain classification by persona id
            const DOMAIN_MAP = {
                'krishnamurti': 'Philosophy', 'lacan': 'Philosophy', 'Simone de Beauvoir': 'Philosophy',
                'buffett': 'Business', 'munger': 'Business', 'drucker': 'Business', 'welch': 'Business',
                'shannon': 'Science', 'turing': 'Science', 'vonneumann': 'Science',
                'audrey-hepburn': 'Arts', 'coco-chanel': 'Arts',
            };
            const getDomain = (p) => {
                const category = String(p.category || '').toUpperCase();
                if (category === 'MYSTIC') return 'Mystical';
                return DOMAIN_MAP[p.id] || p.category || 'Other';
            };

            // Hot domain тАФ site-wide top personas over the last 7 days.
            // Fetched from /personas/hot which aggregates chat_sessions across
            // all users (sliding window). Fall back to an empty list on error
            // so the Hot tab simply disappears.
            // Stale-while-revalidate: hydrate from localStorage cache and the
            // pre-fired fetch (window.__lifeePreload.hot kicked off in <head>
            // before React loaded). Repeat visits show the big featured card
            // instantly from cache; first visits still benefit from the preload
            // running in parallel with React / Supabase scripts.
            const [hotRanking, setHotRanking] = useState(() => {
                try {
                    const raw = window.localStorage.getItem('lifee_hot_ranking_cache');
                    return raw ? (JSON.parse(raw) || []) : [];
                } catch (_) { return []; }
            });
            const [hotLoaded, setHotLoaded]   = useState(() => {
                try {
                    const raw = window.localStorage.getItem('lifee_hot_ranking_cache');
                    return !!(raw && JSON.parse(raw)?.length);
                } catch (_) { return false; }
            });
            useEffect(() => {
                let cancelled = false;
                (async () => {
                    try {
                        const preloaded = window.__lifeePreload?.hot;
                        const data = preloaded
                            ? await preloaded
                            : await fetch('/personas/hot?days=7&limit=3', { credentials: 'include' }).then(r => r.ok ? r.json() : { hot: [] });
                        if (!cancelled && Array.isArray(data?.hot)) {
                            setHotRanking(data.hot);
                            try { window.localStorage.setItem('lifee_hot_ranking_cache', JSON.stringify(data.hot)); } catch (_) {}
                        }
                    } catch (_) {}
                    finally { if (!cancelled) setHotLoaded(true); }
                })();
                return () => { cancelled = true; };
            }, []);
            const hotPersonas = hotRanking
                .map(({ id }) => personas.find(p =>
                    p.id === id ||
                    p.name === id ||
                    p.id === String(id).toLowerCase().replace(/\s+/g, '')
                ))
                .filter(Boolean);

            const DOMAIN_ORDER = ['Philosophy', 'Business', 'Science', 'Arts', 'Mystical'];
            // чГнщЧишзТшЙ▓ф╕НхЖНхНХчЛмхНаф╕Аф╕к domainя╝ИщБ┐хЕНхТМхОЯ domain щЗНхдНхЗ║чО░я╝Йя╝М
            // шАМцШпч╗ЩхОЯ domain щЗМчЪДхНбчЙЗцЙУф╕Аф╕к"чГнщЧи"х░ПцаЗчн╛уАВ
            const hotIdSet = new Set(hotPersonas.map(p => p.id));

            // Group personas by domain
            const grouped = {};
            DOMAIN_ORDER.forEach(d => grouped[d] = []);
            personas.forEach(p => {
                const d = getDomain(p);
                if (grouped[d]) grouped[d].push(p);
            });
            // чГнщЧишзТшЙ▓хЬихоГцЙАх▒Ю domain хЖЕцОТхИ░цЬАхЙН
            DOMAIN_ORDER.forEach(d => {
                grouped[d].sort((a, b) => {
                    const aHot = hotIdSet.has(a.id) ? 1 : 0;
                    const bHot = hotIdSet.has(b.id) ? 1 : 0;
                    return bHot - aHot;
                });
            });

            // Mystical sub-mode тЖТ persona auto-lock map. Currently only хН░хНа
            // pins the хН░хНах╕И voice; хЕлхнЧ/хбФч╜Ч keep free selection until those
            // analyst personas are wired in.
            const MYSTIC_LOCK_MAP = { seal: 'seal-master', tarot: 'tarot-reader' };

            // Conversation mode (null = default multi-voice council)
            // ф╗О localStorage шп╗ф╕КцмбщАЙцЛйя╝Мф╗ЕшодчЩ╜хРНхНХхА╝я╝ЫцЬкчЯехА╝х┐╜чХея╝МщБ┐хЕНшДПцХ░цНоуАВ
            const [mode, setMode] = useState(() => {
                try {
                    const saved = window.localStorage.getItem('lifee_home_mode');
                    return ['ab', 'values', 'mystical'].includes(saved) ? saved : null;
                } catch (_) { return null; }
            });
            useEffect(() => {
                try {
                    if (mode) window.localStorage.setItem('lifee_home_mode', mode);
                    else window.localStorage.removeItem('lifee_home_mode');
                } catch (_) {}
            }, [mode]);
            const [mysticType, setMysticType] = useState(null);
            // Personas the user can't toggle off (e.g. хН░хНах╕И while хН░хНа is active).
            // Each entry must remain in selectedIds until the lock is released.
            const [lockedIds, setLockedIds] = useState([]);

            useEffect(() => {
                const lockId = mode === 'mystical' && mysticType ? (MYSTIC_LOCK_MAP[mysticType] || null) : null;
                if (lockId) {
                    setLockedIds(prev => (prev.length === 1 && prev[0] === lockId ? prev : [lockId]));
                    setSelectedIds(prev => (prev.includes(lockId) ? prev : [...prev, lockId]));
                } else {
                    if (lockedIds.length > 0) {
                        const releasing = lockedIds;
                        setLockedIds([]);
                        setSelectedIds(prev => prev.filter(x => !releasing.includes(x)));
                    }
                }
                // eslint-disable-next-line react-hooks/exhaustive-deps
            }, [mode, mysticType]);

            const toggleSelect = (id) => {
                if (lockedIds.includes(id)) return;
                setSelectedIds(prev =>
                    prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
                );
            };

            const selectedPersonas = personas.filter(p => selectedIds.includes(p.id));

            // шзжх▒П tap цибх╝П pill цЧ╢чЯнцЪВцШ╛чд║ tooltipя╝ИцбМщЭвчФи group-hover ф╕НщЬАшжБхоГя╝Й
            const [touchedMode, setTouchedMode] = useState(null);

            // placeholder цибч│Кф║ТцНвя╝Ъcur = х╜УхЙНцЦЗцбИя╝Мprev = ф╕Кф╕АцЭбя╝ИхКичФ╗цЬЯщЧ┤хЕ▒хнШ ~200msя╝Й
            const curPlaceholder = mode ? t('home.mode.' + mode + '.placeholder') : t('home.placeholder');
            const [prevPlaceholder, setPrevPlaceholder] = useState(null);
            const lastPlaceholderRef = useRef(curPlaceholder);
            useEffect(() => {
                if (lastPlaceholderRef.current !== curPlaceholder) {
                    setPrevPlaceholder(lastPlaceholderRef.current);
                    lastPlaceholderRef.current = curPlaceholder;
                    // цЧзчЪД 250ms ц╖бхЗ║ + 80ms щЧ┤щЪФ + цЦ░чЪД 280ms ц╖бхЕе = 610ms хЕичиЛя╝Ы620ms хРОц╕ЕчРЖ prev
                    const id = setTimeout(() => setPrevPlaceholder(null), 620);
                    return () => clearTimeout(id);
                }
            }, [curPlaceholder]);

            const MYSTIC_REQUIREMENTS = {
                seal: {
                    title: () => t('home.mystic.seal.title'),
                    personaIds: ['seal-master'],
                    required: () => window.__lifeeLocale === 'zh'
                        ? ['D1 хС╜чЫШ PDF хЙНф╕дщб╡цИЦхПпшп╗цИкхЫ╛', 'SAV / Ashtakavarga цИкхЫ╛', 'ф╜ашжБщЧочЪДхЕ╖ф╜УщЧощвШцИЦцнещкдцМЗф╗д']
                        : ['D1 chart PDF first two pages or readable screenshots', 'SAV / Ashtakavarga screenshot', 'Your concrete question or SOP step'],
                    template: () => window.__lifeeLocale === 'zh'
                        ? 'уАРхН░хНаш╡ДцЦЩуАС\n1. D1 хС╜чЫШя╝Ъ\n2. SAV цИкхЫ╛/цХ░хА╝я╝Ъ\n3. х╜УхЙНцГ│щЧочЪДщЧощвШя╝Ъ\n4. х╖▓чЯеч╝║хд▒ф┐бцБпя╝Ъ'
                        : '[Seal Reading Material]\n1. D1 chart:\n2. SAV screenshot/values:\n3. Question:\n4. Known missing data:',
                    isReady: (text) => {
                        const s = text || '';
                        return s.length > 40 && /(D1|SAV|Ashtakavarga|хС╜чЫШ|цИкхЫ╛|chart|lagna|ascendant|шбМцШЯ|холф╜Н|house)/i.test(s);
                    },
                },
                bazi: {
                    title: () => t('home.mystic.bazi.title'),
                    personaIds: ['bazi-master', 'bazi', 'mystic'],
                    required: () => window.__lifeeLocale === 'zh'
                        ? ['хЗ║чФЯцЧецЬЯя╝ИхЕмхОЖ/хЖЬхОЖшп╖ц│ицШОя╝Й', 'хЗ║чФЯцЧ╢щЧ┤цИЦцЧ╢ш╛░', 'хЗ║чФЯхЬ░', 'ф╜ашжБщЧочЪДхЕ╖ф╜УщЧощвШ']
                        : ['Birth date (specify Gregorian/lunar if relevant)', 'Birth time', 'Birthplace', 'Your concrete question'],
                    template: () => window.__lifeeLocale === 'zh'
                        ? 'уАРхЕлхнЧш╡ДцЦЩуАС\n1. хЗ║чФЯцЧецЬЯя╝Ъ\n2. хЗ║чФЯцЧ╢щЧ┤/цЧ╢ш╛░я╝Ъ\n3. хЗ║чФЯхЬ░я╝Ъ\n4. цГ│щЧочЪДщЧощвШя╝Ъ'
                        : '[Ba Zi Material]\n1. Birth date:\n2. Birth time:\n3. Birthplace:\n4. Question:',
                    isReady: (text) => {
                        const s = text || '';
                        return /(хЗ║чФЯ|чФЯцЧе|birth|born|цЧ╢ш╛░|цЧ╢щЧ┤|time|хЬ░чВ╣|хЗ║чФЯхЬ░|place)/i.test(s) && s.length > 25;
                    },
                },
                tarot: {
                    title: () => t('home.mystic.tarot.title'),
                    personaIds: ['tarot-reader', 'tarot'],
                    required: () => window.__lifeeLocale === 'zh'
                        ? ['ф╕Аф╕кхЕ╖ф╜УщЧощвШ', 'щЧощвШшГМцЩпцИЦх╜УхЙНч║ач╗УчВ╣', 'ф╜ах╕МцЬЫчЬЛц╕ЕчЪДцЧ╢щЧ┤шМГхЫ┤цИЦщАЙцЛй']
                        : ['A concrete question', 'Context or current tension', 'The timeframe or choice you want clarified'],
                    template: () => window.__lifeeLocale === 'zh'
                        ? 'уАРхбФч╜ЧщЧощвШуАС\n1. хЕ╖ф╜УщЧощвШя╝Ъ\n2. шГМцЩп/ч║ач╗УчВ╣я╝Ъ\n3. цГ│чЬЛц╕ЕчЪДцЧ╢щЧ┤шМГхЫ┤цИЦщАЙцЛйя╝Ъ'
                        : '[Tarot Question]\n1. Concrete question:\n2. Context/tension:\n3. Timeframe or choice:',
                    isReady: (text) => (text || '').trim().length > 12,
                },
            };

            const mysticMethodForPersona = (p) => {
                if (!p) return null;
                const id = String(p.id || '').toLowerCase();
                const name = `${p.name || ''} ${p.role || ''}`.toLowerCase();
                for (const [method, cfg] of Object.entries(MYSTIC_REQUIREMENTS)) {
                    if ((cfg.personaIds || []).some(pid => pid.toLowerCase() === id)) return method;
                }
                if (/хЕлхнЧ|bazi|ba zi/.test(name)) return 'bazi';
                if (/хбФч╜Ч|tarot/.test(name)) return 'tarot';
                if (/хН░хНа|vedic|seal/.test(name)) return 'seal';
                return String(p.category || '').toUpperCase() === 'MYSTIC' ? 'seal' : null;
            };

            const selectedMysticMethods = Array.from(new Set([
                mode === 'mystical' ? mysticType : null,
                ...selectedPersonas.map(mysticMethodForPersona),
            ].filter(Boolean)));

            const selectedMysticRequirements = selectedMysticMethods
                .map(method => ({ method, ...MYSTIC_REQUIREMENTS[method] }))
                .filter(req => req && req.title);

            // Detail modal state (full persona profile)
            const [detailPersonaId, setDetailPersonaId] = useState(null);
            const detailPersona = detailPersonaId ? personas.find(p => p.id === detailPersonaId) : null;

            // Transient toast for gentle guidance (e.g. "pick a voice first")
            const [toastMsg, setToastMsg] = useState('');
            useEffect(() => {
                if (!toastMsg) return;
                const t = setTimeout(() => setToastMsg(''), 2800);
                return () => clearTimeout(t);
            }, [toastMsg]);

            // Follow-up popup state: when mode === 'ab', send opens a 3-round
            // Q&A modal that feeds richer context to the chat arena before it starts.
            const [followupFlow, setFollowupFlow] = useState(null);
            // Shape: { round, card, answers, qa: [{q, a, options}], loading, error }

            // Persona recommendation modal state. Opened after the follow-up flow
            // completes so the user can pick recommended / AI-generated personas
            // before the chat view opens.
            const [recommendOpen, setRecommendOpen] = useState(false);
            // Enriched situation staged for the chat view once the user confirms.
            const [stagedSituation, setStagedSituation] = useState('');

            const fetchFollowupRound = async (qa, situation) => {
                // Build history: user's situation, then any prior Q&A assistant/user turns.
                const history = [{ role: 'user', content: situation }];
                for (const round of qa) {
                    history.push({ role: 'assistant', name: 'LIFEE', content: JSON.stringify({ __lifee_followup__: round.card }) });
                    history.push({ role: 'user', content: round.answerText });
                }
                const selectedPersonas = personas.filter(p => selectedIds.includes(p.id));
                const res = await fetch('/followup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userInput: '',  // transcript already carries the last line
                        personas: selectedPersonas.map(p => ({
                            id: p.id, name: p.name,
                            soul: p.soul || '',
                            knowledge: p.knowledge || '',
                            emoji: p.avatar || 'тЬи',
                        })),
                        history,
                    }),
                });
                const data = await res.json().catch(() => ({}));
                return data?.data || null;
            };

            const startFollowupFlow = async () => {
                setFollowupFlow({ round: 1, card: null, answers: {}, qa: [], loading: true, error: '' });
                try {
                    const card = await fetchFollowupRound([], context.situation);
                    if (!card) throw new Error('Could not generate follow-up questions.');
                    setFollowupFlow({ round: 1, card, answers: {}, qa: [], loading: false, error: '' });
                } catch (e) {
                    setFollowupFlow({ round: 1, card: null, answers: {}, qa: [], loading: false, error: e?.message || 'Failed' });
                }
            };

            const submitFollowupRound = async () => {
                setFollowupFlow(prev => {
                    if (!prev?.card) return prev;
                    const parts = (prev.card.questions || [])
                        .map((q, qi) => prev.answers[qi] ? `${qi + 1}. ${prev.answers[qi]}` : null)
                        .filter(Boolean);
                    const answerText = parts.join('\n');
                    const qa = [...prev.qa, { card: prev.card, answers: prev.answers, answerText }];
                    if (prev.round >= 3) {
                        // Finished тАФ stage the enriched situation and open the
                        // persona recommendation modal instead of diving into chat.
                        const lang = window.__lifeeLocale === 'zh' ? 'zh' : 'en';
                        const header = lang === 'zh' ? 'шбехЕЕф┐бцБпя╝Ъ' : 'Additional context:';
                        const blocks = qa.map((r) => (r.card.questions || []).map((q, qi) => {
                            const a = r.answers[qi];
                            return a ? `- ${q.q} тЖТ ${a}` : null;
                        }).filter(Boolean).join('\n')).filter(Boolean).join('\n');
                        const enriched = `${context.situation}\n\n${header}\n${blocks}`;
                        setStagedSituation(enriched);
                        setTimeout(() => setRecommendOpen(true), 0);
                        return null;
                    }
                    // Kick off next round fetch
                    (async () => {
                        try {
                            const next = await fetchFollowupRound(qa, context.situation);
                            if (!next) throw new Error('Could not generate follow-up questions.');
                            setFollowupFlow({ round: prev.round + 1, card: next, answers: {}, qa, loading: false, error: '' });
                        } catch (e) {
                            setFollowupFlow(cur => cur ? { ...cur, loading: false, error: e?.message || 'Failed' } : cur);
                        }
                    })();
                    return { round: prev.round + 1, card: null, answers: {}, qa, loading: true, error: '' };
                });
            };

            const trySubmit = () => {
                if (!context.situation?.trim()) return;
                // A or B цибх╝Пя╝ЪхЕИ 3 ш╜ош┐╜щЧощЧохЗ║ A/B цШпф╗Аф╣Ия╝МхЖНх╝АцОишНР modalуАВ
                if (mode === 'ab') {
                    startFollowupFlow();
                    return;
                }
                // чОДхнжшзТшЙ▓щЬАшжБхЬихп╣шпЭф╕ншЗкчД╢ш┐╜щЧохС╜чЫШ/хЗ║чФЯш╡ДцЦЩя╝Мф╕НхЬищжЦщб╡х╝╣чбмшбихНХуАВ
                if (selectedMysticRequirements.length > 0) {
                    (startFreshDebate || (() => setView('debate')))(null);
                    return;
                }
                // хЕ╢ф╗Ццибх╝П / ц▓бщАЙцибх╝Пя╝ЪчЫ┤цОех╝АцОишНР modal шой LLM х╕оцМСшзТшЙ▓уАВ
                setRecommendOpen(true);
            };

            // тФАтФА Home tools menuя╝Иш╛УхЕецбЖх╖жф╛зчЪД + цМЙщТоя╝МцОзхИ╢шБФч╜С/ш┐╜щЧо/цЬАхдЪхПСшиА/шпншиАя╝Й
            // debateSettings цПРхИ░ App щб╢х▒В + localStorage цМБф╣ЕхМЦя╝Мш╖Я chat хЖЕчЪДшо╛ч╜о
            // хРМцнетАФтАФhome цФ╣ф║Ж chat ф╣ЯцФ╣ф║Жя╝МхПНф╣Лф║жчД╢уАВ
            const [showToolsMenu, setShowToolsMenu] = useState(false);
            const toolsMenuRef = useRef(null);
            const _ds = debateSettings || {};
            const followUpMode = !!_ds.followUpMode;
            const webSearchMode = !!_ds.webSearchMode;
            const maxSpeakers = Number(_ds.maxSpeakers) || 0;

            useEffect(() => {
                const el = carouselRef.current;

            const getOffsets = () => sectionRefs.current.map(el => el?.offsetTop ?? 0);

                const offs = getOffsets();
                let best = 0, bestDist = Infinity;
                for (let i = 0; i < offs.length; i++) {
                    const dist = Math.abs(top - offs[i]);
                    if (dist < bestDist) { bestDist = dist; best = i; }

            // Manual RAF-based scroll (guaranteed duration + easing to match CSS height transition)
            const SCROLL_DURATION = 300;
            const easeOut = (t) => 1 - Math.pow(1 - t, 3);  // cubic ease-out, matches Tailwind ease-out
            const scrollAnimRef = useRef(null);
            const animateScrollTo = (top) => {
                const el = carouselRef.current;
                if (!el) return;
                if (scrollAnimRef.current != null) cancelAnimationFrame(scrollAnimRef.current);
                const startTop = el.scrollTop;
                const startTime = performance.now();
                const step = (now) => {
                    const t = Math.min(1, (now - startTime) / SCROLL_DURATION);
                    el.scrollTop = startTop + (top - startTop) * easeOut(t);
                    if (t < 1) scrollAnimRef.current = requestAnimationFrame(step);
                    else scrollAnimRef.current = null;
                };
                scrollAnimRef.current = requestAnimationFrame(step);
            };

            const goToDomain = (idx) => {
                const el = carouselRef.current;
                if (!el) return;
                const clamped = Math.max(0, Math.min(activeDomains.length - 1, idx));
                const target = sectionRefs.current[clamped]?.offsetTop ?? 0;
                scrollLockRef.current = true;
                setActiveDomainIdx(clamped);  // triggers height transition
                animateScrollTo(target);       // synchronized RAF scroll
                setTimeout(() => { scrollLockRef.current = false; }, SCROLL_DURATION + 50);
            };

            const goToDomainName = (domainName) => {
                const idx = activeDomains.indexOf(domainName);

                requestAnimationFrame(() => goToDomain(idx));

            useEffect(() => {
                const el = carouselRef.current;
                if (!el) return;
                const scrollHandler = () => {
                    if (scrollLockRef.current) return;
                    const idx = idxAtScroll(el.scrollTop);
                    setActiveDomainIdx(prev => prev === idx ? prev : idx);

                // Vertical mouse drag on carousel тЖТ switch domain
                let vDrag = false;
                let vStartY = 0;
                let vStartTop = 0;
                let vLastY = 0;
                let vLastT = 0;
                let vVel = 0;
                let vMoved = 0;
                let vRaf = null;
                const cancelVMomentum = () => { if (vRaf != null) { cancelAnimationFrame(vRaf); vRaf = null; } };
                const snapToNearest = () => {
                    const idx = idxAtScroll(el.scrollTop);
                    scrollLockRef.current = true;
                    setActiveDomainIdx(idx);
                    const target = sectionRefs.current[idx]?.offsetTop ?? 0;
                    animateScrollTo(target);
                    setTimeout(() => { scrollLockRef.current = false; }, SCROLL_DURATION + 50);

                const runVMomentum = () => {
                    const friction = 0.92;
                    const tick = () => {
                        if (Math.abs(vVel) < 0.03) { vRaf = null; snapToNearest(); return; }
                        el.scrollTop -= vVel * 16;
                        vVel *= friction;
                        vRaf = requestAnimationFrame(tick);
                    };
                    vRaf = requestAnimationFrame(tick);
                };

                    if (e.button !== 0) return;
                    cancelVMomentum();
                    vDrag = true;
                    vMoved = 0;
                    vStartY = e.clientY;
                    vLastY = e.clientY;
                    vLastT = performance.now();
                    vVel = 0;
                    vStartTop = el.scrollTop;
                };

                    if (!vDrag) return;
                    const dy = e.clientY - vStartY;
                    vMoved = Math.max(vMoved, Math.abs(dy));
                    el.scrollTop = vStartTop - dy;
                    const now = performance.now();
                    const dt = now - vLastT;
                    if (dt > 0) vVel = vVel * 0.6 + ((e.clientY - vLastY) / dt) * 0.4;
                    vLastY = e.clientY;
                    vLastT = now;
                };
                const vOnUp = () => {
                    if (!vDrag) return;
                    vDrag = false;
                    if (vMoved < 6) return;
                    if (performance.now() - vLastT > 80) vVel = 0;
                    if (Math.abs(vVel) > 0.15) runVMomentum();
                    else snapToNearest();
                };
                el.addEventListener('mousedown', vOnDown);
                window.addEventListener('mousemove', vOnMove);
                window.addEventListener('mouseup', vOnUp);

                // Mouse drag-to-scroll with momentum (feels like mobile swipe)
                const rows = el.querySelectorAll('[data-h-row]');
                const cleanups = [];
                rows.forEach(row => {
                    let dragging = false;
                    let startX = 0;
                    let startY = 0;
                    let startScroll = 0;
                    let moved = 0;
                    let lastX = 0;
                    let lastTime = 0;
                    let velocity = 0;   // px per ms (positive = pointer moving right)
                    let rafId = null;

                    const cancelMomentum = () => {
                        if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; }
                    };
                    const restoreSnap = () => { row.style.scrollSnapType = ''; };
                    const runMomentum = (done) => {
                        const friction = 0.94;          // per 16ms frame
                        const minV = 0.02;              // px/ms stop threshold
                        const tick = () => {
                            if (Math.abs(velocity) < minV) {
                                rafId = null;
                                if (done) done();
                                return;
                            }
                            row.scrollLeft -= velocity * 16;
                            velocity *= friction;
                            rafId = requestAnimationFrame(tick);
                        };
                        rafId = requestAnimationFrame(tick);
                    };

                    const onDown = (e) => {
                        if (e.button !== 0) return;
                        cancelMomentum();
                        // Disable scroll-snap during interaction so every scrollLeft
                        // delta renders freely. Restored after momentum completes.
                        row.style.scrollSnapType = 'none';
                        dragging = true;
                        moved = 0;
                        startX = e.clientX;
                        startY = e.clientY;
                        lastX = e.clientX;
                        lastTime = performance.now();
                        velocity = 0;
                        startScroll = row.scrollLeft;
                        row.style.cursor = 'grabbing';
                    };
                    const onMove = (e) => {
                        if (!dragging) return;
                        const dx = e.clientX - startX;
                        const dy = e.clientY - startY;
                        moved = Math.max(moved, Math.hypot(dx, dy));
                        row.scrollLeft = startScroll - dx;
                        // Smooth velocity sample (EMA)
                        const now = performance.now();
                        const dt = now - lastTime;
                        if (dt > 0) {
                            const instantV = (e.clientX - lastX) / dt;
                            velocity = velocity * 0.6 + instantV * 0.4;
                        }
                        lastX = e.clientX;
                        lastTime = now;
                    };
                    const onUp = () => {
                        if (!dragging) return;
                        dragging = false;
                        row.style.cursor = '';
                        // Decay velocity if last sample was stale (finger paused before release)
                        if (performance.now() - lastTime > 80) velocity = 0;
                        if (Math.abs(velocity) > 0.1) {
                            runMomentum(restoreSnap);
                        } else {
                            restoreSnap();
                        }
                    };
                    // Suppress click after drag so cards don't get selected
                    const onClickCapture = (e) => {
                        if (moved > 5) {
                            e.stopPropagation();
                            e.preventDefault();
                            moved = 0;
                        }
                    };
                    row.style.cursor = 'grab';
                    row.addEventListener('mousedown', onDown);
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onUp);
                    row.addEventListener('click', onClickCapture, true);
                    cleanups.push(() => {
                        cancelMomentum();
                        row.removeEventListener('mousedown', onDown);
                        window.removeEventListener('mousemove', onMove);
                        window.removeEventListener('mouseup', onUp);
                        row.removeEventListener('click', onClickCapture, true);
                        row.style.cursor = '';
                        row.style.userSelect = '';
                        row.style.scrollSnapType = '';

                return () => {
                    el.removeEventListener('scroll', scrollHandler);
                    el.removeEventListener('mousedown', vOnDown);
                    window.removeEventListener('mousemove', vOnMove);
                    window.removeEventListener('mouseup', vOnUp);
                    cancelVMomentum();
                    cleanups.forEach(fn => fn());
                };
            // Re-register when the active domain count changes so the wheel
            // handler's closure over activeDomains stays accurate (Hot loads
            // asynchronously, which grows the list from 4 тЖТ 5).
            }, [personas.length, activeDomains.length]);

            // Masthead date тАФ locale-aware
            const today = new Date();
            const dateLocale = window.__lifeeLocale === 'zh' ? 'zh-CN' : 'en-US';
            const dateStr = today.toLocaleDateString(dateLocale, { weekday: 'long', month: 'short', day: 'numeric' }).toUpperCase();
            const mysticOptions = [
                { id: 'seal', icon: 'gesture' },

                            <!-- цибх╝П pillя╝Их╖жя╝Й+ х╖▓щАЙшзТшЙ▓ pillя╝ИхП│я╝ЙхРИх╣╢хИ░хРМф╕АшбМя╝МшКВч║жф╕АшбМхЮВчЫ┤чй║щЧ┤уАВ
                                 шЛ▒цЦЗцаЗщвШ What's on your mind? цШпф╕дшбМщЬАшжБш┐Щф╕к bufferуАВ-->
                            <div class="flex flex-wrap items-center justify-between gap-x-4 gap-y-2 -mt-1 px-1 min-h-[34px]">
                                <!-- цибх╝П pillя╝ЪщЭах╖жя╝Ыhover хЗ║ tooltip цШ╛чд║ф╕АхПешзгщЗК -->

                                </div>

                            <div class="flex justify-center pt-8 mt-8 border-t border-[#F0EDEA]">
                                <button
                                    type="button"
                                    disabled=${isSel}
                                    onClick=${() => { if (!isSel) { onToggle(); onClose(); } }}
                                    class=${isSel
                                        ? 'no-shine w-full md:w-auto px-10 py-4 rounded-full font-black uppercase tracking-[0.2em] text-[10px] cursor-not-allowed bg-[#E8E6E0] text-[#A8A4B0]'
                                        : 'no-shine w-full md:w-auto px-10 py-4 rounded-full font-black uppercase tracking-[0.2em] text-[10px] transition-all shadow-xl text-white hover:brightness-105'}
                                    style=${isSel ? {} : { backgroundColor: '#98A6D4', boxShadow: '0 18px 40px rgba(152,166,212,0.22)' }}

            `;
        }

        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        //  PLACEHOLDER VIEWS (delegated to component files)
        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        function PlaceholderView({ title, icon, onBack }) {
            return html`
                <div class="flex flex-col items-center justify-center h-full min-h-[60vh] gap-6 animate-in">
                    <div class="w-16 h-16 rounded-2xl glass-card flex items-center justify-center">

        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        //  MY CHATS VIEW
        // тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
        function MyChatsView({ onBack, chatSessions, chatSessionsLoading, restoreSession }) {
            return html`
                <div class="max-w-2xl mx-auto px-4 py-8 animate-in">
                    <div class="flex items-center gap-3 mb-8">
                        <button onClick=${onBack} class="btn-ghost w-8 h-8 rounded-lg flex items-center justify-center">
                            <${Icon} name="ArrowLeft" size=${16} />
                        </button>
                        <h1 class="font-headline text-xl font-bold text-on-surface">My Chats</h1>
                    </div>
                    ${chatSessionsLoading ? html`
                        <div class="flex justify-center py-12">
                            <${Icon} name="Loader2" size=${24} className="text-primary/60 animate-spin" />

                    ` : chatSessions.length === 0 ? html`
                        <div class="text-center py-16 text-on-surface-variant/40">

                    ` : chatSessions.map(s => html`

                        >
