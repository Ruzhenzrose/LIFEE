        // Module-level locale + subscription event. App keeps the "source of
        // truth" via useState → setLocale; components read via t(key).
        window.__lifeeLocale = (() => {
            try {
                const saved = window.localStorage.getItem('lifee_locale');
                if (saved === 'zh' || saved === 'en') return saved;
            } catch (_) {}
            // Default: Chinese if browser lang starts with zh, else English.
            return (navigator.language || 'en').toLowerCase().startsWith('zh') ? 'zh' : 'en';
        })();
        const t = (key) => (I18N[key] && I18N[key][window.__lifeeLocale]) || I18N[key]?.en || key;
        const setLocale = (loc) => {
            if (loc !== 'en' && loc !== 'zh') return;
            window.__lifeeLocale = loc;
            try { window.localStorage.setItem('lifee_locale', loc); } catch (_) {}
            window.dispatchEvent(new CustomEvent('lifee:locale', { detail: loc }));
        };
        const useLocale = () => {
            const [loc, setLoc] = useState(window.__lifeeLocale);
            useEffect(() => {
                const h = (e) => setLoc(e.detail);
                window.addEventListener('lifee:locale', h);
                return () => window.removeEventListener('lifee:locale', h);
            }, []);
            return loc;
        };
        window.t = t;
        window.setLocale = setLocale;
        window.useLocale = useLocale;

        // ── Icon helper (Lucide via CDN) ──
        function Icon({ name, size = 18, className = '', style }) {
            // Span is React-owned; <i>→<svg> is managed manually and cleared in cleanup
            // so Lucide's node replacement never leaves stale children for React to trip on.
            const ref = useRef(null);
            useLayoutEffect(() => {
                const el = ref.current;
                if (!el) return undefined;
                while (el.firstChild) el.removeChild(el.firstChild);
                const inner = document.createElement('i');
                const kebab = name.replace(/([A-Z])/g, (m, c, i) => (i > 0 ? '-' : '') + c.toLowerCase());
                inner.setAttribute('data-lucide', kebab);
                el.appendChild(inner);
                try { window.lucide?.createIcons?.({ nodes: [inner] }); } catch (_) {}
                return () => {
                    try { while (el.firstChild) el.removeChild(el.firstChild); } catch (_) {}
                };
            }, [name]);
            return html`<span ref=${ref} class=${'inline-flex items-center justify-center shrink-0 ' + className} style=${{ width: size, height: size, lineHeight: 0, ...(style || {}) }} aria-hidden="true" />`;
        }

        // ── Material Symbol helper ──
        function MS({ name, size = 20, className = '' }) {
            return html`<span class=${'material-symbols-outlined ' + className} style=${{ fontSize: size }}>${name}</span>`;
        }

        // ── Relative time ──
        function relativeTime(ts) {
            if (!ts) return '';
            const diff = Date.now() - new Date(ts).getTime();
            const m = Math.floor(diff / 60000);
            if (m < 1) return 'just now';
            if (m < 60) return `${m}m ago`;
            const h = Math.floor(m / 60);
            if (h < 24) return `${h}h ago`;
            const d = Math.floor(h / 24);
            if (d < 7) return `${d}d ago`;
            return new Date(ts).toLocaleDateString();
        }

        // ── AvatarDisplay ──
        function AvatarDisplay({ avatar, className = '', size = 40 }) {
            if (!avatar) {
                return html`<div class=${'flex items-center justify-center bg-surface-container-high rounded-full ' + className} style=${{ width: size, height: size }}>
                    <${Icon} name="User" size=${Math.floor(size * 0.5)} className="text-on-surface-variant" />
                </div>`;
            }
            if (typeof avatar === 'string' && (avatar.startsWith('http') || avatar.startsWith('data:'))) {
                return html`<img src=${avatar} class=${'object-cover rounded-full ' + className} style=${{ width: size, height: size }} loading="lazy" alt="" />`;
            }
            return html`<div class=${'flex items-center justify-center rounded-full ' + className} style=${{ width: size, height: size, fontSize: Math.floor(size * 0.5) }}>${avatar}</div>`;
        }

        // ══════════════════════════════════════════════
        //  AUTH MODAL
        // ══════════════════════════════════════════════
        function AuthModal({ isOpen, onClose, onAuthed, onGuest }) {
            const [mode, setMode] = useState('login');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');
            const [otpSent, setOtpSent] = useState(false);
            const [otpCode, setOtpCode] = useState('');
            const [humanVerified, setHumanVerified] = useState(false);
            const turnstileRef = useRef(null);
            const widgetIdRef = useRef(null);

            useEffect(() => {
                if (!isOpen || humanVerified) return;
                const renderWidget = () => {
                    if (turnstileRef.current && window.turnstile && widgetIdRef.current === null) {
                        widgetIdRef.current = window.turnstile.render(turnstileRef.current, {
                            sitekey: TURNSTILE_SITEKEY,
                            callback: async (token) => {
                                const result = await verifyHumanTokenWithServer(token);
                                if (result.ok) {
                                    setHumanVerified(true);
                                    if (result.bypassed) setMessage('Local preview: verification skipped.');
                                } else {
                                    setMessage(result.message || 'Verification failed. Please retry.');
                                }
                            },
                            theme: 'dark',
                        });
                    }
                };
                if (window.turnstile) { renderWidget(); }
                else {
                    const timer = setInterval(() => {
                        if (window.turnstile) { clearInterval(timer); renderWidget(); }
                    }, 200);
                    return () => clearInterval(timer);
                }
                return () => {
                    if (widgetIdRef.current !== null && window.turnstile) {
                        window.turnstile.remove(widgetIdRef.current);
                        widgetIdRef.current = null;
                    }
                };
            }, [isOpen, humanVerified]);

            if (!isOpen) return null;

            const handleAuth = async () => {
                setLoading(true);
                setMessage('');
                try {
                    if (mode === 'login') {
                        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                        if (data?.user) onAuthed(data.user);
                    } else if (otpSent) {
                        const { data, error } = await supabaseClient.auth.verifyOtp({ email, token: otpCode, type: 'signup' });
                        if (error) throw error;
                        if (data?.user) onAuthed(data.user);
                    } else {
                        const { error } = await supabaseClient.auth.signUp({ email, password });
                        if (error) throw error;
                        setOtpSent(true);
                        setMessage('Verification code sent to your email.');
                    }
                } catch (err) {
                    setMessage(err?.message || 'Operation failed. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>
                    <div class="relative w-full max-w-sm mx-4 glass-card rounded-3xl p-8 animate-in iridescent-border">
                        <div class="flex items-center justify-between mb-7">
                            <div>
                                <h2 class="font-headline text-lg font-bold text-on-surface">
                                    ${mode === 'login' ? t('auth.welcomeBack') : t('auth.createAccount')}
                                </h2>
                                <p class="text-xs text-on-surface-variant mt-0.5">LIFEE</p>
                            </div>
                            <button onClick=${onClose} class="w-8 h-8 rounded-full btn-ghost flex items-center justify-center">
                                <${Icon} name="X" size=${14} />
                            </button>
                        </div>

                        ${!humanVerified ? html`
                            <div class="flex flex-col items-center gap-4 py-4">
                                <p class="text-sm text-on-surface-variant">${t('auth.verifyHuman')}</p>
                                <div ref=${turnstileRef}></div>
                                ${message && html`<p class="text-xs text-tertiary/80 text-center">${message}</p>`}
                            </div>
                        ` : otpSent ? html`
                            <div class="space-y-4">
                                <p class="text-sm text-on-surface-variant">${message || 'Enter the verification code sent to your email.'}</p>
                                <input
                                    type="text"
                                    placeholder=${t('auth.otpPh')}
                                    value=${otpCode}
                                    onInput=${e => setOtpCode(e.target.value)}
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                />
                                <button
                                    onClick=${handleAuth}
                                    disabled=${loading || !otpCode}
                                    class="w-full btn-gradient rounded-xl py-3 text-sm disabled:opacity-40"
                                >${loading ? t('auth.verifying') : t('auth.verifyBtn')}</button>
                            </div>
                        ` : html`
                            <div class="space-y-3">
                                <input
                                    type="email"
                                    placeholder=${t('auth.emailPh')}
                                    value=${email}
                                    onInput=${e => setEmail(e.target.value)}
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                />
                                <input
                                    type="password"
                                    placeholder=${t('auth.passwordPh')}
                                    value=${password}
                                    onInput=${e => setPassword(e.target.value)}
                                    onKeyDown=${e => { if (e.key === 'Enter') handleAuth(); }}
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                />
                                ${message && html`<p class="text-xs text-tertiary/80">${message}</p>`}
                                <button
                                    onClick=${handleAuth}
                                    disabled=${loading || !email || !password}
                                    class="w-full btn-gradient rounded-xl py-3 text-sm disabled:opacity-40"
                                >${loading ? t('auth.pleaseWait') : mode === 'login' ? t('auth.signInBtn') : t('auth.sendCode')}</button>
                                <div class="flex items-center gap-2 pt-1">
                                    <div class="flex-1 h-px bg-outline/20"></div>
                                    <span class="text-xs text-on-surface-variant">or</span>
                                    <div class="flex-1 h-px bg-outline/20"></div>
                                </div>
                                <button
                                    onClick=${() => { onGuest(); }}
                                    class="w-full btn-ghost rounded-xl py-3 text-sm"
                                >${t('auth.guest')}</button>
                                <p class="text-center text-xs text-on-surface-variant pt-1">
                                    ${mode === 'login'
                                        ? html`${t('auth.noAccount')} <button onClick=${() => { setMode('signup'); setMessage(''); }} class="text-primary hover:underline">${t('auth.signUp')}</button>`
                                        : html`${t('auth.haveAccount')} <button onClick=${() => { setMode('login'); setMessage(''); setOtpSent(false); }} class="text-primary hover:underline">${t('auth.signInBtn')}</button>`}
                                </p>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  SIDEBAR
        // ══════════════════════════════════════════════
        function Sidebar({
            view, setView, user, isGuest, onNewSession, chatSessions,
            setChatSessions, setSessionMessages, setSessionOptions,
            sessionId, setSessionId, setSelectedIds,
            personas, onLogin, onSignOut, userAvatar,
            sidebarOpen, setSidebarOpen,
            onOpenRedeem, onOpenFeedback,
            openConfirm,
        }) {
            const [userMenuOpen, setUserMenuOpen] = useState(false);
            const userCardRef = useRef(null);

            // Close user menu on outside click
            useEffect(() => {
                if (!userMenuOpen) return;
                const handler = (e) => {
                    if (userCardRef.current && !userCardRef.current.contains(e.target)) {
                        setUserMenuOpen(false);
                    }
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, [userMenuOpen]);

            const restoreSession = async (s) => {
                try {
                    const res = await fetch(`/sessions/${s.id}/messages`, { credentials: 'include' }).then(r => r.json());
                    if (res?.messages) {
                        setSessionMessages(res.messages.map(m => ({ personaId: m.persona_id || m.role, text: m.content, seq: m.seq })));
                        if (setSessionOptions) setSessionOptions(Array.isArray(res.options) ? res.options : []);
                        setSessionId(s.id);
                        if (s.personas?.length && setSelectedIds) {
                            const ids = s.personas.map(pid => {
                                const found = (personas || []).find(p =>
                                    p.id === pid || p.name === pid || p.id === pid.toLowerCase().replace(/\s+/g, '')
                                );
                                return found?.id;
                            }).filter(Boolean);
                            if (ids.length) setSelectedIds(ids);
                        }
                        setView('debate');
                    }
                } catch (e) { console.error('restore session failed', e); }
            };

            const starSession = (s, e) => {
                e.stopPropagation();
                const newVal = !s.starred;
                // Optimistic: flip UI immediately, reconcile on response.
                setChatSessions(prev => prev.map(x => x.id === s.id ? { ...x, starred: newVal } : x));
                fetch(`/sessions/${s.id}`, {
                    method: 'PATCH', credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ starred: newVal })
                }).then(r => {
                    if (!r.ok) throw new Error('patch failed');
                }).catch(() => {
                    // Revert on failure.
                    setChatSessions(prev => prev.map(x => x.id === s.id ? { ...x, starred: !newVal } : x));
                });
            };

            const deleteSession = (s, e) => {
                e.stopPropagation();
                const doDelete = async () => {
                    await fetch(`/sessions/${s.id}`, { method: 'DELETE', credentials: 'include' });
                    setChatSessions(prev => prev.filter(x => x.id !== s.id));
                    if (sessionId === s.id) {
                        setSessionId(null);
                        setSessionMessages([]);
                        setView('home');
                    }
                };
                if (openConfirm) {
                    openConfirm({
                        title: t('confirm.deleteChat.title'),
                        message: t('confirm.deleteChat.desc'),
                        confirmLabel: t('common.delete'),
                        cancelLabel: t('common.cancel'),
                        destructive: true,
                        onConfirm: doDelete,
                    });
                } else {
                    // Fallback — should not happen once openConfirm is wired.
                    if (!confirm(t('common.deleteChat'))) return;
                    doDelete();
                }
            };

            const displayName = user?.user_metadata?.name || user?.email?.split('@')[0] || (isGuest ? 'Guest' : 'User');
            const userInitial = (displayName || 'U')[0].toUpperCase();
            const userEmail = user?.email || (isGuest ? 'guest@lifee.app' : 'user@example.com');
            // Credits — stale-while-revalidate. Boot from in-memory / localStorage
            // so the card shows a number on first paint; revalidate in background.
            const balanceCacheKey = (uid) => `lifee_balance_cache_${uid || 'anon'}`;
            const [userCredits, setUserCredits] = useState(() => {
                if (typeof window.__lifeeBalance === 'number') return window.__lifeeBalance;
                try {
                    const uid = user?.id || window.__lifeePreload?.userId || '';
                    const cached = window.localStorage.getItem(balanceCacheKey(uid));
                    const n = cached == null ? NaN : parseInt(cached, 10);
                    if (Number.isFinite(n)) return n;
                } catch (_) {}
                return '—';
            });

            const applyBalance = useCallback((n) => {
                if (typeof n !== 'number' || !Number.isFinite(n)) return;
                setUserCredits(n);
                window.__lifeeBalance = n;
                try {
                    const uid = user?.id || window.__lifeePreload?.userId || '';
                    window.localStorage.setItem(balanceCacheKey(uid), String(n));
                } catch (_) {}
            }, [user?.id]);

            useEffect(() => {
                if (!user && !isGuest) {
                    setUserCredits('—');
                    return;
                }
                let cancelled = false;
                (async () => {
                    try {
                        // Prefer the pre-fired fetch from <head> on first load.
                        const pre = window.__lifeePreload?.credits;
                        let data = null;
                        if (pre) {
                            window.__lifeePreload.credits = null;
                            data = await pre;
                        }
                        if (!data) {
                            const url = user?.id
                                ? `/credits?userId=${encodeURIComponent(user.id)}`
                                : '/credits';
                            const res = await fetch(url, { credentials: 'include' });
                            if (!res.ok) return;   // keep cached value
                            data = await res.json();
                        }
                        if (!cancelled && typeof data?.balance === 'number') applyBalance(data.balance);
                    } catch (_) { /* keep cached value */ }
                })();
                const onBalance = (e) => {
                    if (typeof e?.detail === 'number') applyBalance(e.detail);
                };
                window.addEventListener('lifee:balance', onBalance);
                return () => {
                    cancelled = true;
                    window.removeEventListener('lifee:balance', onBalance);
                };
            }, [user?.id, isGuest, applyBalance]);

            // Collapsed rail (Claude-style): icons only — structure mirrors expanded sidebar so
            // every icon stays on the same horizontal line as its expanded counterpart
            if (!sidebarOpen) {
                return html`
                    <aside class="hidden md:flex flex-col h-full pt-10 pb-10 bg-surface-container-low/60 backdrop-blur-2xl border-r border-white/5 w-14 shrink-0 items-center">
                        <!-- Masthead mirror: Toggle replaces the LIFEE wordmark; subtitle-height spacer keeps nav aligned -->
                        <div class="w-full pb-4 mb-8 border-b border-on-surface/10 flex flex-col items-center">
                            <button
                                onClick=${() => setSidebarOpen(true)}
                                class="w-9 h-7 rounded flex items-center justify-center text-on-surface-variant/50 hover-warm-icon -mt-0.5"
                                title="Open sidebar"
                            ><${Icon} name="Sidebar" size=${16} style=${{ transform: 'scaleX(1.35)' }} /></button>
                            <!-- Spacer matches subtitle height (mt-2 + text-[10px] line-box ~23px) -->
                            <div class="mt-2 h-[15px]"></div>
                        </div>

                        <!-- Nav section mirror: starts at the same Y as expanded nav -->
                        <nav class="flex-1 w-full flex flex-col items-center gap-2 mt-2">
                            <!-- Home -->
                            <button
                                onClick=${() => setView('home')}
                                class="w-9 h-9 rounded-lg flex items-center justify-center text-on-surface-variant/60 hover-warm-icon"
                                title="Home"
                            ><${Icon} name="Home" size=${18} /></button>

                            <!-- Conversations (expands sidebar) -->
                            <button
                                onClick=${() => setSidebarOpen(true)}
                                class="w-9 h-9 rounded-lg flex items-center justify-center text-on-surface-variant/60 hover-warm-icon"
                                title="Conversations"
                            ><${Icon} name="MessageSquare" size=${16} /></button>
                        </nav>

                        <!-- Settings + avatar at bottom -->
                        <button
                            onClick=${() => setView('settings')}
                            class="w-9 h-9 rounded-lg flex items-center justify-center text-on-surface-variant/60 hover-warm-icon"
                            title="Settings"
                        ><${Icon} name="Settings" size=${16} /></button>

                        <div class="w-9 h-9 rounded-full bg-gradient-to-br from-primary to-tertiary flex items-center justify-center text-on-primary font-bold text-sm overflow-hidden mt-2" title=${displayName}>
                            ${userAvatar
                                ? html`<img src=${userAvatar} class="w-full h-full object-cover" />`
                                : userInitial
                            }
                        </div>
                    </aside>
                `;
            }

            return html`
                <aside
                    class="hidden md:flex flex-col h-full pt-10 px-6 pb-10 bg-surface-container-low/60 backdrop-blur-2xl border-r border-white/5 overflow-y-auto shrink-0 w-72"
                    id="void-sidebar"
                >
                    <!-- Masthead block -->
                    <div class="pb-4 border-b border-on-surface/10 mb-8">
                        <div class="flex items-start justify-between gap-3">
                            <h1 class="text-3xl font-headline font-bold tracking-tight text-white leading-none cursor-default">LIFEE</h1>
                            <button
                                onClick=${() => setSidebarOpen(false)}
                                class="w-9 h-7 rounded flex items-center justify-center text-on-surface-variant/50 hover-warm-icon shrink-0 -mt-0.5"
                                title="Collapse sidebar"
                            ><${Icon} name="Sidebar" size=${16} style=${{ transform: 'scaleX(1.35)' }} /></button>
                        </div>
                        <p class="text-[10px] font-label uppercase tracking-[0.3em] text-on-surface-variant/60 mt-2">${t('nav.subtitle')}</p>
                    </div>

                    <!-- Nav -->
                    <nav class="flex-1 space-y-6 mt-2">
                        <!-- Section: Navigate -->
                        <div class="space-y-0.5">
                            ${[
                                { label: t('nav.home'), view: 'home', icon: 'home' },
                                { label: t('nav.community'), view: 'community', icon: 'public' },
                            ].map(item => html`
                                <button
                                    key=${item.view}
                                    onClick=${() => setView(item.view)}
                                    class=${`w-full flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-left
                                        ${view === item.view ? 'bg-primary/10 text-primary' : 'text-on-surface-variant/80 hover-warm'}`}
                                >
                                    <span class="material-symbols-outlined" style=${{ fontSize: '18px' }}>${item.icon}</span>
                                    <span class="font-label font-medium text-sm tracking-wide">${item.label}</span>
                                </button>
                            `)}
                        </div>

                        <!-- Section: Conversations (split into Starred + Recents) -->
                        ${(() => {
                            const all = [...(chatSessions || [])];
                            const byRecent = (a, b) => {
                                const aT = a.updated_at ? new Date(a.updated_at).getTime() : 0;
                                const bT = b.updated_at ? new Date(b.updated_at).getTime() : 0;
                                return bT - aT;
                            };
                            const starred = all.filter(s => s.starred).sort(byRecent);
                            const recents = all.filter(s => !s.starred).sort(byRecent).slice(0, 30);

                            const renderRow = (s) => {
                                const isActive = s.id === sessionId;
                                return html`
                                    <div
                                        key=${s.id}
                                        class=${`session-row group flex items-start gap-2 px-2 py-1.5 rounded-md cursor-pointer transition-colors`}
                                        onClick=${() => restoreSession(s)}
                                    >
                                        <span class=${'w-1 h-1 rounded-full mt-2 shrink-0 ' + (isActive ? 'bg-primary' : 'bg-transparent')}></span>
                                        <div class="flex-1 min-w-0">
                                            <p class=${'session-title text-xs truncate leading-tight ' + (isActive ? 'text-primary font-semibold' : 'text-on-surface/85')}>${s.title || 'Untitled'}</p>
                                            <p class="text-[10px] text-on-surface-variant/40 truncate mt-0.5">
                                                ${s.personas?.join(' · ') || ''}${s.personas?.length && s.updated_at ? '  ·  ' : ''}${relativeTime(s.updated_at)}
                                            </p>
                                        </div>
                                        <div class="session-actions flex items-center gap-0.5 flex-shrink-0">
                                            <button
                                                title="Star"
                                                onClick=${e => starSession(s, e)}
                                                class=${`w-6 h-6 rounded flex items-center justify-center transition-opacity transition-colors
                                                    ${s.starred
                                                        ? 'text-yellow-400/80 opacity-100'
                                                        : 'text-on-surface-variant/40 hover:text-yellow-400 opacity-0 group-hover:opacity-100'}`}
                                            ><span class="material-symbols-outlined" style=${{ fontSize: '14px' }}>${s.starred ? 'star' : 'star_border'}</span></button>
                                            <button
                                                title="Delete"
                                                onClick=${e => deleteSession(s, e)}
                                                class="w-6 h-6 rounded flex items-center justify-center text-on-surface-variant/40 hover:text-tertiary transition-opacity transition-colors opacity-0 group-hover:opacity-100"
                                            ><span class="material-symbols-outlined" style=${{ fontSize: '14px' }}>delete_outline</span></button>
                                        </div>
                                    </div>
                                `;
                            };

                            const groupLabel = (icon, label) => html`
                                <div class="flex items-center gap-2 px-3 pt-1 pb-1.5 text-on-surface-variant/40">
                                    <span class="material-symbols-outlined" style=${{ fontSize: '13px' }}>${icon}</span>
                                    <span class="text-[10px] font-label uppercase tracking-[0.25em]">${label}</span>
                                </div>
                            `;

                            if (all.length === 0) {
                                return html`
                                    <div>
                                        ${groupLabel('chat_bubble_outline', t('nav.conversations'))}
                                        <div class="px-3 py-2 text-xs text-on-surface-variant/40 italic">${t('nav.noConversations')}</div>
                                    </div>
                                `;
                            }

                            return html`
                                <div class="space-y-2">
                                    ${starred.length > 0 && html`
                                        <div>
                                            ${groupLabel('star', t('nav.starred'))}
                                            <div class="space-y-0.5">
                                                ${starred.map(renderRow)}
                                            </div>
                                        </div>
                                    `}
                                    ${recents.length > 0 && html`
                                        <div>
                                            ${groupLabel('schedule', t('nav.recents'))}
                                            <div class="space-y-0.5">
                                                ${recents.map(renderRow)}
                                            </div>
                                        </div>
                                    `}
                                </div>
                            `;
                        })()}
                    </nav>

                    <!-- Bottom user card -->
                    <div ref=${userCardRef} class=${`mt-auto rounded-lg overflow-hidden transition-colors ${userMenuOpen ? 'bg-surface-container' : 'hover:bg-surface-container/50'}`}>
                        <!-- Collapsible drawer -->
                        <div
                            id="void-user-menu"
                            class="overflow-hidden transition-all duration-300 ease-out"
                            style=${{ maxHeight: userMenuOpen ? '300px' : '0' }}
                        >
                            <div class="px-4 pt-3 pb-2 border-b border-white/5">
                                <p class="text-xs text-on-surface-variant/50 truncate">${userEmail}</p>
                            </div>
                            <div class="px-2 py-1 space-y-0.5">
                                <button
                                    onClick=${() => { setView('settings'); setUserMenuOpen(false); }}
                                    class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover-warm cursor-pointer text-on-surface-variant transition-colors"
                                >
                                    <span class="material-symbols-outlined" style=${{ fontSize: '16px' }}>settings</span>
                                    <span class="text-sm">${t('nav.settings')}</span>
                                </button>
                                <button
                                    onClick=${() => setLocale(window.__lifeeLocale === 'zh' ? 'en' : 'zh')}
                                    class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover-warm cursor-pointer text-on-surface-variant transition-colors"
                                >
                                    <span class="material-symbols-outlined" style=${{ fontSize: '16px' }}>translate</span>
                                    <span class="text-sm">${t('nav.language')}</span>
                                    <span class="ml-auto text-[10px] text-on-surface-variant/50">${window.__lifeeLocale === 'zh' ? '中文' : 'EN'}</span>
                                </button>
                                <button
                                    onClick=${() => { onOpenRedeem?.(); setUserMenuOpen(false); }}
                                    disabled=${!user}
                                    class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover-warm cursor-pointer text-on-surface-variant transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
                                >
                                    <span class="material-symbols-outlined" style=${{ fontSize: '16px' }}>redeem</span>
                                    <span class="text-sm">${t('nav.redeemCode')}</span>
                                </button>
                                <button
                                    onClick=${() => { setView('help'); setUserMenuOpen(false); }}
                                    class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover-warm cursor-pointer text-on-surface-variant transition-colors"
                                >
                                    <span class="material-symbols-outlined" style=${{ fontSize: '16px' }}>help_outline</span>
                                    <span class="text-sm">${t('nav.help')}</span>
                                </button>
                                <button
                                    onClick=${() => { onOpenFeedback?.(); setUserMenuOpen(false); }}
                                    class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover-warm cursor-pointer text-on-surface-variant transition-colors"
                                >
                                    <span class="material-symbols-outlined" style=${{ fontSize: '16px' }}>feedback</span>
                                    <span class="text-sm">${t('nav.feedback')}</span>
                                </button>
                                ${user ? html`
                                    <button
                                        onClick=${() => { onSignOut(); setUserMenuOpen(false); }}
                                        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/5 cursor-pointer text-red-400/70 hover:text-red-400 transition-colors"
                                    >
                                        <span class="material-symbols-outlined" style=${{ fontSize: '16px' }}>logout</span>
                                        <span class="text-sm">${t('nav.signOut')}</span>
                                    </button>
                                ` : html`
                                    <button
                                        onClick=${() => { onLogin(); setUserMenuOpen(false); }}
                                        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/5 cursor-pointer text-primary/70 hover:text-primary transition-colors"
                                    >
                                        <span class="material-symbols-outlined" style=${{ fontSize: '16px' }}>login</span>
                                        <span class="text-sm">${t('nav.signIn')}</span>
                                    </button>
                                `}
                            </div>
                        </div>

                        <!-- User bar (always visible) -->
                        <div
                            class="flex items-center gap-4 cursor-pointer hover:bg-white/5 p-3 transition-colors"
                            onClick=${() => setUserMenuOpen(o => !o)}
                        >
                            <div class="relative flex-shrink-0">
                                <div class="w-11 h-11 rounded-full bg-gradient-to-br from-primary to-tertiary flex items-center justify-center text-on-primary font-bold text-lg overflow-hidden">
                                    ${userAvatar
                                        ? html`<img src=${userAvatar} class="w-full h-full object-cover" />`
                                        : userInitial
                                    }
                                </div>
                                <div class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-400 rounded-full border-2 border-surface-container"></div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-bold text-white truncate">${displayName}</p>
                                <p class="text-[10px] uppercase tracking-wider text-on-surface-variant/70">
                                    ${isGuest ? t('nav.guest') : (user ? t('nav.credits') + ': ' + userCredits : t('nav.notSignedIn'))}
                                </p>
                            </div>
                            <span
                                class="material-symbols-outlined text-on-surface-variant/50 transition-transform duration-300"
                                style=${{ fontSize: '16px', transform: userMenuOpen ? 'rotate(180deg)' : 'rotate(0deg)' }}
                            >expand_more</span>
                        </div>
                    </div>
                </aside>
            `;
        }

        // ══════════════════════════════════════════════
        //  REDEEM MODAL — redeem a credit code
        // ══════════════════════════════════════════════
        function RedeemModal({ isOpen, onClose, user }) {
            const [code, setCode]       = useState('');
            const [loading, setLoading] = useState(false);
            const [status, setStatus]   = useState('');
            const [statusKind, setStatusKind] = useState(''); // 'ok' | 'err'

            useEffect(() => {
                if (!isOpen) { setCode(''); setStatus(''); setStatusKind(''); }
            }, [isOpen]);

            if (!isOpen) return null;

            const submit = async () => {
                const trimmed = (code || '').trim();
                if (!trimmed || !user) return;
                setLoading(true);
                setStatus(''); setStatusKind('');
                try {
                    const r = await fetch('/credits/redeem', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ userId: user.id, code: trimmed }),
                    });
                    const data = await r.json();
                    if (data?.ok) {
                        setStatus(data.message || 'Redeemed successfully');
                        setStatusKind('ok');
                        // Broadcast the new balance so sidebar credit badge updates immediately.
                        if (typeof data.balance === 'number') {
                            window.__lifeeBalance = data.balance;
                            window.dispatchEvent(new CustomEvent('lifee:balance', { detail: data.balance }));
                        }
                        setCode('');
                    } else {
                        setStatus(data?.message || 'Invalid code');
                        setStatusKind('err');
                    }
                } catch (e) {
                    setStatus(e?.message || 'Network error');
                    setStatusKind('err');
                } finally {
                    setLoading(false);
                }
            };

            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>
                    <div class="relative w-full max-w-md mx-4 glass-card rounded-3xl p-10 animate-in iridescent-border">
                        <div class="flex items-center justify-between mb-7">
                            <div class="flex items-center gap-2.5">
                                <span class="material-symbols-outlined text-primary" style=${{ fontSize: '22px' }}>redeem</span>
                                <h2 class="font-headline text-xl font-bold text-on-surface">${t('redeem.title')}</h2>
                            </div>
                            <button onClick=${onClose} class="w-8 h-8 rounded-full btn-ghost flex items-center justify-center">
                                <span class="material-symbols-outlined" style=${{ fontSize: '14px' }}>close</span>
                            </button>
                        </div>

                        <p class="text-sm text-on-surface-variant/70 mb-6 leading-relaxed">
                            ${t('redeem.desc')}
                        </p>

                        <input
                            type="text"
                            placeholder=${t('redeem.placeholder')}
                            value=${code}
                            onInput=${(e) => setCode(e.target.value.toUpperCase())}
                            onKeyDown=${(e) => { if (e.key === 'Enter') submit(); }}
                            class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-4 text-base uppercase tracking-[0.25em] text-center font-mono focus:outline-none focus:border-primary/50 void-textarea mb-4"
                            autoFocus
                        />

                        ${status ? html`
                            <p class=${'text-xs mb-3 ' + (statusKind === 'ok' ? 'text-primary/80' : 'text-tertiary/80')}>
                                ${status}
                            </p>
                        ` : null}

                        <button
                            onClick=${submit}
                            disabled=${loading || !code.trim() || !user}
                            class="w-full btn-gradient rounded-xl py-4 text-base font-semibold disabled:opacity-40"
                        >${loading ? t('redeem.redeeming') : t('redeem.action')}</button>
                    </div>
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  FEEDBACK MODAL — user sends a note to the team
        // ══════════════════════════════════════════════
        function FeedbackModal({ isOpen, onClose, user }) {
            const [content, setContent] = useState('');
            const [loading, setLoading] = useState(false);
            const [status, setStatus]   = useState('');
            const [statusKind, setStatusKind] = useState(''); // 'ok' | 'err'

            useEffect(() => {
                if (!isOpen) { setStatus(''); setStatusKind(''); }
            }, [isOpen]);

            if (!isOpen) return null;

            const submit = async () => {
                const trimmed = (content || '').trim();
                if (!trimmed) return;
                setLoading(true);
                setStatus(''); setStatusKind('');
                try {
                    const r = await fetch('/feedback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({
                            content: trimmed,
                            userId: user?.id || '',
                            email: user?.email || '',
                            url: window.location.href,
                        }),
                    });
                    const data = await r.json();
                    if (data?.ok) {
                        setStatus(t('feedback.sent'));
                        setStatusKind('ok');
                        setContent('');
                        // Auto-close after a beat so user sees the confirmation.
                        setTimeout(() => onClose?.(), 1200);
                    } else {
                        setStatus(data?.message || t('feedback.failed'));
                        setStatusKind('err');
                    }
                } catch (e) {
                    setStatus(e?.message || t('feedback.failed'));
                    setStatusKind('err');
                } finally {
                    setLoading(false);
                }
            };

            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>
                    <div class="relative w-full max-w-md mx-4 glass-card rounded-3xl p-10 animate-in iridescent-border">
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center gap-2.5">
                                <span class="material-symbols-outlined text-primary" style=${{ fontSize: '22px' }}>feedback</span>
                                <h2 class="font-headline text-xl font-bold text-on-surface">${t('feedback.title')}</h2>
                            </div>
                            <button onClick=${onClose} class="w-8 h-8 rounded-full btn-ghost flex items-center justify-center">
                                <span class="material-symbols-outlined" style=${{ fontSize: '14px' }}>close</span>
                            </button>
                        </div>

                        <p class="text-sm text-on-surface-variant/70 mb-5 leading-relaxed">${t('feedback.desc')}</p>

                        <textarea
                            value=${content}
                            onInput=${(e) => setContent(e.target.value)}
                            placeholder=${t('feedback.placeholder')}
                            rows=${6}
                            class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm leading-relaxed focus:outline-none focus:border-primary/50 void-textarea resize-none mb-4"
                            autoFocus
                        ></textarea>

                        ${status ? html`
                            <p class=${'text-xs mb-3 ' + (statusKind === 'ok' ? 'text-primary/80' : 'text-tertiary/80')}>
                                ${status}
                            </p>
                        ` : null}

                        <button
                            onClick=${submit}
                            disabled=${loading || !content.trim()}
                            class="w-full btn-gradient rounded-xl py-4 text-base font-semibold disabled:opacity-40"
                        >${loading ? t('feedback.sending') : t('feedback.submit')}</button>
                    </div>
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  CONFIRM MODAL — themed replacement for window.confirm()
        // ══════════════════════════════════════════════
        function ConfirmModal({ state, onClose }) {
            const { isOpen, title, message, confirmLabel, cancelLabel, destructive, onConfirm } = state || {};

            useEffect(() => {
                if (!isOpen) return;
                const onKey = (e) => {
                    if (e.key === 'Escape') onClose?.();
                    else if (e.key === 'Enter') { onConfirm?.(); onClose?.(); }
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [isOpen, onConfirm, onClose]);

            if (!isOpen) return null;

            const confirmClass = destructive
                ? 'w-full sm:w-auto px-5 py-2.5 rounded-xl bg-tertiary/90 hover:bg-tertiary text-on-tertiary text-sm font-semibold transition-colors'
                : 'w-full sm:w-auto px-5 py-2.5 rounded-xl btn-gradient text-sm font-semibold';
            const iconName = destructive ? 'warning' : 'help';
            const iconColor = destructive ? 'text-tertiary' : 'text-primary';

            return html`
                <div class="fixed inset-0 z-[60] flex items-center justify-center">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>
                    <div class="relative w-full max-w-sm mx-4 glass-card rounded-3xl p-8 animate-in iridescent-border">
                        <div class="flex items-start gap-3 mb-5">
                            <span class=${'material-symbols-outlined ' + iconColor} style=${{ fontSize: '22px' }}>${iconName}</span>
                            <h2 class="font-headline text-lg font-bold text-on-surface leading-tight pt-0.5">${title || t('common.deleteChat')}</h2>
                        </div>
                        ${message ? html`
                            <p class="text-sm text-on-surface-variant/75 leading-relaxed mb-7">${message}</p>
                        ` : null}
                        <div class="flex flex-col-reverse sm:flex-row sm:justify-end gap-2">
                            <button
                                onClick=${onClose}
                                class="w-full sm:w-auto px-5 py-2.5 rounded-xl btn-ghost text-sm font-medium"
                            ><span>${cancelLabel || t('common.cancel')}</span></button>
                            <button
                                onClick=${() => { onConfirm?.(); onClose?.(); }}
                                class=${confirmClass}
                                autoFocus
                            ><span>${confirmLabel || t('common.delete')}</span></button>
                        </div>
                    </div>
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  HOME VIEW
        // ══════════════════════════════════════════════
        function HomeView({ context, setContext, setView, personas, selectedIds, setSelectedIds, startFreshDebate, chatSessions }) {
            // Domain classification by persona id
            const DOMAIN_MAP = {
                'krishnamurti': 'Philosophy', 'lacan': 'Philosophy', 'Simone de Beauvoir': 'Philosophy',
                'buffett': 'Business', 'munger': 'Business', 'drucker': 'Business', 'welch': 'Business',
                'shannon': 'Science', 'turing': 'Science', 'vonneumann': 'Science',
                'audrey-hepburn': 'Arts',
            };
            const getDomain = (p) => DOMAIN_MAP[p.id] || p.category || 'Other';

            // Hot domain — site-wide top personas over the last 7 days.
            // Fetched from /personas/hot which aggregates chat_sessions across
            // all users (sliding window). Fall back to an empty list on error
            // so the Hot tab simply disappears.
            // Stale-while-revalidate: hydrate from localStorage cache and the
            // pre-fired fetch (window.__lifeePreload.hot kicked off in <head>
            // before React loaded). Repeat visits show the big featured card
            // instantly from cache; first visits still benefit from the preload
            // running in parallel with React / Supabase scripts.
            const [hotRanking, setHotRanking] = useState(() => {
                try {
                    const raw = window.localStorage.getItem('lifee_hot_ranking_cache');
                    return raw ? (JSON.parse(raw) || []) : [];
                } catch (_) { return []; }
            });
            const [hotLoaded, setHotLoaded]   = useState(() => {
                try {
                    const raw = window.localStorage.getItem('lifee_hot_ranking_cache');
                    return !!(raw && JSON.parse(raw)?.length);
                } catch (_) { return false; }
            });
            useEffect(() => {
                let cancelled = false;
                (async () => {
                    try {
                        const preloaded = window.__lifeePreload?.hot;
                        const data = preloaded
                            ? await preloaded
                            : await fetch('/personas/hot?days=7&limit=3', { credentials: 'include' }).then(r => r.ok ? r.json() : { hot: [] });
                        if (!cancelled && Array.isArray(data?.hot)) {
                            setHotRanking(data.hot);
                            try { window.localStorage.setItem('lifee_hot_ranking_cache', JSON.stringify(data.hot)); } catch (_) {}
                        }
                    } catch (_) {}
                    finally { if (!cancelled) setHotLoaded(true); }
                })();
                return () => { cancelled = true; };
            }, []);
            const hotPersonas = hotRanking
                .map(({ id }) => personas.find(p =>
                    p.id === id ||
                    p.name === id ||
                    p.id === String(id).toLowerCase().replace(/\s+/g, '')
                ))
                .filter(Boolean);

            const DOMAIN_ORDER_BASE = ['Philosophy', 'Business', 'Science', 'Arts'];
            const DOMAIN_ORDER = hotPersonas.length > 0
                ? ['Hot', ...DOMAIN_ORDER_BASE]
                : DOMAIN_ORDER_BASE;

            // Group personas by domain (Hot is a special computed domain)
            const grouped = {};
            DOMAIN_ORDER.forEach(d => grouped[d] = []);
            if (hotPersonas.length > 0) grouped['Hot'] = hotPersonas;
            personas.forEach(p => {
                const d = getDomain(p);
                if (grouped[d] && d !== 'Hot') grouped[d].push(p);
            });

            const toggleSelect = (id) => {
                setSelectedIds(prev =>
                    prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
                );
            };

            const selectedPersonas = personas.filter(p => selectedIds.includes(p.id));

            // Preview: hovered/tapped persona in the right panel
            const [previewId, setPreviewId] = useState(null);
            // Detail modal state (full persona profile)
            const [detailPersonaId, setDetailPersonaId] = useState(null);
            const detailPersona = detailPersonaId ? personas.find(p => p.id === detailPersonaId) : null;

            // Transient toast for gentle guidance (e.g. "pick a voice first")
            const [toastMsg, setToastMsg] = useState('');
            useEffect(() => {
                if (!toastMsg) return;
                const t = setTimeout(() => setToastMsg(''), 2800);
                return () => clearTimeout(t);
            }, [toastMsg]);

            const trySubmit = () => {
                if (!context.situation?.trim()) return;
                if (selectedIds.length === 0) {
                    setToastMsg(t('home.pickVoice'));
                    return;
                }
                // Home → always a new session (the sidebar keeps past ones)
                (startFreshDebate || (() => setView('debate')))();
            };

            // Preload persona cover images in parallel so first click is instant
            useEffect(() => {
                personas.forEach(p => {
                    if (!p.cover_url) return;
                    const img = new Image();
                    img.src = p.cover_url;
                });
            }, [personas.length]);

            // Domain carousel — per-domain section height (1 row vs 2 rows)
            const activeDomains = DOMAIN_ORDER.filter(d => grouped[d].length > 0);
            const CARDS_PER_ROW = 3;
            const HEADER_H = 70;   // domain header row + gap + buffer
            const ROW_H = 120;     // one row of persona cards + buffer
            const sectionHFor = (n) => HEADER_H + Math.min(2, Math.ceil(n / CARDS_PER_ROW)) * ROW_H;
            const sectionHeights = activeDomains.map(d => sectionHFor(grouped[d].length));

            const carouselRef = useRef(null);
            const sectionRefs = useRef([]);
            const scrollLockRef = useRef(false);
            const [activeDomainIdx, setActiveDomainIdx] = useState(0);
            const currentSectionH = sectionHeights[activeDomainIdx] ?? 300;

            // Read actual offsetTop of each section (avoids rounding drift from computed heights)
            const getOffsets = () => sectionRefs.current.map(el => el?.offsetTop ?? 0);
            const idxAtScroll = (top) => {
                const offs = getOffsets();
                let best = 0, bestDist = Infinity;
                for (let i = 0; i < offs.length; i++) {
                    const dist = Math.abs(top - offs[i]);
                    if (dist < bestDist) { bestDist = dist; best = i; }
                }
                return best;
            };

            // Manual RAF-based scroll (guaranteed duration + easing to match CSS height transition)
            const SCROLL_DURATION = 300;
            const easeOut = (t) => 1 - Math.pow(1 - t, 3);  // cubic ease-out, matches Tailwind ease-out
            const scrollAnimRef = useRef(null);
            const animateScrollTo = (top) => {
                const el = carouselRef.current;
                if (!el) return;
                if (scrollAnimRef.current != null) cancelAnimationFrame(scrollAnimRef.current);
                const startTop = el.scrollTop;
                const startTime = performance.now();
                const step = (now) => {
                    const t = Math.min(1, (now - startTime) / SCROLL_DURATION);
                    el.scrollTop = startTop + (top - startTop) * easeOut(t);
                    if (t < 1) scrollAnimRef.current = requestAnimationFrame(step);
                    else scrollAnimRef.current = null;
                };
                scrollAnimRef.current = requestAnimationFrame(step);
            };

            const goToDomain = (idx) => {
                const el = carouselRef.current;
                if (!el) return;
                const clamped = Math.max(0, Math.min(activeDomains.length - 1, idx));
                const target = sectionRefs.current[clamped]?.offsetTop ?? 0;
                scrollLockRef.current = true;
                setActiveDomainIdx(clamped);  // triggers height transition
                animateScrollTo(target);       // synchronized RAF scroll
                setTimeout(() => { scrollLockRef.current = false; }, SCROLL_DURATION + 50);
            };

            useEffect(() => {
                const el = carouselRef.current;
                if (!el) return;
                let wheelLock = false;
                const wheelHandler = (e) => {
                    if (e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY)) return;
                    e.preventDefault();
                    if (wheelLock) return;
                    const n = activeDomains.length;
                    if (n <= 1) return;
                    const dir = e.deltaY > 0 ? 1 : -1;
                    const currentIdx = idxAtScroll(el.scrollTop);
                    // Wrap around: past the last domain loops back to the first,
                    // before the first loops to the last. Makes the carousel feel
                    // like a continuous loop rather than dead-ending at boundaries.
                    const nextIdx = (currentIdx + dir + n) % n;
                    if (nextIdx === currentIdx) return;
                    wheelLock = true;
                    scrollLockRef.current = true;
                    setActiveDomainIdx(nextIdx);
                    const nextTop = sectionRefs.current[nextIdx]?.offsetTop ?? 0;
                    animateScrollTo(nextTop);
                    setTimeout(() => { wheelLock = false; scrollLockRef.current = false; }, SCROLL_DURATION + 50);
                };
                const scrollHandler = () => {
                    if (scrollLockRef.current) return;
                    const idx = idxAtScroll(el.scrollTop);
                    setActiveDomainIdx(prev => prev === idx ? prev : idx);
                };
                el.addEventListener('wheel', wheelHandler, { passive: false });
                el.addEventListener('scroll', scrollHandler);

                // Vertical mouse drag on carousel → switch domain
                let vDrag = false;
                let vStartY = 0;
                let vStartTop = 0;
                let vLastY = 0;
                let vLastT = 0;
                let vVel = 0;
                let vMoved = 0;
                let vRaf = null;
                const cancelVMomentum = () => { if (vRaf != null) { cancelAnimationFrame(vRaf); vRaf = null; } };
                const snapToNearest = () => {
                    const idx = idxAtScroll(el.scrollTop);
                    scrollLockRef.current = true;
                    setActiveDomainIdx(idx);
                    const target = sectionRefs.current[idx]?.offsetTop ?? 0;
                    animateScrollTo(target);
                    setTimeout(() => { scrollLockRef.current = false; }, SCROLL_DURATION + 50);
                };
                const runVMomentum = () => {
                    const friction = 0.92;
                    const tick = () => {
                        if (Math.abs(vVel) < 0.03) { vRaf = null; snapToNearest(); return; }
                        el.scrollTop -= vVel * 16;
                        vVel *= friction;
                        vRaf = requestAnimationFrame(tick);
                    };
                    vRaf = requestAnimationFrame(tick);
                };
                const vOnDown = (e) => {
                    if (e.button !== 0) return;
                    cancelVMomentum();
                    vDrag = true;
                    vMoved = 0;
                    vStartY = e.clientY;
                    vLastY = e.clientY;
                    vLastT = performance.now();
                    vVel = 0;
                    vStartTop = el.scrollTop;
                };
                const vOnMove = (e) => {
                    if (!vDrag) return;
                    const dy = e.clientY - vStartY;
                    vMoved = Math.max(vMoved, Math.abs(dy));
                    el.scrollTop = vStartTop - dy;
                    const now = performance.now();
                    const dt = now - vLastT;
                    if (dt > 0) vVel = vVel * 0.6 + ((e.clientY - vLastY) / dt) * 0.4;
                    vLastY = e.clientY;
                    vLastT = now;
                };
                const vOnUp = () => {
                    if (!vDrag) return;
                    vDrag = false;
                    if (performance.now() - vLastT > 80) vVel = 0;
                    if (Math.abs(vVel) > 0.15) runVMomentum();
                    else snapToNearest();
                };
                el.addEventListener('mousedown', vOnDown);
                window.addEventListener('mousemove', vOnMove);
                window.addEventListener('mouseup', vOnUp);

                // Mouse drag-to-scroll with momentum (feels like mobile swipe)
                const rows = el.querySelectorAll('[data-h-row]');
                const cleanups = [];
                rows.forEach(row => {
                    let dragging = false;
                    let startX = 0;
                    let startY = 0;
                    let startScroll = 0;
                    let moved = 0;
                    let lastX = 0;
                    let lastTime = 0;
                    let velocity = 0;   // px per ms (positive = pointer moving right)
                    let rafId = null;

                    const cancelMomentum = () => {
                        if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; }
                    };
                    const restoreSnap = () => { row.style.scrollSnapType = ''; };
                    const runMomentum = (done) => {
                        const friction = 0.94;          // per 16ms frame
                        const minV = 0.02;              // px/ms stop threshold
                        const tick = () => {
                            if (Math.abs(velocity) < minV) {
                                rafId = null;
                                if (done) done();
                                return;
                            }
                            row.scrollLeft -= velocity * 16;
                            velocity *= friction;
                            rafId = requestAnimationFrame(tick);
                        };
                        rafId = requestAnimationFrame(tick);
                    };

                    const onDown = (e) => {
                        if (e.button !== 0) return;
                        cancelMomentum();
                        // Disable scroll-snap during interaction so every scrollLeft
                        // delta renders freely. Restored after momentum completes.
                        row.style.scrollSnapType = 'none';
                        dragging = true;
                        moved = 0;
                        startX = e.clientX;
                        startY = e.clientY;
                        lastX = e.clientX;
                        lastTime = performance.now();
                        velocity = 0;
                        startScroll = row.scrollLeft;
                        row.style.cursor = 'grabbing';
                        row.style.userSelect = 'none';
                    };
                    const onMove = (e) => {
                        if (!dragging) return;
                        const dx = e.clientX - startX;
                        const dy = e.clientY - startY;
                        moved = Math.max(moved, Math.hypot(dx, dy));
                        row.scrollLeft = startScroll - dx;
                        // Smooth velocity sample (EMA)
                        const now = performance.now();
                        const dt = now - lastTime;
                        if (dt > 0) {
                            const instantV = (e.clientX - lastX) / dt;
                            velocity = velocity * 0.6 + instantV * 0.4;
                        }
                        lastX = e.clientX;
                        lastTime = now;
                    };
                    const onUp = () => {
                        if (!dragging) return;
                        dragging = false;
                        row.style.cursor = '';
                        row.style.userSelect = '';
                        // Decay velocity if last sample was stale (finger paused before release)
                        if (performance.now() - lastTime > 80) velocity = 0;
                        if (Math.abs(velocity) > 0.1) {
                            runMomentum(restoreSnap);
                        } else {
                            restoreSnap();
                        }
                    };
                    // Suppress click after drag so cards don't get selected
                    const onClickCapture = (e) => {
                        if (moved > 5) {
                            e.stopPropagation();
                            e.preventDefault();
                            moved = 0;
                        }
                    };
                    row.style.cursor = 'grab';
                    row.addEventListener('mousedown', onDown);
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onUp);
                    row.addEventListener('click', onClickCapture, true);
                    cleanups.push(() => {
                        cancelMomentum();
                        row.removeEventListener('mousedown', onDown);
                        window.removeEventListener('mousemove', onMove);
                        window.removeEventListener('mouseup', onUp);
                        row.removeEventListener('click', onClickCapture, true);
                        row.style.cursor = '';
                        row.style.userSelect = '';
                        row.style.scrollSnapType = '';
                    });
                });

                return () => {
                    el.removeEventListener('wheel', wheelHandler);
                    el.removeEventListener('scroll', scrollHandler);
                    el.removeEventListener('mousedown', vOnDown);
                    window.removeEventListener('mousemove', vOnMove);
                    window.removeEventListener('mouseup', vOnUp);
                    cancelVMomentum();
                    cleanups.forEach(fn => fn());
                };
            // Re-register when the active domain count changes so the wheel
            // handler's closure over activeDomains stays accurate (Hot loads
            // asynchronously, which grows the list from 4 → 5).
            }, [personas.length, activeDomains.length]);

            // Featured = preview > most recent selected > top Hot persona. Wait
            // until Hot has resolved before falling back, so we don't flash
            // Audrey then swap to Hot #1 mid-load.
            const lastSelected = selectedPersonas[selectedPersonas.length - 1];
            const featured =
                (previewId && personas.find(p => p.id === previewId)) ||
                lastSelected ||
                (hotLoaded
                    ? (hotPersonas[0] || personas.find(p => p.id === 'audrey-hepburn') || personas[0])
                    : null);

            // Masthead date — locale-aware
            const today = new Date();
            const dateLocale = window.__lifeeLocale === 'zh' ? 'zh-CN' : 'en-US';
            const dateStr = today.toLocaleDateString(dateLocale, { weekday: 'long', month: 'short', day: 'numeric' }).toUpperCase();

            return html`
                <div class="animate-in flex flex-col w-full h-full overflow-y-auto no-scrollbar">
                    <!-- Masthead -->
                    <div class="w-full max-w-6xl mx-auto px-8 pt-10 pb-4">
                        <div class="flex items-baseline justify-between border-b border-on-surface/10 pb-3">
                            <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em] font-bold">${t('home.vol')}</p>
                            <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em]">${dateStr}</p>
                            <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em]">${t('home.theCouncil')}</p>
                        </div>
                    </div>

                    <!-- Hero: split layout (input left, featured right) -->
                    <section class="w-full max-w-6xl mx-auto px-8 pt-8 pb-16 grid grid-cols-1 md:grid-cols-5 gap-10">
                        <!-- Left: input area -->
                        <div class="md:col-span-3 flex flex-col justify-center gap-5">
                            <p class="text-[10px] text-on-surface-variant/40 uppercase tracking-[0.3em]">${t('home.todaysQuestion')}</p>
                            <h1 class="font-headline text-4xl md:text-5xl font-bold leading-[1.1] text-on-surface" dangerouslySetInnerHTML=${{ __html: t('home.onYourMind') }}></h1>
                            <div class="flex items-end gap-3 mt-4">
                                <div class="flex-1 flex items-center bg-surface-container border border-outline-variant/20 rounded-2xl px-5 py-4 focus-within:border-primary/30 transition-colors">
                                    <textarea
                                        rows="1"
                                        class="flex-1 bg-transparent text-on-surface placeholder-on-surface-variant/30 text-sm focus:outline-none resize-none leading-relaxed overflow-y-auto"
                                        placeholder=${t('home.placeholder')}
                                        style=${{ maxHeight: '180px' }}
                                        value=${context.situation}
                                        onInput=${e => {
                                            setContext(c => ({ ...c, situation: e.target.value }));
                                            e.target.style.height = 'auto';
                                            e.target.style.height = Math.min(e.target.scrollHeight, 180) + 'px';
                                        }}
                                        onKeyDown=${e => {
                                            // Enter → send; Shift+Enter → newline (default)
                                            if (e.key === 'Enter' && !e.shiftKey) {
                                                e.preventDefault();
                                                trySubmit();
                                            }
                                        }}
                                    ></textarea>
                                </div>
                                <button
                                    disabled=${!context.situation?.trim()}
                                    onClick=${trySubmit}
                                    class="btn-gradient w-14 h-14 rounded-2xl flex items-center justify-center shrink-0 disabled:opacity-20 disabled:cursor-not-allowed"
                                    title=${t('chat.send')}
                                >
                                    <span class="material-symbols-outlined" style=${{ fontSize: '22px' }}>arrow_forward</span>
                                </button>
                            </div>
                            ${toastMsg ? html`
                                <div class="text-xs text-primary/80 animate-in flex items-center gap-2">
                                    <span class="material-symbols-outlined" style=${{ fontSize: '14px' }}>info</span>
                                    ${toastMsg}
                                </div>
                            ` : null}
                            ${selectedIds.length > 0 ? html`
                                <div class="flex flex-wrap gap-2">
                                    ${selectedPersonas.map(p => html`
                                        <span key=${p.id}
                                            class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-primary/8 border border-primary/15 text-xs text-primary/80">
                                            <span class="text-sm">${p.avatar || '☁️'}</span>
                                            <span>${p.name}</span>
                                            <button onClick=${() => toggleSelect(p.id)}
                                                class="ml-0.5 text-primary/40 hover:text-primary text-base leading-none">×</button>
                                        </span>
                                    `)}
                                </div>
                            ` : html`
                                <p class="text-xs text-on-surface-variant/40 italic">${t('home.selectVoices')}</p>
                            `}
                        </div>

        // ══════════════════════════════════════════════

        function PersonaDetail({ persona, isSel, onClose, onToggle }) {
            // Lock body scroll + close on ESC

                const onKey = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', onKey);
                return () => {
                    document.body.style.overflow = prevOverflow;
                    window.removeEventListener('keydown', onKey);
                };
            }, []);

            const sections = [];
            if (persona.decisionStyle) sections.push({ label: t('detail.decisionStyle'), body: persona.decisionStyle });
            if (persona.voice) sections.push({ label: t('detail.voice'), body: `"${persona.voice}"`, italic: true });

            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center animate-in">
                    <!-- Backdrop -->
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>

                    <!-- Panel -->

                        <!-- Hero: cover + close -->
                        <div class="relative h-[280px] shrink-0"
                             style=${persona.cover_url ? {
                                 backgroundImage: `linear-gradient(to bottom, rgba(18,17,15,0.15) 0%, rgba(18,17,15,0.55) 55%, rgba(28,26,22,0.95) 100%), url(${persona.cover_url})`,
                                 backgroundSize: 'cover',
                                 backgroundPosition: persona.cover_position || 'center',

                            <button
