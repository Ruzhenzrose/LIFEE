<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFEE</title>

    <!-- Tailwind CSS CDN with Void color theme config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'surface': '#12110f',
                        'surface-dim': '#0e0d0b',
                        'surface-bright': '#1a1815',
                        'surface-container-lowest': '#100f0d',
                        'surface-container-low': '#161410',
                        'surface-container': '#1c1a16',
                        'surface-container-high': '#232018',
                        'surface-container-highest': '#2a2720',
                        'surface-variant': '#1e1b16',
                        'on-surface': '#ede8e0',
                        'on-surface-variant': '#a09484',
                        'primary': '#e8a84c',
                        'on-primary': '#1a0e00',
                        'on-primary-fixed': '#0f0800',
                        'primary-container': '#7a4e1a',
                        'on-primary-container': '#fde8c0',
                        'secondary': '#8a9a6c',
                        'secondary-dim': '#7a8a5e',
                        'on-secondary': '#1a2008',
                        'secondary-container': '#3a4a20',
                        'on-secondary-container': '#d4e4b0',
                        'tertiary': '#c47a6c',
                        'on-tertiary': '#2a1010',
                        'tertiary-container': '#6a2e28',
                        'on-tertiary-container': '#f4d0c8',
                        'outline': '#6b5e4e',
                        'outline-variant': '#3a3028',
                    },
                    fontFamily: {
                        'headline': ['"Space Grotesk"', 'sans-serif'],
                        'body': ['Manrope', 'sans-serif'],
                        'label': ['Manrope', 'sans-serif'],
                    },
                    animation: {
                        'shimmer': 'shimmer 2.5s linear infinite',
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'slide-in': 'slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { backgroundPosition: '-200% center' },
                            '100%': { backgroundPosition: '200% center' },
                        },
                        fadeIn: {
                            from: { opacity: 0, transform: 'translateY(10px)' },
                            to: { opacity: 1, transform: 'translateY(0)' },
                        },
                        slideIn: {
                            from: { opacity: 0, transform: 'translateX(-16px)' },
                            to: { opacity: 1, transform: 'translateX(0)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 0.7 },
                            '50%': { opacity: 1 },
                        },
                    },
                    backdropBlur: {
                        xs: '2px',
                    },
                }
            }
        };
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

    <!-- React 18 + htm -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>

    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Turnstile CAPTCHA -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>

    <!-- Shared modules from web/ui/ -->
    <script src="/constants.js"></script>
    <script src="/api.js"></script>

    <!-- Void-specific component files -->
    <script src="./components/ui.js"></script>
    <script src="./components/ChatArena.js"></script>
    <script src="./components/modals.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: #12110f;
            color: #ede8e0;
            margin: 0;
            overflow: hidden;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(232,168,76,0.2); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(232,168,76,0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── Glass morphism ── */
        .glass {
            background: rgba(18, 17, 15, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .glass-light {
            background: rgba(35, 32, 24, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(24px);
        }
        .glass-card {
            background: rgba(28, 26, 22, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(232, 168, 76, 0.08);
        }

        /* ── Warm amber border ── */
        .iridescent-border {
            position: relative;
        }
        .iridescent-border::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: inherit;
            background: linear-gradient(135deg, #e8a84c, #c47a6c, #8a9a6c, #e8a84c);
            background-size: 300% 300%;
            animation: iridescentShift 4s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        @keyframes iridescentShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── Wordmark (solid, breathing opacity) ── */
        .wordmark {
            color: #e8a84c;
            letter-spacing: -0.02em;
            animation: wordmark-breath 4s ease-in-out infinite;
        }
        @keyframes wordmark-breath {
            0%, 100% { opacity: 0.92; }
            50%      { opacity: 1; }
        }

        /* ── Gradient button ── */
        .btn-gradient {
            background: linear-gradient(135deg, #e8a84c, #c47a6c);
            color: #0f0800;
            font-weight: 700;
            transition: all 0.25s ease;
        }
        .btn-gradient:hover {
            background: linear-gradient(135deg, #f0b860, #d08878);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(232, 168, 76, 0.3);
        }
        .btn-gradient:active { transform: translateY(0); }

        /* ── Ghost button ── */
        .btn-ghost {
            background: transparent;
            border: 1px solid rgba(232, 168, 76, 0.2);
            color: #e8a84c;
            transition: all 0.2s ease;
        }
        .btn-ghost:hover {
            background: rgba(232, 168, 76, 0.08);
            border-color: rgba(232, 168, 76, 0.4);
        }

        /* ── Sidebar transition ── */
        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), width 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        /* ── Persona card hover ── */
        .persona-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .persona-card:hover {
            transform: translateY(-4px);
            border-color: rgba(232, 168, 76, 0.3) !important;
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.5), 0 0 32px rgba(232, 168, 76, 0.12);
        }

        /* ── Animate in ── */
        .animate-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Capsule tabs ── */
        .void-tab {
            padding: 8px 20px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: all 0.2s ease;
            white-space: nowrap;
            color: rgba(160, 148, 132, 0.6);
        }
        .void-tab:hover { color: #e8a84c; }
        .void-tab.active {
            background: linear-gradient(135deg, rgba(232,168,76,0.2), rgba(196,122,108,0.1));
            color: #e8a84c;
            border: 1px solid rgba(232, 168, 76, 0.3);
        }

        /* ── Landing option pills ── */
        .void-opt {
            border: 1px solid rgba(232, 168, 76, 0.15);
            background: rgba(35, 32, 24, 0.4);
            color: rgba(237, 232, 224, 0.6);
            border-radius: 9999px;
            padding: 9px 18px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .void-opt:hover {
            border-color: rgba(232, 168, 76, 0.4);
            color: #e8a84c;
            background: rgba(232, 168, 76, 0.08);
        }
        .void-opt.selected {
            background: linear-gradient(135deg, rgba(232,168,76,0.25), rgba(196,122,108,0.12));
            color: #e8a84c;
            border-color: rgba(232, 168, 76, 0.5);
            box-shadow: 0 4px 16px rgba(232, 168, 76, 0.2);
        }

        /* ── Textarea focus ── */
        .void-textarea:focus {
            outline: none;
            border-color: rgba(232, 168, 76, 0.4) !important;
            box-shadow: 0 0 0 3px rgba(232, 168, 76, 0.1), 0 0 24px rgba(232, 168, 76, 0.08);
        }

        /* ── Session item hover actions ── */
        .session-actions { opacity: 0; transition: opacity 0.2s ease; }
        .session-row:hover .session-actions { opacity: 1; }

        /* ── Suggested questions scroll ── */
        .sq-scroll {
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            -ms-overflow-style: none;
            scrollbar-width: none;
            padding: 4px 0 12px 0;
        }
        .sq-scroll::-webkit-scrollbar { display: none; }
        .sq-track {
            display: inline-flex;
            gap: 10px;
            padding: 0 2px;
            min-width: 100%;
        }
        .sq-pill {
            background: rgba(28, 26, 22, 0.6);
            border: 1px solid rgba(232, 168, 76, 0.12);
            border-radius: 9999px;
            padding: 10px 18px;
            white-space: nowrap;
            font-size: 12px;
            color: rgba(237, 232, 224, 0.7);
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        .sq-pill:hover {
            border-color: rgba(232, 168, 76, 0.35);
            color: #e8a84c;
            background: rgba(232, 168, 76, 0.06);
        }

        /* ── Material Symbol sizing ── */
        .material-symbols-outlined {
            font-size: 20px;
            line-height: 1;
            vertical-align: middle;
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="void-root" class="h-full"></div>

    <script>
    (function () {
        'use strict';

        const html = htm.bind(React.createElement);
        const { useState, useEffect, useLayoutEffect, useRef, useCallback } = React;

        // ── Icon helper (Lucide via CDN) ──
        function Icon({ name, size = 18, className = '', style }) {
            // Span is React-owned; <i>→<svg> is managed manually and cleared in cleanup
            // so Lucide's node replacement never leaves stale children for React to trip on.
            const ref = useRef(null);
            useLayoutEffect(() => {
                const el = ref.current;
                if (!el) return undefined;
                while (el.firstChild) el.removeChild(el.firstChild);
                const inner = document.createElement('i');
                const kebab = name.replace(/([A-Z])/g, (m, c, i) => (i > 0 ? '-' : '') + c.toLowerCase());
                inner.setAttribute('data-lucide', kebab);
                el.appendChild(inner);
                try { window.lucide?.createIcons?.({ nodes: [inner] }); } catch (_) {}
                return () => {
                    try { while (el.firstChild) el.removeChild(el.firstChild); } catch (_) {}
                };
            }, [name]);
            return html`<span ref=${ref} class=${'inline-flex items-center justify-center shrink-0 ' + className} style=${{ width: size, height: size, lineHeight: 0, ...(style || {}) }} aria-hidden="true" />`;
        }

        // ── Material Symbol helper ──
        function MS({ name, size = 20, className = '' }) {
            return html`<span class=${'material-symbols-outlined ' + className} style=${{ fontSize: size }}>${name}</span>`;
        }

        // ── Relative time ──
        function relativeTime(ts) {
            if (!ts) return '';
            const diff = Date.now() - new Date(ts).getTime();
            const m = Math.floor(diff / 60000);
            if (m < 1) return 'just now';
            if (m < 60) return `${m}m ago`;
            const h = Math.floor(m / 60);
            if (h < 24) return `${h}h ago`;
            const d = Math.floor(h / 24);
            if (d < 7) return `${d}d ago`;
            return new Date(ts).toLocaleDateString();
        }

        // ── AvatarDisplay ──
        function AvatarDisplay({ avatar, className = '', size = 40 }) {
            if (!avatar) {
                return html`<div class=${'flex items-center justify-center bg-surface-container-high rounded-full ' + className} style=${{ width: size, height: size }}>
                    <${Icon} name="User" size=${Math.floor(size * 0.5)} className="text-on-surface-variant" />
                </div>`;
            }
            if (typeof avatar === 'string' && (avatar.startsWith('http') || avatar.startsWith('data:'))) {
                return html`<img src=${avatar} class=${'object-cover rounded-full ' + className} style=${{ width: size, height: size }} loading="lazy" alt="" />`;
            }
            return html`<div class=${'flex items-center justify-center rounded-full ' + className} style=${{ width: size, height: size, fontSize: Math.floor(size * 0.5) }}>${avatar}</div>`;
        }

        // ══════════════════════════════════════════════
        //  AUTH MODAL
        // ══════════════════════════════════════════════
        function AuthModal({ isOpen, onClose, onAuthed, onGuest }) {
            const [mode, setMode] = useState('login');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');
            const [otpSent, setOtpSent] = useState(false);
            const [otpCode, setOtpCode] = useState('');
            const [humanVerified, setHumanVerified] = useState(false);
            const turnstileRef = useRef(null);
            const widgetIdRef = useRef(null);

            useEffect(() => {
                if (!isOpen || humanVerified) return;
                const renderWidget = () => {
                    if (turnstileRef.current && window.turnstile && widgetIdRef.current === null) {
                        widgetIdRef.current = window.turnstile.render(turnstileRef.current, {
                            sitekey: TURNSTILE_SITEKEY,
                            callback: async (token) => {
                                const result = await verifyHumanTokenWithServer(token);
                                if (result.ok) {
                                    setHumanVerified(true);
                                    if (result.bypassed) setMessage('Local preview: verification skipped.');
                                } else {
                                    setMessage(result.message || 'Verification failed. Please retry.');
                                }
                            },
                            theme: 'dark',
                        });
                    }
                };
                if (window.turnstile) { renderWidget(); }
                else {
                    const timer = setInterval(() => {
                        if (window.turnstile) { clearInterval(timer); renderWidget(); }
                    }, 200);
                    return () => clearInterval(timer);
                }
                return () => {
                    if (widgetIdRef.current !== null && window.turnstile) {
                        window.turnstile.remove(widgetIdRef.current);
                        widgetIdRef.current = null;
                    }
                };
            }, [isOpen, humanVerified]);

            if (!isOpen) return null;

            const handleAuth = async () => {
                setLoading(true);
                setMessage('');
                try {
                    if (mode === 'login') {
                        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                        if (data?.user) onAuthed(data.user);
                    } else if (otpSent) {
                        const { data, error } = await supabaseClient.auth.verifyOtp({ email, token: otpCode, type: 'signup' });
                        if (error) throw error;
                        if (data?.user) onAuthed(data.user);
                    } else {
                        const { error } = await supabaseClient.auth.signUp({ email, password });
                        if (error) throw error;
                        setOtpSent(true);
                        setMessage('Verification code sent to your email.');
                    }
                } catch (err) {
                    setMessage(err?.message || 'Operation failed. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>
                    <div class="relative w-full max-w-sm mx-4 glass-card rounded-3xl p-8 animate-in iridescent-border">
                        <div class="flex items-center justify-between mb-7">
                            <div>
                                <h2 class="font-headline text-lg font-bold text-on-surface">
                                    ${mode === 'login' ? 'Welcome back' : 'Create account'}
                                </h2>
                                <p class="text-xs text-on-surface-variant mt-0.5">LIFEE</p>
                            </div>
                            <button onClick=${onClose} class="w-8 h-8 rounded-full btn-ghost flex items-center justify-center">
                                <${Icon} name="X" size=${14} />
                            </button>
                        </div>

                        ${!humanVerified ? html`
                            <div class="flex flex-col items-center gap-4 py-4">
                                <p class="text-sm text-on-surface-variant">Please verify you're human</p>
                                <div ref=${turnstileRef}></div>
                                ${message && html`<p class="text-xs text-tertiary/80 text-center">${message}</p>`}
                            </div>
                        ` : otpSent ? html`
                            <div class="space-y-4">
                                <p class="text-sm text-on-surface-variant">${message || 'Enter the verification code sent to your email.'}</p>
                                <input
                                    type="text"
                                    placeholder="6-digit code"
                                    value=${otpCode}
                                    onInput=${e => setOtpCode(e.target.value)}
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                />
                                <button
                                    onClick=${handleAuth}
                                    disabled=${loading || !otpCode}
                                    class="w-full btn-gradient rounded-xl py-3 text-sm disabled:opacity-40"
                                >${loading ? 'Verifying…' : 'Verify & Sign Up'}</button>
                            </div>
                        ` : html`
                            <div class="space-y-3">
                                <input
                                    type="email"
                                    placeholder="Email address"
                                    value=${email}
                                    onInput=${e => setEmail(e.target.value)}
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                />
                                <input
                                    type="password"
                                    placeholder="Password"
                                    value=${password}
                                    onInput=${e => setPassword(e.target.value)}
                                    onKeyDown=${e => { if (e.key === 'Enter') handleAuth(); }}
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                />
                                ${message && html`<p class="text-xs text-tertiary/80">${message}</p>`}
                                <button
                                    onClick=${handleAuth}
                                    disabled=${loading || !email || !password}
                                    class="w-full btn-gradient rounded-xl py-3 text-sm disabled:opacity-40"
                                >${loading ? 'Please wait…' : mode === 'login' ? 'Sign In' : 'Send Verification Code'}</button>
                                <div class="flex items-center gap-2 pt-1">
                                    <div class="flex-1 h-px bg-outline/20"></div>
                                    <span class="text-xs text-on-surface-variant">or</span>
                                    <div class="flex-1 h-px bg-outline/20"></div>
                                </div>
                                <button
                                    onClick=${() => { onGuest(); }}
                                    class="w-full btn-ghost rounded-xl py-3 text-sm"
                                >Continue as Guest</button>
                                <p class="text-center text-xs text-on-surface-variant pt-1">
                                    ${mode === 'login'
                                        ? html`No account? <button onClick=${() => { setMode('signup'); setMessage(''); }} class="text-primary hover:underline">Sign up</button>`
                                        : html`Already have one? <button onClick=${() => { setMode('login'); setMessage(''); setOtpSent(false); }} class="text-primary hover:underline">Sign in</button>`}
                                </p>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  SIDEBAR
        // ══════════════════════════════════════════════
        function Sidebar({
            view, setView, user, isGuest, onNewSession, chatSessions,
            setChatSessions, setSessionMessages, sessionId, setSessionId, setSelectedIds,
            personas, onLogin, onSignOut, userAvatar,
            sidebarOpen, setSidebarOpen,
        }) {
            const [userMenuOpen, setUserMenuOpen] = useState(false);
            const userCardRef = useRef(null);

            // Close user menu on outside click
            useEffect(() => {
                if (!userMenuOpen) return;
                const handler = (e) => {
                    if (userCardRef.current && !userCardRef.current.contains(e.target)) {
                        setUserMenuOpen(false);
                    }
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, [userMenuOpen]);

            const restoreSession = async (s) => {
                try {
                    const res = await fetch(`/sessions/${s.id}/messages`, { credentials: 'include' }).then(r => r.json());
                    if (res?.messages) {
                        setSessionMessages(res.messages.map(m => ({ personaId: m.persona_id || m.role, text: m.content })));
                        setSessionId(s.id);
                        if (s.personas?.length && setSelectedIds) {
                            const ids = s.personas.map(pid => {
                                const found = (personas || []).find(p =>
                                    p.id === pid || p.name === pid || p.id === pid.toLowerCase().replace(/\s+/g, '')
                                );
                                return found?.id;
                            }).filter(Boolean);
                            if (ids.length) setSelectedIds(ids);
                        }
                        setView('debate');
                    }
                } catch (e) { console.error('restore session failed', e); }
            };

            const starSession = async (s, e) => {
                e.stopPropagation();
                const newVal = !s.starred;
                await fetch(`/sessions/${s.id}`, {
                    method: 'PATCH', credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ starred: newVal })
                });
                setChatSessions(prev => prev.map(x => x.id === s.id ? { ...x, starred: newVal } : x));
            };

            const deleteSession = async (s, e) => {
                e.stopPropagation();
                if (!confirm('Delete this conversation?')) return;
                await fetch(`/sessions/${s.id}`, { method: 'DELETE', credentials: 'include' });
                setChatSessions(prev => prev.filter(x => x.id !== s.id));
                setSessionId(null);
                setSessionMessages([]);
                setView('home');
            };

        // ══════════════════════════════════════════════
        //  HOME VIEW
        // ══════════════════════════════════════════════
        function HomeView({ context, setContext, setView, personas, selectedIds, setSelectedIds }) {
            // Domain classification by persona id
            const DOMAIN_MAP = {
                'krishnamurti': 'Philosophy', 'lacan': 'Philosophy', 'Simone de Beauvoir': 'Philosophy',
                'buffett': 'Business', 'munger': 'Business', 'drucker': 'Business', 'welch': 'Business',
                'shannon': 'Science', 'turing': 'Science', 'vonneumann': 'Science',
                'audrey-hepburn': 'Arts',
            };
            const getDomain = (p) => DOMAIN_MAP[p.id] || p.category || 'Other';
            const DOMAIN_ORDER = ['Philosophy', 'Business', 'Science', 'Arts'];

            // Group personas by domain
            const grouped = {};
            DOMAIN_ORDER.forEach(d => grouped[d] = []);
            personas.forEach(p => {
                const d = getDomain(p);
                if (grouped[d]) grouped[d].push(p);
            });

            const toggleSelect = (id) => {
                setSelectedIds(prev =>
                    prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
                );
            };

            const selectedPersonas = personas.filter(p => selectedIds.includes(p.id));

            // Preview: hovered/tapped persona in the right panel
            const [previewId, setPreviewId] = useState(null);

            // Preload persona cover images in parallel so first click is instant
            useEffect(() => {
                personas.forEach(p => {
                    if (!p.cover_url) return;
                    const img = new Image();
                    img.src = p.cover_url;
                });
            }, [personas.length]);

            // Domain carousel
            const activeDomains = DOMAIN_ORDER.filter(d => grouped[d].length > 0);
            const SECTION_H = 200;  // each section px
            const carouselRef = useRef(null);
            const scrollLockRef = useRef(false);  // true during programmatic scroll
            const [activeDomainIdx, setActiveDomainIdx] = useState(0);

            const goToDomain = (idx) => {
                const el = carouselRef.current;
                if (!el) return;
                const clamped = Math.max(0, Math.min(activeDomains.length - 1, idx));
                scrollLockRef.current = true;
                el.scrollTo({ top: clamped * SECTION_H, behavior: 'smooth' });
                setActiveDomainIdx(clamped);
                setTimeout(() => { scrollLockRef.current = false; }, 500);
            };

            useEffect(() => {
                const el = carouselRef.current;
                if (!el) return;
                let wheelLock = false;
                const wheelHandler = (e) => {
                    // Horizontal intent (trackpad 2-finger swipe or Shift+Wheel) → let the
                    // inner persona row scroll natively, don't hijack for domain switch.
                    if (e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY)) return;
                    e.preventDefault();
                    if (wheelLock) return;
                    const dir = e.deltaY > 0 ? 1 : -1;
                    const currentIdx = Math.round(el.scrollTop / SECTION_H);
                    const nextIdx = Math.max(0, Math.min(activeDomains.length - 1, currentIdx + dir));
                    if (nextIdx === currentIdx) return;
                    wheelLock = true;
                    scrollLockRef.current = true;
                    el.scrollTo({ top: nextIdx * SECTION_H, behavior: 'smooth' });
                    setActiveDomainIdx(nextIdx);
                    setTimeout(() => { wheelLock = false; scrollLockRef.current = false; }, 500);
                };
                const scrollHandler = () => {
                    if (scrollLockRef.current) return;  // ignore during programmatic scroll
                    const idx = Math.round(el.scrollTop / SECTION_H);
                    setActiveDomainIdx(prev => prev === idx ? prev : idx);
                };
                el.addEventListener('wheel', wheelHandler, { passive: false });
                el.addEventListener('scroll', scrollHandler);

                // Vertical mouse drag on carousel → switch domain
                let vDrag = false;
                let vStartY = 0;
                let vStartTop = 0;
                let vLastY = 0;
                let vLastT = 0;
                let vVel = 0;
                let vMoved = 0;
                let vRaf = null;
                const cancelVMomentum = () => { if (vRaf != null) { cancelAnimationFrame(vRaf); vRaf = null; } };
                const snapToNearest = () => {
                    const idx = Math.max(0, Math.min(activeDomains.length - 1, Math.round(el.scrollTop / SECTION_H)));
                    scrollLockRef.current = true;
                    el.scrollTo({ top: idx * SECTION_H, behavior: 'smooth' });
                    setActiveDomainIdx(idx);
                    setTimeout(() => { scrollLockRef.current = false; }, 500);
                };
                const runVMomentum = () => {
                    const friction = 0.92;
                    const tick = () => {
                        if (Math.abs(vVel) < 0.03) { vRaf = null; snapToNearest(); return; }
                        el.scrollTop -= vVel * 16;
                        vVel *= friction;
                        vRaf = requestAnimationFrame(tick);
                    };
                    vRaf = requestAnimationFrame(tick);
                };
                const vOnDown = (e) => {
                    if (e.button !== 0) return;
                    cancelVMomentum();
                    vDrag = true;
                    vMoved = 0;
                    vStartY = e.clientY;
                    vLastY = e.clientY;
                    vLastT = performance.now();
                    vVel = 0;
                    vStartTop = el.scrollTop;
                };
                const vOnMove = (e) => {
                    if (!vDrag) return;
                    const dy = e.clientY - vStartY;
                    vMoved = Math.max(vMoved, Math.abs(dy));
                    el.scrollTop = vStartTop - dy;
                    const now = performance.now();
                    const dt = now - vLastT;
                    if (dt > 0) vVel = vVel * 0.6 + ((e.clientY - vLastY) / dt) * 0.4;
                    vLastY = e.clientY;
                    vLastT = now;
                };
                const vOnUp = () => {
                    if (!vDrag) return;
                    vDrag = false;
                    if (performance.now() - vLastT > 80) vVel = 0;
                    if (Math.abs(vVel) > 0.15) runVMomentum();
                    else snapToNearest();
                };
                el.addEventListener('mousedown', vOnDown);
                window.addEventListener('mousemove', vOnMove);
                window.addEventListener('mouseup', vOnUp);

                // Mouse drag-to-scroll with momentum (feels like mobile swipe)
                const rows = el.querySelectorAll('[data-h-row]');
                const cleanups = [];
                rows.forEach(row => {
                    let dragging = false;
                    let startX = 0;
                    let startY = 0;
                    let startScroll = 0;
                    let moved = 0;
                    let lastX = 0;
                    let lastTime = 0;
                    let velocity = 0;   // px per ms (positive = pointer moving right)
                    let rafId = null;

                    const cancelMomentum = () => {
                        if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; }
                    };
                    const restoreSnap = () => { row.style.scrollSnapType = ''; };
                    const runMomentum = (done) => {
                        const friction = 0.94;          // per 16ms frame
                        const minV = 0.02;              // px/ms stop threshold
                        const tick = () => {
                            if (Math.abs(velocity) < minV) {
                                rafId = null;
                                if (done) done();
                                return;
                            }
                            row.scrollLeft -= velocity * 16;
                            velocity *= friction;
                            rafId = requestAnimationFrame(tick);
                        };
                        rafId = requestAnimationFrame(tick);
                    };

                    const onDown = (e) => {
                        if (e.button !== 0) return;
                        cancelMomentum();
                        // Disable scroll-snap during interaction so every scrollLeft
                        // delta renders freely. Restored after momentum completes.
                        row.style.scrollSnapType = 'none';
                        dragging = true;
                        moved = 0;
                        startX = e.clientX;
                        startY = e.clientY;
                        lastX = e.clientX;
                        lastTime = performance.now();
                        velocity = 0;
                        startScroll = row.scrollLeft;
                        row.style.cursor = 'grabbing';
                        row.style.userSelect = 'none';
                    };
                    const onMove = (e) => {
                        if (!dragging) return;
                        const dx = e.clientX - startX;
                        const dy = e.clientY - startY;
                        moved = Math.max(moved, Math.hypot(dx, dy));
                        row.scrollLeft = startScroll - dx;
                        // Smooth velocity sample (EMA)
                        const now = performance.now();
                        const dt = now - lastTime;
                        if (dt > 0) {
                            const instantV = (e.clientX - lastX) / dt;
                            velocity = velocity * 0.6 + instantV * 0.4;
                        }
                        lastX = e.clientX;
                        lastTime = now;
                    };
                    const onUp = () => {
                        if (!dragging) return;
                        dragging = false;
                        row.style.cursor = '';
                        row.style.userSelect = '';
                        // Decay velocity if last sample was stale (finger paused before release)
                        if (performance.now() - lastTime > 80) velocity = 0;
                        if (Math.abs(velocity) > 0.1) {
                            runMomentum(restoreSnap);
                        } else {
                            restoreSnap();
                        }
                    };
                    // Suppress click after drag so cards don't get selected
                    const onClickCapture = (e) => {
                        if (moved > 5) {
                            e.stopPropagation();
                            e.preventDefault();
                            moved = 0;
                        }
                    };
                    row.style.cursor = 'grab';
                    row.addEventListener('mousedown', onDown);
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onUp);
                    row.addEventListener('click', onClickCapture, true);
                    cleanups.push(() => {
                        cancelMomentum();
                        row.removeEventListener('mousedown', onDown);
                        window.removeEventListener('mousemove', onMove);
                        window.removeEventListener('mouseup', onUp);
                        row.removeEventListener('click', onClickCapture, true);
                        row.style.cursor = '';
                        row.style.userSelect = '';
                        row.style.scrollSnapType = '';
                    });
                });

                return () => {
                    el.removeEventListener('wheel', wheelHandler);
                    el.removeEventListener('scroll', scrollHandler);
                    el.removeEventListener('mousedown', vOnDown);
                    window.removeEventListener('mousemove', vOnMove);
                    window.removeEventListener('mouseup', vOnUp);
                    cancelVMomentum();
                    cleanups.forEach(fn => fn());
                };
            }, [personas.length]);

            // Featured = preview > most recent selected > default (Audrey)
            const lastSelected = selectedPersonas[selectedPersonas.length - 1];
            const featured =
                (previewId && personas.find(p => p.id === previewId)) ||
                lastSelected ||
                personas.find(p => p.id === 'audrey-hepburn') ||
                personas[0];

            // Masthead date
            const today = new Date();
            const dateStr = today.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }).toUpperCase();

            return html`
                <div class="animate-in flex flex-col w-full h-full overflow-y-auto no-scrollbar">
                    <!-- Masthead -->
                    <div class="w-full max-w-6xl mx-auto px-8 pt-10 pb-4">
                        <div class="flex items-baseline justify-between border-b border-on-surface/10 pb-3">
                            <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em] font-bold">Vol. I</p>
                            <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em]">${dateStr}</p>
                            <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em]">The Council</p>
                        </div>
                    </div>

                    <!-- Hero: split layout (input left, featured right) -->
                    <section class="w-full max-w-6xl mx-auto px-8 pt-8 pb-16 grid grid-cols-1 md:grid-cols-5 gap-10">
                        <!-- Left: input area -->
                        <div class="md:col-span-3 flex flex-col justify-center gap-5">
                            <p class="text-[10px] text-on-surface-variant/40 uppercase tracking-[0.3em]">Today's question</p>
                            <h1 class="font-headline text-4xl md:text-5xl font-bold leading-[1.1] text-on-surface">
                                What's on<br/>your mind?
                            </h1>
                            <div class="flex items-center gap-3 mt-4">
                                <div class="flex-1 flex items-center bg-surface-container border border-outline-variant/20 rounded-2xl px-5 py-4 focus-within:border-primary/30 transition-colors">
                                    <input
                                        type="text"
                                        class="flex-1 bg-transparent text-on-surface placeholder-on-surface-variant/30 text-sm focus:outline-none"
                                        placeholder="Describe your situation..."
                                        value=${context.situation}
                                        onInput=${e => setContext(c => ({ ...c, situation: e.target.value }))}
                                        onKeyDown=${e => { if (e.key === 'Enter' && context.situation?.trim() && selectedIds.length > 0) setView('debate'); }}
                                    />
                                </div>
                                <button
                                    disabled=${selectedIds.length === 0 || !context.situation?.trim()}
                                    onClick=${() => setView('debate')}
                                    class="btn-gradient px-6 py-4 rounded-2xl text-xs font-bold uppercase tracking-wider disabled:opacity-20 disabled:cursor-not-allowed shrink-0"
                                >
                                    <span class="material-symbols-outlined" style=${{ fontSize: '20px', verticalAlign: 'middle' }}>send</span>
                                </button>
                            </div>
                            ${selectedIds.length > 0 ? html`
                                <div class="flex flex-wrap gap-2">

        // ══════════════════════════════════════════════
        //  MAIN APP
        // ══════════════════════════════════════════════
        function App() {
            const [view, setView] = useState('home');
            const [context, setContext] = useState({ situation: '', landingPeriods: [] });
            const _NO_KNOWLEDGE = new Set(['serene', 'architect', 'rebel', 'caretaker', 'tarot-master']);
            const [personas, setPersonas] = useState(INITIAL_PERSONAS.filter(p => !_NO_KNOWLEDGE.has(p.id)));
            const [selectedIds, setSelectedIds] = useState([]);
            const [user, setUser] = useState(null);
            const [isGuest, setIsGuest] = useState(false);
            const [authOpen, setAuthOpen] = useState(false);
            const [userAvatar, setUserAvatar] = useState(() => {
                try { return window.localStorage.getItem('lifee_user_avatar') || null; } catch (_) { return null; }
            });
            const [sessionId, setSessionId] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [hasEnteredDebate, setHasEnteredDebate] = useState(false);
            useEffect(() => { if (view === 'debate') setHasEnteredDebate(true); }, [view]);
            const [sessionMessages, setSessionMessages] = useState([]);
            const [sessionSummaries, setSessionSummaries] = useState([]);
            const [chatSessions, setChatSessions] = useState([]);
            const [chatSessionsLoading, setChatSessionsLoading] = useState(false);
            const [favoritePersonas, setFavoritePersonas] = useState([]);
            const [personaAssets, setPersonaAssets] = useState({});
            const [personaAvatarOverrides, setPersonaAvatarOverrides] = useState(() => {
                try { return JSON.parse(window.localStorage.getItem('lifee_persona_avatar_overrides') || '{}'); } catch (_) { return {}; }
            });
            const [personaCoverOverrides, setPersonaCoverOverrides] = useState(() => {
                try { return JSON.parse(window.localStorage.getItem('lifee_persona_cover_overrides') || '{}'); } catch (_) { return {}; }
            });
            const [personaCatalogKnowledge, setPersonaCatalogKnowledge] = useState({});
            const [summaryEvery] = useState(SUMMARY_EVERY_DEFAULT);
            const [contextWindow] = useState(CONTEXT_WINDOW_DEFAULT);

            const sessionMessagesRef = useRef([]);
            useEffect(() => { sessionMessagesRef.current = sessionMessages; }, [sessionMessages]);

            // Persist userAvatar
            useEffect(() => {
                try { if (userAvatar) window.localStorage.setItem('lifee_user_avatar', userAvatar); } catch (_) {}
            }, [userAvatar]);

            // Persist favorites
            useEffect(() => {
                try { window.localStorage.setItem('lifee_favorite_personas', JSON.stringify(favoritePersonas || [])); } catch (_) {}
            }, [favoritePersonas]);

            // Persist overrides
            useEffect(() => {
                try { window.localStorage.setItem('lifee_persona_avatar_overrides', JSON.stringify(personaAvatarOverrides || {})); } catch (_) {}
            }, [personaAvatarOverrides]);
            useEffect(() => {
                try { window.localStorage.setItem('lifee_persona_cover_overrides', JSON.stringify(personaCoverOverrides || {})); } catch (_) {}
            }, [personaCoverOverrides]);

            // Auth init
            useEffect(() => {
                let mounted = true;
                (async () => {
                    const { data } = await supabaseClient.auth.getSession();
                    if (mounted) setUser(data?.session?.user || null);
                })();
                const { data: sub } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user || null);
                    if (session?.user) setIsGuest(false);
                });
                return () => { mounted = false; sub?.subscription?.unsubscribe?.(); };
            }, []);

            // Load favorite personas
            useEffect(() => {
                try {
                    const raw = window.localStorage.getItem('lifee_favorite_personas');
                    if (raw) setFavoritePersonas(JSON.parse(raw));
                } catch (_) {}
            }, []);

            // Upsert profile + load settings
            useEffect(() => {
                if (!user) return;
                (async () => {
                    await supabaseClient.from('profiles').upsert({
                        id: user.id,
                        email: user.email,
                        display_name: user.user_metadata?.name || null,
                        avatar_url: user.user_metadata?.avatar_url || null,
                    }, { onConflict: 'id' });

                    const { data: settings } = await supabaseClient
                        .from('user_settings').select('summary_every, context_window').eq('id', user.id).maybeSingle();
                    if (!settings) {
                        await supabaseClient.from('user_settings').insert({
                            id: user.id,
                            summary_every: SUMMARY_EVERY_DEFAULT,
                            context_window: CONTEXT_WINDOW_DEFAULT,
                        });
                    }
                })();
            }, [user]);

            // Load persona assets + chat sessions
            useEffect(() => {
                if (!user) return;
                (async () => {
                    const { data } = await supabaseClient.from('personas').select('id, avatar_url, cover_url');
                    const map = {};
                    (data || []).forEach(row => { map[row.id] = row; });
                    setPersonaAssets(map);
                })();

                (async () => {
                    setChatSessionsLoading(true);
                    try {
                        const res = await fetch(`/sessions?userId=${user.id}`, { credentials: 'include' }).then(r => r.json());
                        setChatSessions(res?.sessions || []);
                    } catch (_) { setChatSessions([]); }
                    setChatSessionsLoading(false);
                })();

                // (Removed: auto-load latest session caused race condition
                //  where a new conversation would be overwritten mid-stream)
            }, [user]);

            // Load persona_catalog knowledge
            useEffect(() => {
                (async () => {
                    try {
                        const { data } = await supabaseClient.from('persona_catalog').select('id, decision_style');
                        const map = {};
                        (data || []).forEach(row => { if (row?.decision_style?.trim()) map[row.id] = row.decision_style.trim(); });
                        setPersonaCatalogKnowledge(map);
                    } catch (_) {}
                })();
            }, []);

            const refreshChatSessions = useCallback(async () => {
                if (!user) return;
                setChatSessionsLoading(true);
                try {
                    const res = await fetch(`/sessions?userId=${user.id}`, { credentials: 'include' }).then(r => r.json());
                    setChatSessions(res?.sessions || []);
                } catch (_) { setChatSessions([]); }
                setChatSessionsLoading(false);
            }, [user]);

            // Display personas (merge assets + overrides + catalog knowledge)
            const displayPersonas = personas.map(p => {
                const asset = personaAssets[p.id];
                const avatarOverride = personaAvatarOverrides?.[p.id];
                const coverOverride = personaCoverOverrides?.[p.id];
                return {
                    ...p,
                    avatar: avatarOverride || asset?.avatar_url || p.avatar,
                    cover_url: coverOverride || asset?.cover_url || p.cover_url || null,
                    knowledge: (p.knowledge || '').trim() || (personaCatalogKnowledge[p.id] || '').trim(),
                };
            });

            const buildContextBlock = useCallback(() => {
                const summaryBlock = sessionSummaries.length
                    ? sessionSummaries.map(s => `Summary(${s.start_seq}-${s.end_seq})\n${s.summary}`).join('\n\n')
                    : '';
                const latestMsgs = sessionMessages.slice(-contextWindow).map(m => `${m.role.toUpperCase()}: ${m.text}`).join('\n');
                return [summaryBlock, latestMsgs].filter(Boolean).join('\n\n');
            }, [sessionSummaries, sessionMessages, contextWindow]);

            const ensureSession = useCallback(async () => sessionId || null, [sessionId]);
            const persistMessage = useCallback(async () => {}, []);

            const handleNewSession = useCallback(async () => {
                setSessionId(null);
                setSessionMessages([]);
                setSessionSummaries([]);
                setContext({ situation: '', landingPeriods: [] });
                setSelectedIds([]);
                setView('home');
            }, []);

            const handleSignOut = useCallback(async () => {
                await supabaseClient.auth.signOut();
                setUser(null);
                setIsGuest(false);
                setView('home');
                setAuthOpen(true);
            }, []);

            const toggleFavoritePersona = useCallback((persona) => {
                if (!persona?.id) return;
                setFavoritePersonas(prev => {
                    const exists = (prev || []).some(p => p.id === persona.id);
                    return exists ? prev.filter(p => p.id !== persona.id) : [...(prev || []), persona];
                });
            }, []);

            const restoreSession = useCallback(async (s) => {
                try {
                    const res = await fetch(`/sessions/${s.id}/messages`, { credentials: 'include' }).then(r => r.json());
                    if (res?.messages) {
                        setSessionMessages(res.messages.map(m => ({ personaId: m.persona_id || m.role, text: m.content })));
                        setSessionId(s.id);
                        if (s.personas?.length) {
                            const ids = s.personas.map(pid => {
                                const found = displayPersonas.find(p =>
                                    p.id === pid || p.name === pid || p.id === pid.toLowerCase().replace(/\s+/g, '')
                                );
                                return found?.id;
                            }).filter(Boolean);
                            if (ids.length) setSelectedIds(ids);
                        }
                        setView('debate');
                    }
                } catch (e) { console.error('restore failed', e); }
            }, [displayPersonas]);

            const isAdmin = user?.email === ADMIN_EMAIL;

            // ── Persistent ChatArena: mounted once activated, hidden via CSS when view != debate ──
            const renderChatArena = () => {
                if (!window.VOID_VIEWS?.debate) return null;
                return window.VOID_VIEWS.debate({
                    context,
                    selectedPersonas: displayPersonas.filter(p => selectedIds.includes(p.id)),
                    setView,
                    ensureSession,
                    persistMessage,
                    buildContextBlock,
                    userAvatar,
                    user,
                    initialMessages: sessionMessages,
                    parentSessionId: sessionId,
                    onSessionCreated: (id) => {
                        setSessionId(id);
                        refreshChatSessions();
                    },
                });
            };

            // Back = return to debate if user has an active conversation, else home
            const goBack = () => setView(hasEnteredDebate && (sessionId || sessionMessages.length > 0) ? 'debate' : 'home');

            // ── Render content for current non-debate view ──
            const renderContent = () => {
                if (view === 'debate') {
                    // Handled by persistent ChatArena above
                    if (window.VOID_VIEWS?.debate) return null;
                    return html`<${PlaceholderView} title="Chat Arena" icon="MessageSquare" onBack=${goBack} />`;
                }

                if (view === 'settings') {
                    if (window.VOID_VIEWS?.settings) return window.VOID_VIEWS.settings({
                        user, isAdmin, onBack: goBack,
                        onSignOut: handleSignOut, onLogin: () => setAuthOpen(true),
                        userAvatar, onUserAvatarChange: (a) => setUserAvatar(a),
                    });
                    return html`<${SettingsView}
                        onBack=${goBack}
                        user=${user}
                        onSignOut=${handleSignOut}
                        onLogin=${() => setAuthOpen(true)}
                        userAvatar=${userAvatar}
                        onUserAvatarChange=${(a) => setUserAvatar(a)}
                    />`;
                }

                if (view === 'my-chats') {
                    if (window.VOID_VIEWS?.myChats) return window.VOID_VIEWS.myChats({
                        onBack: goBack, chatSessions, chatSessionsLoading,
                        restoreSession, refreshChatSessions,
                    });
                    return html`<${MyChatsView}
                        onBack=${goBack}
                        chatSessions=${chatSessions}
                        chatSessionsLoading=${chatSessionsLoading}
                        restoreSession=${restoreSession}
                    />`;
                }

                if (view === 'my-personas') {
                    if (window.VOID_VIEWS?.myPersonas) return window.VOID_VIEWS.myPersonas({
                        onBack: goBack, personas: displayPersonas,
                        favoritePersonas, toggleFavoritePersona,
                    });
                    return html`<${MyPersonasView}
                        onBack=${goBack}
                        personas=${displayPersonas}
                        favoritePersonas=${favoritePersonas}
                        toggleFavoritePersona=${toggleFavoritePersona}
                    />`;
                }

                if (view === 'help') {
                    if (window.VOID_VIEWS?.help) return window.VOID_VIEWS.help({ onBack: goBack });
                    return html`<${HelpView} onBack=${goBack} />`;
                }

                if (view === 'community') {
                    if (window.VOID_VIEWS?.community) return window.VOID_VIEWS.community({ onBack: goBack });
                    return html`<${CommunityView} onBack=${goBack} />`;
                }

                if (view === 'persona-selection') {
                    // Inline persona-selection (can also be delegated)
                    return html`<${PersonaSelectionView}
                        personas=${displayPersonas}
                        selectedIds=${selectedIds}
                        setSelectedIds=${setSelectedIds}
                        setView=${setView}
                    />`;
                }

                // Default: home
                return html`<${HomeView}
                    context=${context}
                    setContext=${setContext}
                    setView=${setView}
                    personas=${displayPersonas}
                    selectedIds=${selectedIds}
                    setSelectedIds=${setSelectedIds}
                />`;
            };

            return html`
                <div class="flex h-screen overflow-hidden bg-surface">
                    <!-- Background ambient glow -->
                    <div class="fixed inset-0 pointer-events-none z-0" aria-hidden="true">
                        <div class="absolute top-0 left-1/4 w-96 h-96 rounded-full opacity-[0.05]"
                            style=${{ background: 'radial-gradient(circle, #e8a84c 0%, transparent 70%)' }}></div>
                        <div class="absolute bottom-1/4 right-1/4 w-72 h-72 rounded-full opacity-[0.03]"
                            style=${{ background: 'radial-gradient(circle, #8a9a6c 0%, transparent 70%)' }}></div>
                        <div class="absolute top-1/2 right-0 w-64 h-64 rounded-full opacity-[0.03]"
                            style=${{ background: 'radial-gradient(circle, #c47a6c 0%, transparent 70%)' }}></div>
                    </div>

                    <!-- Sidebar -->
                    <${Sidebar}
                        view=${view}
                        setView=${setView}
                        user=${user}
                        isGuest=${isGuest}
                        onNewSession=${handleNewSession}
                        chatSessions=${chatSessions}
                        setChatSessions=${setChatSessions}
                        setSessionMessages=${setSessionMessages}
                        sessionId=${sessionId}
                        setSessionId=${setSessionId}
                        setSelectedIds=${setSelectedIds}
                        personas=${displayPersonas}
                        onLogin=${() => setAuthOpen(true)}
                        onSignOut=${handleSignOut}
                        userAvatar=${userAvatar}
                        sidebarOpen=${sidebarOpen}
                        setSidebarOpen=${setSidebarOpen}
                    />

                    <!-- Main content area (no top header — editorial/masthead lives in each view) -->
                    <div class="flex-1 flex flex-col overflow-hidden relative z-10">
                        <!-- Main content -->
                        <main class="flex-1 min-h-0 overflow-hidden flex flex-col">
                            <!-- Persistent ChatArena (stays mounted once activated) -->
                            <div class=${`flex-1 min-h-0 flex flex-col overflow-hidden ${view === 'debate' ? '' : 'hidden'}`}>
                                ${(user || isGuest) && hasEnteredDebate ? renderChatArena() : null}
                            </div>
                            <!-- Non-debate views -->
                            <div class=${`flex-1 min-h-0 overflow-y-auto no-scrollbar ${view !== 'debate' ? '' : 'hidden'}`}>
                              <div class="w-full max-w-[1400px] mx-auto h-full">
                                ${(user || isGuest) ? renderContent() : html`
                                    <div class="flex flex-col items-center justify-center min-h-[80vh] gap-8 animate-in px-4 text-center">
                                        <div>
                                            <h1 class="font-headline text-5xl font-bold wordmark mb-3">LIFEE</h1>
                                            <p class="text-sm text-on-surface-variant">Your life coach and friend.</p>
                                        </div>
                                        <div class="glass-card iridescent-border rounded-3xl p-8 max-w-sm w-full">
                                            <p class="text-sm text-on-surface-variant/70 mb-6 leading-relaxed">
                                                Sign in to save sessions, manage personas, and unlock the full LIFEE experience.
                                            </p>
                                            <button
                                                onClick=${() => setAuthOpen(true)}
                                                class="w-full btn-gradient rounded-xl py-3 text-sm font-bold mb-3"
                                            >Sign In / Sign Up</button>
                                            <button
                                                onClick=${() => setIsGuest(true)}
                                                class="w-full btn-ghost rounded-xl py-3 text-sm"
                                            >Continue as Guest</button>
                                        </div>
                                    </div>
                                `}
                              </div>
                            </div>
                        </main>
                    </div>

                    <!-- Auth modal -->
                    <${AuthModal}
                        isOpen=${authOpen || (!user && !isGuest)}
                        onClose=${() => setAuthOpen(false)}
                        onAuthed=${(u) => { setUser(u); setIsGuest(false); setAuthOpen(false); }}
                        onGuest=${() => { setIsGuest(true); setAuthOpen(false); }}
                    />
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  PERSONA SELECTION (full page variant)
        // ══════════════════════════════════════════════
        function PersonaSelectionView({ personas, selectedIds, setSelectedIds, setView }) {
            const [category, setCategory] = useState('ALL');
            const filtered = category === 'ALL' ? personas : personas.filter(p => p.category === category);

            return html`
                <div class="animate-in w-full flex flex-col items-center pt-10 pb-32 px-4">
                    <h2 class="font-headline text-2xl font-bold text-on-surface mb-2">Assemble the Council</h2>
                    <p class="text-xs text-on-surface-variant/50 mb-8 uppercase tracking-widest">Select voices for your debate</p>

                    <div class="flex gap-1.5 mb-8 flex-wrap justify-center">
                        ${['ALL', 'CREATIVE', 'RATIONAL', 'SUPPORT', 'CUSTOM'].map(cat => html`
                            <button
                                key=${cat}
                                onClick=${() => setCategory(cat)}
                                class=${`px-3 py-1.5 rounded-full text-[9px] font-bold uppercase tracking-wider transition-all
                                    ${category === cat ? 'bg-primary/20 text-primary border border-primary/30' : 'text-on-surface-variant/50 hover:text-primary'}`}
                            >${cat}</button>
                        `)}
                    </div>

                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 w-full max-w-5xl">
                        ${filtered.map(p => {
                            const isSel = selectedIds.includes(p.id);
                            return html`
                                <div
                                    key=${p.id}
                                    class=${`persona-card relative glass-card rounded-2xl p-4 cursor-pointer flex flex-col gap-3
                                        ${isSel ? 'border-primary/40 bg-primary/5' : ''}`}
                                    onClick=${() => setSelectedIds(prev =>
                                        prev.includes(p.id) ? prev.filter(id => id !== p.id) : [...prev, p.id]
                                    )}
                                >
                                    <div class=${`absolute top-3 right-3 w-5 h-5 rounded-full border flex items-center justify-center transition-all
                                        ${isSel ? 'bg-primary border-primary' : 'border-outline/30'}`}>
                                        ${isSel && html`<${Icon} name="Check" size=${10} className="text-on-primary" />`}
                                    </div>
                                    <div class="w-10 h-10 rounded-xl bg-surface-container flex items-center justify-center text-xl overflow-hidden">
                                        <${AvatarDisplay} avatar=${p.avatar} size=${40} />
                                    </div>
                                    <div>
                                        <p class="text-xs font-bold text-on-surface uppercase tracking-tight">${p.name}</p>
                                        <p class="text-[9px] text-primary/60 uppercase tracking-wide">${p.role}</p>
                                    </div>
                                    <p class="text-[10px] text-on-surface-variant/50 italic line-clamp-2">"${p.worldview}"</p>
                                </div>
                            `;
                        })}
                    </div>

                    ${selectedIds.length >= 1 && html`
                        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 animate-in">
                            <button
                                onClick=${() => setView('debate')}
                                class="btn-gradient px-10 py-4 rounded-full text-xs font-bold uppercase tracking-widest"
                                style=${{ boxShadow: '0 8px 32px rgba(232,168,76,0.35)' }}
                            >
                                Begin · ${selectedIds.length} ${selectedIds.length === 1 ? 'voice' : 'voices'}
                            </button>
                        </div>
                    `}
                </div>
            `;
        }

        // ── Mount ──
        window.VOID_VIEWS = window.VOID_VIEWS || {};

        const container = document.getElementById('void-root');
        const root = ReactDOM.createRoot(container);
        root.render(React.createElement(App));
    })();
    </script>
</body>
</html>
