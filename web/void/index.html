<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFEE</title>

    <!-- Tailwind CSS CDN with Void color theme config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'surface': '#12110f',
                        'surface-dim': '#0e0d0b',
                        'surface-bright': '#1a1815',
                        'surface-container-lowest': '#100f0d',
                        'surface-container-low': '#161410',
                        'surface-container': '#1c1a16',
                        'surface-container-high': '#232018',
                        'surface-container-highest': '#2a2720',
                        'surface-variant': '#1e1b16',
                        'on-surface': '#ede8e0',
                        'on-surface-variant': '#a09484',
                        'primary': '#e8a84c',
                        'on-primary': '#1a0e00',
                        'on-primary-fixed': '#0f0800',
                        'primary-container': '#7a4e1a',
                        'on-primary-container': '#fde8c0',
                        'secondary': '#8a9a6c',
                        'secondary-dim': '#7a8a5e',
                        'on-secondary': '#1a2008',
                        'secondary-container': '#3a4a20',
                        'on-secondary-container': '#d4e4b0',
                        'tertiary': '#c47a6c',
                        'on-tertiary': '#2a1010',
                        'tertiary-container': '#6a2e28',
                        'on-tertiary-container': '#f4d0c8',
                        'outline': '#6b5e4e',
                        'outline-variant': '#3a3028',
                    },
                    fontFamily: {
                        'headline': ['"Space Grotesk"', 'sans-serif'],
                        'body': ['Manrope', 'sans-serif'],
                        'label': ['Manrope', 'sans-serif'],
                    },
                    animation: {
                        'shimmer': 'shimmer 2.5s linear infinite',
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'slide-in': 'slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { backgroundPosition: '-200% center' },
                            '100%': { backgroundPosition: '200% center' },
                        },
                        fadeIn: {
                            from: { opacity: 0, transform: 'translateY(10px)' },
                            to: { opacity: 1, transform: 'translateY(0)' },
                        },
                        slideIn: {
                            from: { opacity: 0, transform: 'translateX(-16px)' },
                            to: { opacity: 1, transform: 'translateX(0)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 0.7 },
                            '50%': { opacity: 1 },
                        },
                    },
                    backdropBlur: {
                        xs: '2px',
                    },
                }
            }
        };
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

    <!-- React 18 + htm -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>

    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Turnstile CAPTCHA -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>

    <!-- Shared modules from web/ui/ -->
    <script src="/constants.js"></script>
    <script src="/api.js"></script>

    <!-- Void-specific component files -->
    <script src="./components/ui.js"></script>
    <script src="./components/ChatArena.js"></script>
    <script src="./components/modals.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: #12110f;
            color: #ede8e0;
            margin: 0;
            overflow: hidden;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(232,168,76,0.2); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(232,168,76,0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── Glass morphism ── */
        .glass {
            background: rgba(18, 17, 15, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .glass-light {
            background: rgba(35, 32, 24, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(24px);
        }
        .glass-card {
            background: rgba(28, 26, 22, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(232, 168, 76, 0.08);
        }

        /* ── Warm amber border ── */
        .iridescent-border {
            position: relative;
        }
        .iridescent-border::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: inherit;
            background: linear-gradient(135deg, #e8a84c, #c47a6c, #8a9a6c, #e8a84c);
            background-size: 300% 300%;
            animation: iridescentShift 4s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        @keyframes iridescentShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── Shimmer glow text ── */
        .shimmer-glow {
            background: linear-gradient(90deg, #e8a84c 0%, #c47a6c 30%, #8a9a6c 60%, #c47a6c 80%, #e8a84c 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            from { background-position: 200% center; }
            to   { background-position: -200% center; }
        }

        /* ── Gradient button ── */
        .btn-gradient {
            background: linear-gradient(135deg, #e8a84c, #c47a6c);
            color: #0f0800;
            font-weight: 700;
            transition: all 0.25s ease;
        }
        .btn-gradient:hover {
            background: linear-gradient(135deg, #f0b860, #d08878);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(232, 168, 76, 0.3);
        }
        .btn-gradient:active { transform: translateY(0); }

        /* ── Ghost button ── */
        .btn-ghost {
            background: transparent;
            border: 1px solid rgba(232, 168, 76, 0.2);
            color: #e8a84c;
            transition: all 0.2s ease;
        }
        .btn-ghost:hover {
            background: rgba(232, 168, 76, 0.08);
            border-color: rgba(232, 168, 76, 0.4);
        }

        /* ── Sidebar transition ── */
        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), width 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        /* ── Persona card hover ── */
        .persona-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .persona-card:hover {
            transform: translateY(-4px);
            border-color: rgba(232, 168, 76, 0.3) !important;
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.5), 0 0 32px rgba(232, 168, 76, 0.12);
        }

        /* ── Animate in ── */
        .animate-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Capsule tabs ── */
        .void-tab {
            padding: 8px 20px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: all 0.2s ease;
            white-space: nowrap;
            color: rgba(160, 148, 132, 0.6);
        }
        .void-tab:hover { color: #e8a84c; }
        .void-tab.active {
            background: linear-gradient(135deg, rgba(232,168,76,0.2), rgba(196,122,108,0.1));
            color: #e8a84c;
            border: 1px solid rgba(232, 168, 76, 0.3);
        }

        /* ── Landing option pills ── */
        .void-opt {
            border: 1px solid rgba(232, 168, 76, 0.15);
            background: rgba(35, 32, 24, 0.4);
            color: rgba(237, 232, 224, 0.6);
            border-radius: 9999px;
            padding: 9px 18px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .void-opt:hover {
            border-color: rgba(232, 168, 76, 0.4);
            color: #e8a84c;
            background: rgba(232, 168, 76, 0.08);
        }
        .void-opt.selected {
            background: linear-gradient(135deg, rgba(232,168,76,0.25), rgba(196,122,108,0.12));
            color: #e8a84c;
            border-color: rgba(232, 168, 76, 0.5);
            box-shadow: 0 4px 16px rgba(232, 168, 76, 0.2);
        }

        /* ── Textarea focus ── */
        .void-textarea:focus {
            outline: none;
            border-color: rgba(232, 168, 76, 0.4) !important;
            box-shadow: 0 0 0 3px rgba(232, 168, 76, 0.1), 0 0 24px rgba(232, 168, 76, 0.08);
        }

        /* ── Session item hover actions ── */
        .session-actions { opacity: 0; transition: opacity 0.2s ease; }
        .session-row:hover .session-actions { opacity: 1; }

        /* ── Suggested questions scroll ── */
        .sq-scroll {
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            -ms-overflow-style: none;
            scrollbar-width: none;
            padding: 4px 0 12px 0;
        }
        .sq-scroll::-webkit-scrollbar { display: none; }
        .sq-track {
            display: inline-flex;
            gap: 10px;
            padding: 0 2px;
            min-width: 100%;
        }
        .sq-pill {
            background: rgba(28, 26, 22, 0.6);
            border: 1px solid rgba(232, 168, 76, 0.12);
            border-radius: 9999px;
            padding: 10px 18px;
            white-space: nowrap;
            font-size: 12px;
            color: rgba(237, 232, 224, 0.7);
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        .sq-pill:hover {
            border-color: rgba(232, 168, 76, 0.35);
            color: #e8a84c;
            background: rgba(232, 168, 76, 0.06);
        }

        /* ── Material Symbol sizing ── */
        .material-symbols-outlined {
            font-size: 20px;
            line-height: 1;
            vertical-align: middle;
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="void-root" class="h-full"></div>

    <script>
    (function () {
        'use strict';

        const html = htm.bind(React.createElement);
        const { useState, useEffect, useRef, useCallback } = React;

        // ── Icon helper (Lucide via CDN) ──
        function Icon({ name, size = 18, className = '', style }) {
            const ref = useRef(null);
            useEffect(() => {
                if (!ref.current) return;
                const kebab = name.replace(/([A-Z])/g, (m, c, i) => (i > 0 ? '-' : '') + c.toLowerCase());
                ref.current.setAttribute('data-lucide', kebab);
                if (window.lucide?.createIcons) window.lucide.createIcons({ nodes: [ref.current] });
            }, [name]);
            return html`<i ref=${ref} class=${'inline-block ' + className} style=${{ width: size, height: size, ...(style || {}) }} />`;
        }

        // ── Material Symbol helper ──
        function MS({ name, size = 20, className = '' }) {
            return html`<span class=${'material-symbols-outlined ' + className} style=${{ fontSize: size }}>${name}</span>`;
        }

        // ── Relative time ──
        function relativeTime(ts) {
            if (!ts) return '';
            const diff = Date.now() - new Date(ts).getTime();
            const m = Math.floor(diff / 60000);
            if (m < 1) return 'just now';
            if (m < 60) return `${m}m ago`;
            const h = Math.floor(m / 60);
            if (h < 24) return `${h}h ago`;
            const d = Math.floor(h / 24);
            if (d < 7) return `${d}d ago`;
            return new Date(ts).toLocaleDateString();
        }

        // ── AvatarDisplay ──
        function AvatarDisplay({ avatar, className = '', size = 40 }) {
            if (!avatar) {
                return html`<div class=${'flex items-center justify-center bg-surface-container-high rounded-full ' + className} style=${{ width: size, height: size }}>
                    <${Icon} name="User" size=${Math.floor(size * 0.5)} className="text-on-surface-variant" />
                </div>`;
            }
            if (typeof avatar === 'string' && (avatar.startsWith('http') || avatar.startsWith('data:'))) {
                return html`<img src=${avatar} class=${'object-cover rounded-full ' + className} style=${{ width: size, height: size }} loading="lazy" alt="" />`;
            }
            return html`<div class=${'flex items-center justify-center rounded-full ' + className} style=${{ width: size, height: size, fontSize: Math.floor(size * 0.5) }}>${avatar}</div>`;
        }

        // ══════════════════════════════════════════════
        //  AUTH MODAL
        // ══════════════════════════════════════════════
        function AuthModal({ isOpen, onClose, onAuthed, onGuest }) {
            const [mode, setMode] = useState('login');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');
            const [otpSent, setOtpSent] = useState(false);
            const [otpCode, setOtpCode] = useState('');
            const [humanVerified, setHumanVerified] = useState(false);
            const turnstileRef = useRef(null);
            const widgetIdRef = useRef(null);

            useEffect(() => {
                if (!isOpen || humanVerified) return;
                const renderWidget = () => {
                    if (turnstileRef.current && window.turnstile && widgetIdRef.current === null) {
                        widgetIdRef.current = window.turnstile.render(turnstileRef.current, {
                            sitekey: TURNSTILE_SITEKEY,
                            callback: async (token) => {
                                const result = await verifyHumanTokenWithServer(token);
                                if (result.ok) {
                                    setHumanVerified(true);
                                    if (result.bypassed) setMessage('Local preview: verification skipped.');
                                } else {
                                    setMessage(result.message || 'Verification failed. Please retry.');
                                }
                            },
                            theme: 'dark',
                        });
                    }
                };
                if (window.turnstile) { renderWidget(); }
                else {
                    const timer = setInterval(() => {
                        if (window.turnstile) { clearInterval(timer); renderWidget(); }
                    }, 200);
                    return () => clearInterval(timer);
                }
                return () => {
                    if (widgetIdRef.current !== null && window.turnstile) {
                        window.turnstile.remove(widgetIdRef.current);
                        widgetIdRef.current = null;
                    }
                };
            }, [isOpen, humanVerified]);

            if (!isOpen) return null;

            const handleAuth = async () => {
                setLoading(true);
                setMessage('');
                try {
                    if (mode === 'login') {
                        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                        if (data?.user) onAuthed(data.user);
                    } else if (otpSent) {
                        const { data, error } = await supabaseClient.auth.verifyOtp({ email, token: otpCode, type: 'signup' });
                        if (error) throw error;
                        if (data?.user) onAuthed(data.user);
                    } else {
                        const { error } = await supabaseClient.auth.signUp({ email, password });
                        if (error) throw error;
                        setOtpSent(true);
                        setMessage('Verification code sent to your email.');
                    }
                } catch (err) {
                    setMessage(err?.message || 'Operation failed. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center">
                    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onClick=${onClose}></div>
                    <div class="relative w-full max-w-sm mx-4 glass-card rounded-3xl p-8 animate-in iridescent-border">
                        <div class="flex items-center justify-between mb-7">
                            <div>
                                <h2 class="font-headline text-lg font-bold text-on-surface">
                                    ${mode === 'login' ? 'Welcome back' : 'Create account'}
                                </h2>
                                <p class="text-xs text-on-surface-variant mt-0.5">LIFEE</p>
                            </div>
                            <button onClick=${onClose} class="w-8 h-8 rounded-full btn-ghost flex items-center justify-center">
                                <${Icon} name="X" size=${14} />
                            </button>
                        </div>

                        ${!humanVerified ? html`
                            <div class="flex flex-col items-center gap-4 py-4">
                                <p class="text-sm text-on-surface-variant">Please verify you're human</p>
                                <div ref=${turnstileRef}></div>
                                ${message && html`<p class="text-xs text-tertiary/80 text-center">${message}</p>`}
                            </div>
                        ` : otpSent ? html`
                            <div class="space-y-4">
                                <p class="text-sm text-on-surface-variant">${message || 'Enter the verification code sent to your email.'}</p>
                                <input
                                    type="text"
                                    placeholder="6-digit code"
                                    value=${otpCode}
                                    onInput=${e => setOtpCode(e.target.value)}
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                />
                                <button
                                    onClick=${handleAuth}
                                    disabled=${loading || !otpCode}
                                    class="w-full btn-gradient rounded-xl py-3 text-sm disabled:opacity-40"
                                >${loading ? 'Verifying…' : 'Verify & Sign Up'}</button>
                            </div>
                        ` : html`
                            <div class="space-y-3">
                                <input
                                    type="email"
                                    placeholder="Email address"
                                    value=${email}
                                    onInput=${e => setEmail(e.target.value)}
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                />
                                <input
                                    type="password"
                                    placeholder="Password"
                                    value=${password}
                                    onInput=${e => setPassword(e.target.value)}
                                    onKeyDown=${e => { if (e.key === 'Enter') handleAuth(); }}
                                    class="w-full bg-surface-container border border-outline/30 text-on-surface rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary/50 void-textarea"
                                />
                                ${message && html`<p class="text-xs text-tertiary/80">${message}</p>`}
                                <button
                                    onClick=${handleAuth}
                                    disabled=${loading || !email || !password}
                                    class="w-full btn-gradient rounded-xl py-3 text-sm disabled:opacity-40"
                                >${loading ? 'Please wait…' : mode === 'login' ? 'Sign In' : 'Send Verification Code'}</button>
                                <div class="flex items-center gap-2 pt-1">
                                    <div class="flex-1 h-px bg-outline/20"></div>
                                    <span class="text-xs text-on-surface-variant">or</span>
                                    <div class="flex-1 h-px bg-outline/20"></div>
                                </div>
                                <button
                                    onClick=${() => { onGuest(); }}
                                    class="w-full btn-ghost rounded-xl py-3 text-sm"
                                >Continue as Guest</button>
                                <p class="text-center text-xs text-on-surface-variant pt-1">
                                    ${mode === 'login'
                                        ? html`No account? <button onClick=${() => { setMode('signup'); setMessage(''); }} class="text-primary hover:underline">Sign up</button>`
                                        : html`Already have one? <button onClick=${() => { setMode('login'); setMessage(''); setOtpSent(false); }} class="text-primary hover:underline">Sign in</button>`}
                                </p>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  SIDEBAR
        // ══════════════════════════════════════════════
        function Sidebar({
            view, setView, user, isGuest, onNewSession, chatSessions,
            setChatSessions, setSessionMessages, setSessionId, setSelectedIds,
            personas, onLogin, onSignOut, userAvatar,
        }) {
            const [userMenuOpen, setUserMenuOpen] = useState(false);

            const restoreSession = async (s) => {
                try {
                    const res = await fetch(`/sessions/${s.id}/messages`, { credentials: 'include' }).then(r => r.json());
                    if (res?.messages) {
                        setSessionMessages(res.messages.map(m => ({ personaId: m.persona_id || m.role, text: m.content })));
                        setSessionId(s.id);
                        if (s.personas?.length && setSelectedIds) {
                            const ids = s.personas.map(pid => {
                                const found = (personas || []).find(p =>
                                    p.id === pid || p.name === pid || p.id === pid.toLowerCase().replace(/\s+/g, '')
                                );
                                return found?.id;
                            }).filter(Boolean);
                            if (ids.length) setSelectedIds(ids);
                        }
                        setView('debate');
                    }
                } catch (e) { console.error('restore session failed', e); }
            };

            const starSession = async (s, e) => {
                e.stopPropagation();
                const newVal = !s.starred;
                await fetch(`/sessions/${s.id}`, {
                    method: 'PATCH', credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ starred: newVal })
                });
                setChatSessions(prev => prev.map(x => x.id === s.id ? { ...x, starred: newVal } : x));
            };

            const deleteSession = async (s, e) => {
                e.stopPropagation();
                if (!confirm('Delete this conversation?')) return;
                await fetch(`/sessions/${s.id}`, { method: 'DELETE', credentials: 'include' });
                setChatSessions(prev => prev.filter(x => x.id !== s.id));
                setSessionId(null);
                setSessionMessages([]);
                setView('home');
            };

            const displayName = user?.user_metadata?.name || user?.email?.split('@')[0] || (isGuest ? 'Guest' : 'User');
            const userInitial = (displayName || 'U')[0].toUpperCase();
            const userEmail = user?.email || (isGuest ? 'guest@lifee.app' : 'user@example.com');
            const userCredits = '—';

            return html`
                <aside
                    class="hidden md:flex flex-col h-full py-10 px-8 bg-surface-container-low/60 backdrop-blur-2xl w-80 border-r border-white/5 overflow-y-auto"
                    id="void-sidebar"
                >
                    <!-- Logo -->
                    <div class="mb-12">
                        <h1 class="text-3xl font-headline font-bold tracking-tight text-white">LIFEE</h1>

        // ══════════════════════════════════════════════
        //  HOME VIEW
        // ══════════════════════════════════════════════
        function HomeView({ context, setContext, setView, personas, selectedIds, setSelectedIds }) {
            // Domain classification by persona id
            const DOMAIN_MAP = {
                'krishnamurti': 'Philosophy', 'lacan': 'Philosophy', 'Simone de Beauvoir': 'Philosophy',
                'buffett': 'Business', 'munger': 'Business', 'drucker': 'Business', 'welch': 'Business',
                'shannon': 'Science', 'turing': 'Science', 'vonneumann': 'Science',
                'audrey-hepburn': 'Arts',
            };
            const getDomain = (p) => DOMAIN_MAP[p.id] || p.category || 'Other';
            const DOMAIN_ORDER = ['Philosophy', 'Business', 'Science', 'Arts'];

            // Group personas by domain
            const grouped = {};
            DOMAIN_ORDER.forEach(d => grouped[d] = []);
            personas.forEach(p => {
                const d = getDomain(p);
                if (grouped[d]) grouped[d].push(p);
            });

            const toggleSelect = (id) => {
                setSelectedIds(prev =>
                    prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
                );
            };

            const selectedPersonas = personas.filter(p => selectedIds.includes(p.id));

            // Preview: hovered/tapped persona in the right panel
            const [previewId, setPreviewId] = useState(null);

            // Featured = preview > most recent selected > default (Audrey)
            const lastSelected = selectedPersonas[selectedPersonas.length - 1];
            const featured =
                (previewId && personas.find(p => p.id === previewId)) ||
                lastSelected ||
                personas.find(p => p.id === 'audrey-hepburn') ||
                personas[0];

            // Masthead date
            const today = new Date();
            const dateStr = today.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }).toUpperCase();

            return html`
                <div class="animate-in flex flex-col w-full h-full overflow-y-auto no-scrollbar">
                    <!-- Masthead -->
                    <div class="w-full max-w-6xl mx-auto px-8 pt-8 pb-4">
                        <div class="flex items-baseline justify-between border-b border-on-surface/10 pb-3">
                            <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em] font-bold">Vol. I</p>
                            <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em]">${dateStr}</p>
                            <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em]">The Council</p>
                        </div>
                    </div>

                    <!-- Hero: split layout (input left, featured right) -->
                    <section class="w-full max-w-6xl mx-auto px-8 pt-8 pb-16 grid grid-cols-1 md:grid-cols-5 gap-10">
                        <!-- Left: input area -->
                        <div class="md:col-span-3 flex flex-col justify-center gap-5">
                            <p class="text-[10px] text-on-surface-variant/40 uppercase tracking-[0.3em]">Today's question</p>
                            <h1 class="font-headline text-4xl md:text-5xl font-bold leading-[1.1] text-on-surface">
                                What's on<br/>your mind?
                            </h1>
                            <div class="flex items-center gap-3 mt-4">
                                <div class="flex-1 flex items-center bg-surface-container border border-outline-variant/20 rounded-2xl px-5 py-4 focus-within:border-primary/30 transition-colors">
                                    <input
                                        type="text"
                                        class="flex-1 bg-transparent text-on-surface placeholder-on-surface-variant/30 text-sm focus:outline-none"
                                        placeholder="Describe your situation..."
                                        value=${context.situation}
                                        onInput=${e => setContext(c => ({ ...c, situation: e.target.value }))}
                                        onKeyDown=${e => { if (e.key === 'Enter' && context.situation?.trim() && selectedIds.length > 0) setView('debate'); }}
                                    />
                                </div>
                                <button
                                    disabled=${selectedIds.length === 0 || !context.situation?.trim()}
                                    onClick=${() => setView('debate')}
                                    class="btn-gradient px-6 py-4 rounded-2xl text-xs font-bold uppercase tracking-wider disabled:opacity-20 disabled:cursor-not-allowed shrink-0"
                                >
                                    <span class="material-symbols-outlined" style=${{ fontSize: '20px', verticalAlign: 'middle' }}>send</span>
                                </button>
                            </div>
                            ${selectedIds.length > 0 ? html`
                                <div class="flex flex-wrap gap-2">
                                    ${selectedPersonas.map(p => html`
                                        <span key=${p.id}
                                            class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-primary/8 border border-primary/15 text-xs text-primary/80">
                                            <span class="text-sm">${p.avatar || '☁️'}</span>
                                            ${p.name}
                                            <button onClick=${() => toggleSelect(p.id)}
                                                class="ml-0.5 text-primary/40 hover:text-primary text-base leading-none">×</button>
                                        </span>
                                    `)}
                                </div>
                            ` : html`
                                <p class="text-xs text-on-surface-variant/40 italic">→ Select voices below to begin.</p>
                            `}
                        </div>

                        <!-- Right: featured persona card (click to add to conversation) -->
                        ${featured ? (() => {
                            const isSel = selectedIds.includes(featured.id);
                            const label = previewId ? 'Preview' : (isSel ? 'In conversation' : 'Featured');
                            return html`
                                <div class="md:col-span-2">
                                    <div
                                        onClick=${() => toggleSelect(featured.id)}
                                        class=${`group relative h-full rounded-3xl overflow-hidden cursor-pointer transition-all duration-300 min-h-[300px]
                                            ${isSel
                                                ? 'ring-2 ring-primary'
                                                : 'ring-1 ring-outline-variant/20 hover:ring-primary/40'}`}
                                        style=${featured.cover_url ? {
                                            backgroundImage: `linear-gradient(to bottom, rgba(18,17,15,0.2), rgba(18,17,15,0.95)), url(${featured.cover_url})`,
                                            backgroundSize: 'cover',
                                            backgroundPosition: featured.cover_position || 'center',
                                        } : {}}
                                    >
                                        <div class=${featured.cover_url ? '' : 'bg-surface-container-high h-full'}>
                                            <div class="flex flex-col justify-between h-full min-h-[300px] p-6">
                                                <div class="flex items-start justify-between">
                                                    <p class="text-[9px] text-on-surface-variant/70 uppercase tracking-[0.3em] font-bold">${label}</p>
                                                    <span class="text-2xl opacity-80">${featured.avatar || '☁️'}</span>
                                                </div>
                                                <div>
                                                    <p class="text-[10px] text-primary/80 uppercase tracking-widest font-bold mb-2">${featured.role}</p>
                                                    <h3 class="font-headline text-3xl font-bold leading-tight text-white mb-3">${featured.name}</h3>
                                                    <p class="text-xs italic text-white/70 leading-relaxed line-clamp-3 max-w-xs">"${featured.worldview}"</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        })() : null}
                    </section>

                    <!-- Domain sections (editorial list style) -->
                    <section class="w-full max-w-6xl mx-auto px-8 pb-20">
                        <div class="flex items-baseline gap-4 mb-10 border-t border-on-surface/10 pt-6">
                            <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em] font-bold">The Council</p>
                            <div class="flex-1 h-px bg-on-surface/8"></div>
                            <p class="text-[10px] text-on-surface-variant/40">${personas.length} voices</p>
                        </div>

                        <!-- Single horizontal scroll: all domains + personas interleaved -->
                        <div class="relative -mx-8">
                            <div class="flex flex-nowrap items-stretch gap-4 overflow-x-auto no-scrollbar snap-x px-8 pb-2" style=${{ scrollbarWidth: 'none' }}>
                                ${DOMAIN_ORDER.filter(d => grouped[d].length > 0).flatMap((domain, dIdx) => {
                                    const items = grouped[domain];
                                    const out = [];

                                    // Domain label (inline divider) — sticks with its group
                                    out.push(html`
                                        <div key=${'label-' + domain} class="shrink-0 snap-start w-44 flex flex-col justify-end pb-5 pr-2 border-r border-on-surface/10">
                                            <p class="text-[10px] text-on-surface-variant/40 uppercase tracking-[0.3em] font-bold">N° 0${dIdx + 1}</p>
                                            <h2 class="font-headline text-3xl font-bold text-on-surface leading-none mt-2">${domain}</h2>
                                            <p class="text-[11px] text-on-surface-variant/40 italic mt-2">${items.length} ${items.length === 1 ? 'voice' : 'voices'}</p>
                                        </div>
                                    `);

                                    // Persona cards
                                    items.forEach(p => {
                                        const isSel = selectedIds.includes(p.id);
                                        const isPreview = previewId === p.id;
                                        out.push(html`
                                            <div
                                                key=${p.id}
                                                onClick=${() => setPreviewId(p.id)}
                                                class=${`relative group shrink-0 snap-start cursor-pointer w-48 p-4 rounded-2xl border transition-all
                                                    ${isSel
                                                        ? 'border-primary/25 bg-primary/8 shadow-lg shadow-primary/5'
                                                        : isPreview
                                                            ? 'border-primary/20 bg-surface-container-high/70'
                                                            : 'border-outline-variant/10 bg-surface-container-high/50 hover:border-outline-variant/25 hover:bg-surface-container-high/80'}`}
                                            >
                                                ${isSel && html`
                                                    <div class="absolute top-3 right-3 w-4 h-4 rounded-full bg-primary border-2 border-primary flex items-center justify-center">
                                                        <span class="material-symbols-outlined text-on-primary" style=${{ fontSize: '10px' }}>check</span>
                                                    </div>
                                                `}
                                                <div class="text-2xl mb-3">${p.avatar || '☁️'}</div>
                                                <p class="text-xs font-bold text-on-surface leading-tight">${p.name}</p>
                                                <p class="text-[10px] text-on-surface-variant/40 mt-0.5">${p.role}</p>
                                                <p class="text-[10px] text-on-surface-variant/25 italic mt-2 leading-relaxed line-clamp-2">"${p.worldview}"</p>
                                            </div>
                                        `);
                                    });

                                    return out;
                                })}
                            </div>
                            <!-- Fade on right edge as scroll hint -->
                            <div class="pointer-events-none absolute top-0 right-0 w-16 h-full bg-gradient-to-l from-surface to-transparent"></div>
                        </div>
                    </section>
                </div>
            `;
        }

        // ══════════════════════════════════════════════

        // ══════════════════════════════════════════════
        //  SETTINGS VIEW
        // ══════════════════════════════════════════════
        function SettingsView({ onBack, user, onSignOut, onLogin, userAvatar, onUserAvatarChange }) {
            const displayName = user?.user_metadata?.name || user?.email?.split('@')[0] || 'Guest';
            const fileRef = useRef(null);

            const handleAvatarChange = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                try {
                    const url = await fileToDataURL(file);
                    onUserAvatarChange(url);
                } catch (err) { console.error(err); }
                finally { e.target.value = ''; }
            };

            return html`
                <div class="max-w-lg mx-auto px-4 py-8 animate-in">
                    <div class="flex items-center gap-3 mb-8">
                        <button onClick=${onBack} class="btn-ghost w-8 h-8 rounded-lg flex items-center justify-center">
                            <${Icon} name="ArrowLeft" size=${16} />
                        </button>
                        <h1 class="font-headline text-xl font-bold text-on-surface">Settings</h1>
                    </div>

                    <!-- Profile card -->
                    <div class="glass-card rounded-2xl p-6 mb-4">
                        <div class="flex items-center gap-4">
                            <div class="relative">
                                <${AvatarDisplay} avatar=${userAvatar || user?.user_metadata?.avatar_url || '✨'} size=${52} />

                                <p class="font-semibold text-on-surface truncate">${displayName}</p>

                        { label: 'Help & FAQ', icon: 'HelpCircle', desc: 'How LIFEE works' },
                    ].map(item => html`

                            <div class="w-9 h-9 rounded-xl bg-surface-container flex items-center justify-center">
                                <${Icon} name=${item.icon} size=${16} className="text-primary/70" />
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-semibold text-on-surface">${item.label}</p>
                                <p class="text-[10px] text-on-surface-variant/50">${item.desc}</p>
