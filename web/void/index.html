                            <${Icon} name="ChevronRight" size=${14} className="text-on-surface-variant/30" />
                        </div>
                    `)}

                    <div class="mt-6">
                        ${user ? html`
                            <button
                                onClick=${onSignOut}
                                class="w-full btn-ghost rounded-xl py-3 text-sm text-tertiary/70 hover:text-tertiary border-tertiary/20 hover:border-tertiary/40"
                            >Sign Out</button>
                        ` : html`
                            <button
                                onClick=${onLogin}
                                class="w-full btn-gradient rounded-xl py-3 text-sm"
                            >Sign In</button>
                        `}
                    </div>
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  MY PERSONAS VIEW
        // ══════════════════════════════════════════════
        function MyPersonasView({ onBack, personas, favoritePersonas, toggleFavoritePersona }) {
            const [category, setCategory] = useState('ALL');
            const filtered = category === 'ALL' ? personas : personas.filter(p => p.category === category);

            return html`
                <div class="max-w-4xl mx-auto px-4 py-8 animate-in">
                    <div class="flex items-center gap-3 mb-6">
                        <button onClick=${onBack} class="btn-ghost w-8 h-8 rounded-lg flex items-center justify-center">
                            <${Icon} name="ArrowLeft" size=${16} />
                        </button>
                        <h1 class="font-headline text-xl font-bold text-on-surface">My Personas</h1>
                    </div>
                    <div class="flex gap-1.5 mb-6 flex-wrap">
                        ${['ALL', 'CREATIVE', 'RATIONAL', 'SUPPORT', 'CUSTOM'].map(cat => html`
                            <button
                                key=${cat}
                                onClick=${() => setCategory(cat)}
                                class=${`px-3 py-1.5 rounded-full text-[9px] font-bold uppercase tracking-wider transition-all
                                    ${category === cat ? 'bg-primary/20 text-primary border border-primary/30' : 'text-on-surface-variant/50 hover:text-primary'}`}
                            >${cat}</button>
                        `)}
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                        ${filtered.map(p => {
                            const isFav = (favoritePersonas || []).some(fp => fp.id === p.id);
                            return html`
                                <div key=${p.id} class="persona-card glass-card rounded-2xl p-4 flex flex-col gap-2">
                                    <div class="flex items-start justify-between">
                                        <div class="w-10 h-10 rounded-xl bg-surface-container flex items-center justify-center text-xl">
                                            <${AvatarDisplay} avatar=${p.avatar} size=${40} />
                                        </div>
                                        <button
                                            onClick=${() => toggleFavoritePersona(p)}
                                            class=${`w-7 h-7 rounded-full flex items-center justify-center transition-all
                                                ${isFav ? 'text-yellow-400' : 'text-on-surface-variant/30 hover:text-yellow-400'}`}
                                        >
                                            <${Icon} name="Star" size=${13} />
                                        </button>
                                    </div>
                                    <div>
                                        <p class="text-xs font-bold text-on-surface uppercase">${p.name}</p>
                                        <p class="text-[9px] text-primary/60 uppercase tracking-wide">${p.role}</p>
                                    </div>
                                    <p class="text-[10px] text-on-surface-variant/50 italic line-clamp-2">"${p.worldview}"</p>
                                </div>
                            `;
                        })}
                    </div>
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  HELP VIEW
        // ══════════════════════════════════════════════
        function HelpView({ onBack }) {
            const faqs = [
                { q: 'What is LIFEE?', a: 'LIFEE is a multi-persona life coaching tool. You describe a situation and multiple AI personas argue perspectives to help you think clearly.' },
                { q: 'What is the Void theme?', a: 'Void is the dark "Iridescent Void" design variant of LIFEE — same functionality, different aesthetic experience.' },
                { q: 'How do I start a session?', a: 'Describe your situation in the text area, select tags for context, pick one or more personas from the grid, then click "Begin".' },
                { q: 'Can I save sessions?', a: 'Yes. Sessions are automatically saved to your account. Access them from "My Chats" in the sidebar.' },
                { q: 'What is guest mode?', a: 'Guest mode lets you use LIFEE without signing in. Sessions are not persisted across page reloads.' },
            ];

            return html`
                <div class="max-w-2xl mx-auto px-4 py-8 animate-in">
                    <div class="flex items-center gap-3 mb-8">
                        <button onClick=${onBack} class="btn-ghost w-8 h-8 rounded-lg flex items-center justify-center">
                            <${Icon} name="ArrowLeft" size=${16} />
                        </button>
                        <h1 class="font-headline text-xl font-bold text-on-surface">Help & FAQ</h1>
                    </div>
                    <div class="space-y-3">
                        ${faqs.map((faq, i) => html`
                            <div key=${i} class="glass-card rounded-2xl p-5">
                                <p class="text-sm font-semibold text-on-surface mb-2">${faq.q}</p>
                                <p class="text-sm text-on-surface-variant/70 leading-relaxed">${faq.a}</p>
                            </div>
                        `)}
                    </div>
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  COMMUNITY VIEW (stub)
        // ══════════════════════════════════════════════
        function CommunityView({ onBack }) {
            return html`<${PlaceholderView} title="Community" icon="Globe" onBack=${onBack} />`;
        }

        // ══════════════════════════════════════════════
        //  MAIN APP
        // ══════════════════════════════════════════════
        function App() {
            const [view, setView] = useState('home');
            const [context, setContext] = useState({ situation: '', landingPeriods: [] });
            const _NO_KNOWLEDGE = new Set(['serene', 'architect', 'rebel', 'caretaker', 'tarot-master']);
            const [personas, setPersonas] = useState(INITIAL_PERSONAS.filter(p => !_NO_KNOWLEDGE.has(p.id)));
            const [selectedIds, setSelectedIds] = useState([]);
            const [user, setUser] = useState(null);
            const [isGuest, setIsGuest] = useState(false);
            const [authOpen, setAuthOpen] = useState(false);
            const [userAvatar, setUserAvatar] = useState(() => {
                try { return window.localStorage.getItem('lifee_user_avatar') || null; } catch (_) { return null; }
            });
            const [sessionId, setSessionId] = useState(null);
            const [sessionMessages, setSessionMessages] = useState([]);
            const [sessionSummaries, setSessionSummaries] = useState([]);
            const [chatSessions, setChatSessions] = useState([]);
            const [chatSessionsLoading, setChatSessionsLoading] = useState(false);
            const [favoritePersonas, setFavoritePersonas] = useState([]);
            const [personaAssets, setPersonaAssets] = useState({});
            const [personaAvatarOverrides, setPersonaAvatarOverrides] = useState(() => {
                try { return JSON.parse(window.localStorage.getItem('lifee_persona_avatar_overrides') || '{}'); } catch (_) { return {}; }
            });
            const [personaCoverOverrides, setPersonaCoverOverrides] = useState(() => {
                try { return JSON.parse(window.localStorage.getItem('lifee_persona_cover_overrides') || '{}'); } catch (_) { return {}; }
            });
            const [personaCatalogKnowledge, setPersonaCatalogKnowledge] = useState({});
            const [summaryEvery] = useState(SUMMARY_EVERY_DEFAULT);
            const [contextWindow] = useState(CONTEXT_WINDOW_DEFAULT);

            const sessionMessagesRef = useRef([]);
            useEffect(() => { sessionMessagesRef.current = sessionMessages; }, [sessionMessages]);

            // Persist userAvatar
            useEffect(() => {
                try { if (userAvatar) window.localStorage.setItem('lifee_user_avatar', userAvatar); } catch (_) {}
            }, [userAvatar]);

            // Persist favorites
            useEffect(() => {
                try { window.localStorage.setItem('lifee_favorite_personas', JSON.stringify(favoritePersonas || [])); } catch (_) {}
            }, [favoritePersonas]);

            // Persist overrides
            useEffect(() => {
                try { window.localStorage.setItem('lifee_persona_avatar_overrides', JSON.stringify(personaAvatarOverrides || {})); } catch (_) {}
            }, [personaAvatarOverrides]);
            useEffect(() => {
                try { window.localStorage.setItem('lifee_persona_cover_overrides', JSON.stringify(personaCoverOverrides || {})); } catch (_) {}
            }, [personaCoverOverrides]);

            // Auth init
            useEffect(() => {
                let mounted = true;
                (async () => {
                    const { data } = await supabaseClient.auth.getSession();
                    if (mounted) setUser(data?.session?.user || null);
                })();
                const { data: sub } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user || null);
                    if (session?.user) setIsGuest(false);
                });
                return () => { mounted = false; sub?.subscription?.unsubscribe?.(); };
            }, []);

            // Load favorite personas
            useEffect(() => {
                try {
                    const raw = window.localStorage.getItem('lifee_favorite_personas');
                    if (raw) setFavoritePersonas(JSON.parse(raw));
                } catch (_) {}
            }, []);

            // Upsert profile + load settings
            useEffect(() => {
                if (!user) return;
                (async () => {
                    await supabaseClient.from('profiles').upsert({
                        id: user.id,
                        email: user.email,
                        display_name: user.user_metadata?.name || null,
                        avatar_url: user.user_metadata?.avatar_url || null,
                    }, { onConflict: 'id' });

                    const { data: settings } = await supabaseClient
                        .from('user_settings').select('summary_every, context_window').eq('id', user.id).maybeSingle();
                    if (!settings) {
                        await supabaseClient.from('user_settings').insert({
                            id: user.id,
                            summary_every: SUMMARY_EVERY_DEFAULT,
                            context_window: CONTEXT_WINDOW_DEFAULT,
                        });
                    }
                })();
            }, [user]);

            // Load persona assets + chat sessions
            useEffect(() => {
                if (!user) return;
                (async () => {
                    const { data } = await supabaseClient.from('personas').select('id, avatar_url, cover_url');
                    const map = {};
                    (data || []).forEach(row => { map[row.id] = row; });
                    setPersonaAssets(map);
                })();

                (async () => {
                    setChatSessionsLoading(true);
                    try {
                        const res = await fetch(`/sessions?userId=${user.id}`, { credentials: 'include' }).then(r => r.json());
                        setChatSessions(res?.sessions || []);
                    } catch (_) { setChatSessions([]); }
                    setChatSessionsLoading(false);
                })();

                // Load latest session
                (async () => {
                    const { data: sessions } = await supabaseClient
                        .from('chat_sessions')
                        .select('id, title, updated_at')
                        .eq('user_id', user.id)
                        .order('updated_at', { ascending: false })
                        .limit(1);
                    const latest = sessions?.[0];
                    if (!latest) return;
                    setSessionId(latest.id);
                    const { data: msgs } = await supabaseClient
                        .from('chat_messages')
                        .select('id, role, content, seq, created_at')
                        .eq('session_id', latest.id)
                        .order('seq', { ascending: true })
                        .limit(200);
                    setSessionMessages((msgs || []).map(m => ({ role: m.role, text: m.content, seq: m.seq })));
                    const { data: sums } = await supabaseClient
                        .from('chat_summaries')
                        .select('summary, start_seq, end_seq, created_at')
                        .eq('session_id', latest.id)
                        .order('created_at', { ascending: true });
                    setSessionSummaries(sums || []);
                })();
            }, [user]);

            // Load persona_catalog knowledge
            useEffect(() => {
                (async () => {
                    try {
                        const { data } = await supabaseClient.from('persona_catalog').select('id, decision_style');
                        const map = {};
                        (data || []).forEach(row => { if (row?.decision_style?.trim()) map[row.id] = row.decision_style.trim(); });
                        setPersonaCatalogKnowledge(map);
                    } catch (_) {}
                })();
            }, []);

            const refreshChatSessions = useCallback(async () => {
                if (!user) return;
                setChatSessionsLoading(true);
                try {
                    const res = await fetch(`/sessions?userId=${user.id}`, { credentials: 'include' }).then(r => r.json());
                    setChatSessions(res?.sessions || []);
                } catch (_) { setChatSessions([]); }
                setChatSessionsLoading(false);
            }, [user]);

            // Display personas (merge assets + overrides + catalog knowledge)
            const displayPersonas = personas.map(p => {
                const asset = personaAssets[p.id];
                const avatarOverride = personaAvatarOverrides?.[p.id];
                const coverOverride = personaCoverOverrides?.[p.id];
                return {
                    ...p,
                    avatar: avatarOverride || asset?.avatar_url || p.avatar,
                    cover_url: coverOverride || asset?.cover_url || p.cover_url || null,
                    knowledge: (p.knowledge || '').trim() || (personaCatalogKnowledge[p.id] || '').trim(),
                };
            });

            const buildContextBlock = useCallback(() => {
                const summaryBlock = sessionSummaries.length
                    ? sessionSummaries.map(s => `Summary(${s.start_seq}-${s.end_seq})\n${s.summary}`).join('\n\n')
                    : '';
                const latestMsgs = sessionMessages.slice(-contextWindow).map(m => `${m.role.toUpperCase()}: ${m.text}`).join('\n');
                return [summaryBlock, latestMsgs].filter(Boolean).join('\n\n');
            }, [sessionSummaries, sessionMessages, contextWindow]);

            const ensureSession = useCallback(async () => sessionId || null, [sessionId]);
            const persistMessage = useCallback(async () => {}, []);

            const handleNewSession = useCallback(async () => {
                setSessionId(null);
                setSessionMessages([]);
                setSessionSummaries([]);
                setContext({ situation: '', landingPeriods: [] });
                setSelectedIds([]);
                setView('home');
            }, []);

            const handleSignOut = useCallback(async () => {
                await supabaseClient.auth.signOut();
                setUser(null);
                setIsGuest(false);
                setView('home');
                setAuthOpen(true);
            }, []);

            const toggleFavoritePersona = useCallback((persona) => {
                if (!persona?.id) return;
                setFavoritePersonas(prev => {
                    const exists = (prev || []).some(p => p.id === persona.id);
                    return exists ? prev.filter(p => p.id !== persona.id) : [...(prev || []), persona];
                });
            }, []);

            const restoreSession = useCallback(async (s) => {
                try {
                    const res = await fetch(`/sessions/${s.id}/messages`, { credentials: 'include' }).then(r => r.json());
                    if (res?.messages) {
                        setSessionMessages(res.messages.map(m => ({ personaId: m.persona_id || m.role, text: m.content })));
                        setSessionId(s.id);
                        if (s.personas?.length) {
                            const ids = s.personas.map(pid => {
                                const found = displayPersonas.find(p =>
                                    p.id === pid || p.name === pid || p.id === pid.toLowerCase().replace(/\s+/g, '')
                                );
                                return found?.id;
                            }).filter(Boolean);
                            if (ids.length) setSelectedIds(ids);
                        }
                        setView('debate');
                    }
                } catch (e) { console.error('restore failed', e); }
            }, [displayPersonas]);

            const isAdmin = user?.email === ADMIN_EMAIL;

            // ── Render content for current view ──
            const renderContent = () => {
                // Delegate to external component files if available
                if (view === 'debate') {
                    if (window.VOID_VIEWS?.debate) {
                        return window.VOID_VIEWS.debate({
                            context,
                            selectedPersonas: displayPersonas.filter(p => selectedIds.includes(p.id)),
                            setView,
                            ensureSession,
                            persistMessage,
                            buildContextBlock,
                            userAvatar,
                            user,
                            initialMessages: sessionMessages,
                            parentSessionId: sessionId,
                            onSessionCreated: (id) => {
                                setSessionId(id);
                                refreshChatSessions();
                            },
                        });
                    }
                    return html`<${PlaceholderView} title="Chat Arena" icon="MessageSquare" onBack=${() => setView('home')} />`;
                }

                if (view === 'settings') {
                    if (window.VOID_VIEWS?.settings) return window.VOID_VIEWS.settings({
                        user, isAdmin, onBack: () => setView('home'),
                        onSignOut: handleSignOut, onLogin: () => setAuthOpen(true),
                        userAvatar, onUserAvatarChange: (a) => setUserAvatar(a),
                    });
                    return html`<${SettingsView}
                        onBack=${() => setView('home')}
                        user=${user}
                        onSignOut=${handleSignOut}
                        onLogin=${() => setAuthOpen(true)}
                        userAvatar=${userAvatar}
                        onUserAvatarChange=${(a) => setUserAvatar(a)}
                    />`;
                }

                if (view === 'my-chats') {
                    if (window.VOID_VIEWS?.myChats) return window.VOID_VIEWS.myChats({
                        onBack: () => setView('home'), chatSessions, chatSessionsLoading,
                        restoreSession, refreshChatSessions,
                    });
                    return html`<${MyChatsView}
                        onBack=${() => setView('home')}
                        chatSessions=${chatSessions}
                        chatSessionsLoading=${chatSessionsLoading}
                        restoreSession=${restoreSession}
                    />`;
                }

                if (view === 'my-personas') {
                    if (window.VOID_VIEWS?.myPersonas) return window.VOID_VIEWS.myPersonas({
                        onBack: () => setView('home'), personas: displayPersonas,
                        favoritePersonas, toggleFavoritePersona,
                    });
                    return html`<${MyPersonasView}
                        onBack=${() => setView('home')}
                        personas=${displayPersonas}
                        favoritePersonas=${favoritePersonas}
                        toggleFavoritePersona=${toggleFavoritePersona}
                    />`;
                }

                if (view === 'help') {
                    if (window.VOID_VIEWS?.help) return window.VOID_VIEWS.help({ onBack: () => setView('home') });
                    return html`<${HelpView} onBack=${() => setView('home')} />`;
                }

                if (view === 'community') {
                    if (window.VOID_VIEWS?.community) return window.VOID_VIEWS.community({ onBack: () => setView('home') });
                    return html`<${CommunityView} onBack=${() => setView('home')} />`;
                }

                if (view === 'persona-selection') {
                    // Inline persona-selection (can also be delegated)
                    return html`<${PersonaSelectionView}
                        personas=${displayPersonas}
                        selectedIds=${selectedIds}
                        setSelectedIds=${setSelectedIds}
                        setView=${setView}
                    />`;
                }

                // Default: home
                return html`<${HomeView}
                    context=${context}
                    setContext=${setContext}
                    setView=${setView}
                    personas=${displayPersonas}
                    selectedIds=${selectedIds}
                    setSelectedIds=${setSelectedIds}
                />`;
            };

            return html`
                <div class="flex h-screen overflow-hidden bg-surface">
                    <!-- Background ambient glow -->
                    <div class="fixed inset-0 pointer-events-none z-0" aria-hidden="true">
                        <div class="absolute top-0 left-1/4 w-96 h-96 rounded-full opacity-[0.05]"
                            style=${{ background: 'radial-gradient(circle, #e8a84c 0%, transparent 70%)' }}></div>
                        <div class="absolute bottom-1/4 right-1/4 w-72 h-72 rounded-full opacity-[0.03]"
                            style=${{ background: 'radial-gradient(circle, #8a9a6c 0%, transparent 70%)' }}></div>
                        <div class="absolute top-1/2 right-0 w-64 h-64 rounded-full opacity-[0.03]"
                            style=${{ background: 'radial-gradient(circle, #c47a6c 0%, transparent 70%)' }}></div>
                    </div>

                    <!-- Sidebar -->
                    <${Sidebar}
                        view=${view}
                        setView=${setView}
                        user=${user}
                        isGuest=${isGuest}
                        onNewSession=${handleNewSession}
                        chatSessions=${chatSessions}
                        setChatSessions=${setChatSessions}
                        setSessionMessages=${setSessionMessages}
                        setSessionId=${setSessionId}
                        setSelectedIds=${setSelectedIds}
                        personas=${displayPersonas}
                        onLogin=${() => setAuthOpen(true)}
                        onSignOut=${handleSignOut}
                        userAvatar=${userAvatar}
                    />

                    <!-- Main content area -->
                    <div class="flex-1 flex flex-col overflow-hidden relative z-10">
                        <!-- Top header bar -->
                        <header class="h-14 flex items-center justify-between px-5 border-b border-outline/10 flex-shrink-0"
                            style=${{ background: 'rgba(18,17,15,0.7)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)' }}>
                            <div class="flex items-center gap-3">
                                <!-- Mobile menu trigger (sidebar doesn't auto-open on mobile yet) -->
                                <button
                                    class="md:hidden w-8 h-8 rounded-lg btn-ghost flex items-center justify-center"
                                    onClick=${() => {
                                        const sb = document.getElementById('void-sidebar');
                                        if (sb) sb.classList.toggle('-translate-x-full');
                                    }}
                                >
                                    <${Icon} name="Menu" size=${18} />
                                </button>
                                <!-- Session title -->
                                <div class="flex items-center gap-2">
                                    <span class="font-headline text-sm font-semibold text-on-surface/70">
                                        ${view === 'debate' ? 'Session' : 'LIFEE'}
                                    </span>
                                    ${view === 'debate' && selectedIds.length > 0 && html`
                                        <div class="flex -space-x-1.5">
                                            ${displayPersonas.filter(p => selectedIds.includes(p.id)).slice(0, 4).map(p => html`
                                                <div key=${p.id} class="w-6 h-6 rounded-full bg-surface-container border border-outline/20 flex items-center justify-center text-xs">
                                                    ${typeof p.avatar === 'string' && !p.avatar.startsWith('http') ? p.avatar : '?'}
                                                </div>
                                            `)}
                                        </div>
                                    `}
                                </div>
                            </div>

                            <!-- Right: nav + auth -->
                            <div class="flex items-center gap-4">
                                <nav class="hidden md:flex items-center gap-1">
                                    ${[
                                        { label: 'Home', view: 'home' },
                                        { label: 'Community', view: 'community' },
                                    ].map(item => html`
                                        <button
                                            key=${item.view}
                                            onClick=${() => setView(item.view)}
                                            class=${`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all
                                                ${view === item.view ? 'text-primary bg-primary/10' : 'text-on-surface-variant/60 hover:text-primary'}`}
                                        >${item.label}</button>
                                    `)}
                                </nav>

                                ${user ? html`
                                    <button
                                        onClick=${() => setView('settings')}
                                        class="w-8 h-8 rounded-full overflow-hidden border border-primary/30 flex-shrink-0"
                                    >
                                        <${AvatarDisplay}
                                            avatar=${userAvatar || user?.user_metadata?.avatar_url || '✨'}
                                            size=${32}
                                        />
                                    </button>
                                ` : html`
                                    <button
                                        onClick=${() => setAuthOpen(true)}
                                        class="btn-gradient px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider"
                                    >Sign In</button>
                                `}
                            </div>
                        </header>

                        <!-- Main content (scroll only for non-debate views) -->
                        <main class=${`flex-1 flex flex-col ${view === 'debate' ? 'overflow-hidden' : 'overflow-y-auto no-scrollbar'}`}>
                            <div class=${`${view === 'debate' ? 'flex-1 flex flex-col overflow-hidden' : 'w-full max-w-[1400px] mx-auto'}`}>
                                ${(user || isGuest) ? renderContent() : html`
                                    <div class="flex flex-col items-center justify-center min-h-[80vh] gap-8 animate-in px-4 text-center">
                                        <div>
                                            <h1 class="font-headline text-5xl font-bold shimmer-glow mb-3">LIFEE</h1>
                                            <p class="text-sm text-on-surface-variant">Your life coach and friend.</p>
                                        </div>
                                        <div class="glass-card iridescent-border rounded-3xl p-8 max-w-sm w-full">
                                            <p class="text-sm text-on-surface-variant/70 mb-6 leading-relaxed">
                                                Sign in to save sessions, manage personas, and unlock the full LIFEE experience.
                                            </p>
                                            <button
                                                onClick=${() => setAuthOpen(true)}
                                                class="w-full btn-gradient rounded-xl py-3 text-sm font-bold mb-3"
                                            >Sign In / Sign Up</button>
                                            <button
                                                onClick=${() => setIsGuest(true)}
                                                class="w-full btn-ghost rounded-xl py-3 text-sm"
                                            >Continue as Guest</button>
                                        </div>
                                    </div>
                                `}
                            </div>
                        </main>
                    </div>

                    <!-- Auth modal -->
                    <${AuthModal}
                        isOpen=${authOpen || (!user && !isGuest)}
                        onClose=${() => setAuthOpen(false)}
                        onAuthed=${(u) => { setUser(u); setIsGuest(false); setAuthOpen(false); }}
                        onGuest=${() => { setIsGuest(true); setAuthOpen(false); }}
                    />
                </div>
            `;
        }

        // ══════════════════════════════════════════════
        //  PERSONA SELECTION (full page variant)
        // ══════════════════════════════════════════════
        function PersonaSelectionView({ personas, selectedIds, setSelectedIds, setView }) {
            const [category, setCategory] = useState('ALL');
            const filtered = category === 'ALL' ? personas : personas.filter(p => p.category === category);

            return html`
                <div class="animate-in w-full flex flex-col items-center pt-10 pb-32 px-4">
                    <h2 class="font-headline text-2xl font-bold text-on-surface mb-2">Assemble the Council</h2>
                    <p class="text-xs text-on-surface-variant/50 mb-8 uppercase tracking-widest">Select voices for your debate</p>

                    <div class="flex gap-1.5 mb-8 flex-wrap justify-center">
                        ${['ALL', 'CREATIVE', 'RATIONAL', 'SUPPORT', 'CUSTOM'].map(cat => html`
                            <button
                                key=${cat}
                                onClick=${() => setCategory(cat)}
                                class=${`px-3 py-1.5 rounded-full text-[9px] font-bold uppercase tracking-wider transition-all
                                    ${category === cat ? 'bg-primary/20 text-primary border border-primary/30' : 'text-on-surface-variant/50 hover:text-primary'}`}
                            >${cat}</button>
                        `)}
                    </div>

                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 w-full max-w-5xl">
                        ${filtered.map(p => {
                            const isSel = selectedIds.includes(p.id);
                            return html`
                                <div
                                    key=${p.id}
                                    class=${`persona-card relative glass-card rounded-2xl p-4 cursor-pointer flex flex-col gap-3
                                        ${isSel ? 'border-primary/40 bg-primary/5' : ''}`}
                                    onClick=${() => setSelectedIds(prev =>
                                        prev.includes(p.id) ? prev.filter(id => id !== p.id) : [...prev, p.id]
                                    )}
                                >
                                    <div class=${`absolute top-3 right-3 w-5 h-5 rounded-full border flex items-center justify-center transition-all
                                        ${isSel ? 'bg-primary border-primary' : 'border-outline/30'}`}>
                                        ${isSel && html`<${Icon} name="Check" size=${10} className="text-on-primary" />`}
                                    </div>
                                    <div class="w-10 h-10 rounded-xl bg-surface-container flex items-center justify-center text-xl overflow-hidden">
                                        <${AvatarDisplay} avatar=${p.avatar} size=${40} />
                                    </div>
                                    <div>
                                        <p class="text-xs font-bold text-on-surface uppercase tracking-tight">${p.name}</p>
                                        <p class="text-[9px] text-primary/60 uppercase tracking-wide">${p.role}</p>
                                    </div>
                                    <p class="text-[10px] text-on-surface-variant/50 italic line-clamp-2">"${p.worldview}"</p>
                                </div>
                            `;
                        })}
                    </div>

                    ${selectedIds.length >= 1 && html`
                        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 animate-in">
                            <button
                                onClick=${() => setView('debate')}
                                class="btn-gradient px-10 py-4 rounded-full text-xs font-bold uppercase tracking-widest"
                                style=${{ boxShadow: '0 8px 32px rgba(232,168,76,0.35)' }}
                            >
                                Begin · ${selectedIds.length} ${selectedIds.length === 1 ? 'voice' : 'voices'}
                            </button>
                        </div>
                    `}
                </div>
            `;
        }

        // ── Mount ──
        window.VOID_VIEWS = window.VOID_VIEWS || {};

        const container = document.getElementById('void-root');
        const root = ReactDOM.createRoot(container);
        root.render(React.createElement(App));
    })();
    </script>
</body>
</html>
